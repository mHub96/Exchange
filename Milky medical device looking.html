<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On-Call Pro | Medical Deck</title>
    <style>
        :root {
            --bg-body: #1a1c20;
            --device-bg: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --med-blue: #007AFF;
            --text-main: #4d5d7d;
            --wa-green: #25D366;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-body);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%; max-width: 400px;
            padding: 35px 25px;
            background: var(--device-bg);
            border-radius: 45px;
            box-shadow: 20px 20px 60px var(--shadow-dark), 
                        -20px -20px 60px var(--shadow-light);
            text-align: center;
        }

        h2 { font-weight: 700; font-size: 1.4rem; margin-bottom: 5px; color: var(--text-main); }
        #status { font-size: 0.8rem; color: #7a8ba9; margin-bottom: 30px; font-weight: 600; }

        /* NEUMORPHIC INPUTS (INSET) */
        select, input {
            width: 100%;
            padding: 18px;
            margin-bottom: 20px;
            background: var(--device-bg);
            border: none;
            border-radius: 20px;
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
            color: var(--text-main) !important;
            font-size: 1rem;
            outline: none;
            appearance: none;
        }

        input[type="password"] {
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 12px;
            font-weight: 900;
        }

        /* NEUMORPHIC BUTTONS (EXTRUDED) */
        button {
            width: 100%;
            padding: 18px;
            background: var(--device-bg);
            color: var(--med-blue);
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 10px;
            box-shadow: 6px 6px 12px var(--shadow-dark), 
                        -6px -6px 12px var(--shadow-light);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
            transform: scale(0.98);
        }

        button:disabled { color: #a3b1c6; cursor: not-allowed; }

        /* DATA DISPLAY PANEL */
        .info-card {
            background: var(--device-bg);
            border-radius: 30px;
            padding: 25px;
            margin: 25px 0;
            box-shadow: inset 8px 8px 16px var(--shadow-dark), 
                        inset -8px -8px 16px var(--shadow-light);
        }

        .name-label { font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin: 10px 0; }
        
        .service-badge {
            background: var(--device-bg);
            color: var(--med-blue);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 700;
            display: inline-block;
            box-shadow: 3px 3px 6px var(--shadow-dark), 
                        -3px -3px 6px var(--shadow-light);
        }

        .btn-row { display: flex; gap: 15px; margin-top: 25px; }
        .action-btn {
            flex: 1;
            padding: 15px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: var(--device-bg);
            box-shadow: 5px 5px 10px var(--shadow-dark), 
                        -5px -5px 10px var(--shadow-light);
            color: var(--text-main);
        }

        .action-btn.wa { color: var(--wa-green); }

        .hidden { display: none !important; }

        /* Suggestions box for autocomplete */
        .suggestions-box {
            max-height: 180px;
            overflow-y: auto;
            border-radius: 20px;
            margin-top: -10px;
            background: var(--device-bg);
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            direction: rtl;
            position: absolute;
            width: 100%;
            z-index: 50;
        }
        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(163, 177, 198, 0.1);
            text-align: right;
            color: var(--text-main);
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .suggestion-item:hover,
        .suggestion-item.selected {
            background: rgba(0, 122, 255, 0.05);
            color: var(--med-blue);
        }
        .suggestion-item:last-child {
            border-bottom: none;
        }
        #name-section {
            position: relative;
        }

        /* Toggle remember me */
        .toggle-remember {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #7a8ba9;
            margin: 10px 0 15px 0;
            cursor: pointer;
        }
        .toggle-remember input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: var(--med-blue);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            border-radius: 6px;
            cursor: pointer;
            padding: 0;
        }
        .toggle-remember input[type="checkbox"]:checked {
            accent-color: var(--med-blue);
        }

        /* Toast error */
        .toast-error {
            background: rgba(225, 29, 72, 0.06);
            border: 1px solid rgba(225, 29, 72, 0.1);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            font-size: 0.7rem;
            color: #c0392b;
            text-align: center;
            animation: slideDown 0.4s ease;
            margin-top: 10px;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="entry-screen" class="container">
        <div style="font-size: 2.5rem; margin-bottom: 20px;">🛡️</div>
        <h2 id="entry-title">Resident Portal</h2>
        <p id="status">Secure Link Verified</p>
        <input type="password" id="pw" inputmode="numeric" placeholder="••••" maxlength="8">
        
        <div class="toggle-remember">
            <input type="checkbox" id="rememberMe" checked>
            <label for="rememberMe">Remember Me</label>
        </div>
        
        <button id="entry-btn" onclick="handleEntry()" disabled>Loading...</button>
        <div id="login-error" class="hidden toast-error"></div>
    </div>

    <div id="lookup-view" class="container hidden">
        <div id="service-display" class="service-badge">SERVICE</div>
        <div id="name-display" class="name-label">Loading...</div>
        <div class="info-card">
            <div style="color: #7a8ba9; font-size: 0.7rem; font-weight: 700; margin-bottom: 5px;">DIRECT CONTACT</div>
            <div id="phone-display" style="font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; color: var(--med-blue);">-</div>
        </div>
        <div class="btn-row">
            <a href="#" id="call-link" class="action-btn">📞 Call</a>
            <a href="#" id="wa-link" class="action-btn wa" style="display:none;">💬 WhatsApp</a>
        </div>
        <p id="time-stamp" style="font-size: 0.7rem; color: #a3b1c6; margin-top: 25px;"></p>
        <div style="margin-top: 15px;">
            <button onclick="logout()" style="width: auto; padding: 10px 20px; font-size: 0.7rem; color: #a3b1c6; box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);">Sign Out</button>
        </div>
    </div>

    <div id="register-view" class="container hidden">
        <div class="service-badge">REGISTRY 🇮🇶</div>
        <h2 style="margin-top: 15px;">Daily Duty</h2>
        <p style="color: #7a8ba9; margin-bottom: 20px;">Update today's on-call resident</p>
        
        <select id="spec-select" onchange="toggleNameSection()">
            <option value="">Choose Specialty</option>
            <option value="NS">Neuro</option>
            <option value="CT">Thoracic</option>
            <option value="GS">Surgery</option>
            <option value="US">Uro</option>
            <option value="ENT">ENT</option>
            <option value="H">Cardio</option>
            <option value="D">DeathCertificates</option>
            <option value="OP">OP Anesthesia</option>
            <option value="ICU">ICU Anesthesia</option>
            <option value="R">Radio</option>
            <option value="ON">Onco</option>
            <option value="PS">Plastic</option>
        </select>

        <div id="name-section" class="hidden">
            <input type="text" id="name-input" placeholder="Search resident name..." autocomplete="off">
            <div id="suggestions" class="suggestions-box hidden"></div>
            <button id="submit-btn" onclick="submitRegistration()">Confirm Duty</button>
        </div>
        
        <div style="margin-top: 15px;">
            <button onclick="logout()" style="width: auto; padding: 10px 20px; font-size: 0.7rem; color: #a3b1c6; box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);">Sign Out</button>
        </div>
    </div>

<script>
    // ############################################################
    // ALL LATEST FUNCTIONALITY - Password animation, Remember Me, 8-digit PIN
    // ############################################################

    const CONFIG = { user: "mHub96", repo: "s", path: "data.json" };
    const _pt1 = "ghp_dAUtsFhTH";
    const _pt2 = "a2KeJQOsxsC";
    const _pt3 = "Ct1vz8z1Z63";
    const _pt4 = "Am sjS";
    const GH_TOKEN = (_pt1 + _pt2 + _pt3 + _pt4).replace(/\s/g, '');

    const arabicSpecs = {
        "NS": "Neuro", "CT": "Thoracic",
        "GS": "Surgery", "US": "Uro",
        "ENT": "ENT", "H": "Cardio",
        "ICU": "ICU Anesthesia", "OP": "OP Anesthesia",
        "R": "Radio", "ON": "Onco", "D": "DeathCertificates"
    };

    let db = { names: [], schedule: [] };
    let fileSha = "";
    let todayResident = null;
    let currentPool = [];
    let selectedIndex = -1;
    let dataLoaded = false;
    let loadError = false;
    let isSessionRestored = false;

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');

    const STORAGE_KEY = 'duty_portal_session';
    const SESSION_PIN = '1234';

    // ---------- PASSWORD HANDLING ----------
    let passwordValue = '';

    function handlePasswordInput() {
        // Native input handles this
    }

    function handlePasswordKey(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleEntry();
        }
    }

    function shakeInput() {
        const input = document.getElementById('pw');
        input.style.boxShadow = 'inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light), 0 0 20px rgba(225,29,72,0.3)';
        input.style.border = '2px solid #e11d48';
        setTimeout(() => {
            input.style.boxShadow = '';
            input.style.border = '';
        }, 500);
    }

    function resetPasswordInput() {
        const input = document.getElementById('pw');
        input.value = '';
        passwordValue = '';
    }

    // ---------- REMEMBER ME ----------
    function saveSession() {
        const remember = document.getElementById('rememberMe');
        if (remember && remember.checked) {
            localStorage.setItem(STORAGE_KEY, 'authenticated');
            localStorage.setItem(STORAGE_KEY + '_timestamp', Date.now().toString());
        } else {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(STORAGE_KEY + '_timestamp');
        }
    }

    function checkSession() {
        const session = localStorage.getItem(STORAGE_KEY);
        if (!session) return false;
        const timestamp = localStorage.getItem(STORAGE_KEY + '_timestamp');
        if (timestamp) {
            const days = (Date.now() - parseInt(timestamp)) / (1000 * 60 * 60 * 24);
            if (days > 7) {
                clearSession();
                return false;
            }
        }
        return session === 'authenticated';
    }

    function clearSession() {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(STORAGE_KEY + '_timestamp');
    }

    function logout() {
        clearSession();
        isSessionRestored = false;
        document.getElementById('entry-screen').classList.remove('hidden');
        document.getElementById('lookup-view').classList.add('hidden');
        document.getElementById('register-view').classList.add('hidden');
        resetPasswordInput();
        const entryBtn = document.getElementById('entry-btn');
        if (dataLoaded) {
            entryBtn.disabled = false;
            entryBtn.innerText = 'SIGN IN';
        } else {
            entryBtn.disabled = true;
            entryBtn.innerText = 'Loading...';
        }
        // Reset title
        if (mode === 'register') {
            document.getElementById('entry-title').innerText = "Doctor Login";
        } else if (service) {
            document.getElementById('entry-title').innerText = "System Access";
        }
    }

    // ---------- ENTRY HANDLER ----------
    window.handleEntry = function() {
        if (!dataLoaded) {
            showLoginError('Data not loaded, please refresh');
            return;
        }
        const input = document.getElementById('pw');
        const pin = input.value;
        
        if (pin === SESSION_PIN) {
            saveSession();
            proceedAfterAuth();
        } else {
            shakeInput();
            showLoginError('Incorrect Password');
            setTimeout(() => {
                resetPasswordInput();
                input.focus();
            }, 400);
        }
    };

    function proceedAfterAuth() {
        document.getElementById('entry-screen').style.display = 'none';
        if (mode === 'register') {
            document.getElementById('register-view').classList.remove('hidden');
            prepareRegister();
        } else {
            showLookupUI();
            document.getElementById('lookup-view').classList.remove('hidden');
        }
    }

    function showLoginError(msg) {
        const errEl = document.getElementById('login-error');
        errEl.innerText = msg;
        errEl.classList.remove('hidden');
        setTimeout(() => errEl.classList.add('hidden'), 4000);
    }

    // ---------- LOADING & INIT ----------
    window.onload = async function() {
        const hasSession = checkSession();
        
        if (hasSession) {
            isSessionRestored = true;
        }

        // Set title based on mode
        if (mode === 'register') {
            document.getElementById('entry-title').innerText = "Doctor Login";
        } else if (service) {
            document.getElementById('entry-title').innerText = "System Access";
        }

        try {
            await fetchDataWithTimeout(8000);
        } catch (e) {
            console.warn('Data fetch failed:', e);
            loadError = true;
            const cached = localStorage.getItem('duty_db_cache');
            if (cached) {
                try {
                    db = JSON.parse(cached);
                    dataLoaded = true;
                } catch (e2) { /* ignore */ }
            }
        }

        const entryBtn = document.getElementById('entry-btn');
        const statusText = document.getElementById('status');

        if (dataLoaded) {
            statusText.innerText = "Ready ✅";
            entryBtn.disabled = false;
            entryBtn.innerText = 'SIGN IN';
            
            if (hasSession) {
                setTimeout(() => {
                    if (mode === 'register') {
                        document.getElementById('register-view').classList.remove('hidden');
                        prepareRegister();
                    } else {
                        showLookupUI();
                        document.getElementById('lookup-view').classList.remove('hidden');
                    }
                    document.getElementById('entry-screen').style.display = 'none';
                }, 200);
            }
        } else if (loadError) {
            statusText.innerText = "⚠️ Offline Mode";
            entryBtn.disabled = true;
            entryBtn.innerText = '⚠️ Error';
        }

        // Sync remember me checkbox
        const rememberCheck = document.getElementById('rememberMe');
        if (rememberCheck) {
            rememberCheck.checked = checkSession();
        }
    };

    async function fetchDataWithTimeout(timeoutMs) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${GH_TOKEN}` },
                signal: controller.signal
            });
            clearTimeout(timeoutId);

            if (res.ok) {
                const data = await res.json();
                fileSha = data.sha;
                const decoded = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g, '')))));
                db = decoded;
                localStorage.setItem('duty_db_cache', JSON.stringify(db));
                dataLoaded = true;
                loadError = false;

                if (service) {
                    const todayStr = getMedicalDate();
                    todayResident = db.schedule.find(s => s.specCode === service && s.date === todayStr);
                }
                return true;
            } else {
                throw new Error(`HTTP ${res.status}`);
            }
        } catch (e) {
            clearTimeout(timeoutId);
            throw e;
        }
    }

    function getMedicalDate() {
        const now = new Date();
        if (now.getHours() < 8) now.setDate(now.getDate() - 1);
        const d = String(now.getDate()).padStart(2, '0');
        const m = String(now.getMonth() + 1).padStart(2, '0');
        return `${d}/${m}/${now.getFullYear()}`;
    }

    // ---------- REGISTER FUNCTIONS ----------
    function prepareRegister() {
        // Filter residents based on specialty
        toggleNameSection();
    }

    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');

        if (!selectedSpec) {
            nameSection.classList.add('hidden');
            return;
        }

        nameSection.classList.remove('hidden');
        document.getElementById('name-input').value = '';
        document.getElementById('suggestions').classList.add('hidden');
        
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            currentPool = db.names.filter(n => n.spec === "A");
        } else if (selectedSpec === "D") {
            currentPool = db.names;
        } else {
            currentPool = db.names.filter(n => n.spec === selectedSpec);
        }
        
        // Add input event listeners
        const nameInput = document.getElementById('name-input');
        nameInput.oninput = filterNames;
        nameInput.onkeydown = handleNameKey;
        nameInput.onblur = function() {
            setTimeout(() => document.getElementById('suggestions').classList.add('hidden'), 200);
        };
    }

    function filterNames() {
        const val = document.getElementById('name-input').value.trim().toLowerCase().replace(/^د\.?\s*/, '');
        const box = document.getElementById('suggestions');
        if (!val) { box.classList.add('hidden'); return; }
        
        const matches = currentPool.filter(n => n.name.toLowerCase().replace(/^د\.?\s*/, '').includes(val));
        matches.sort((a, b) => {
            const aClean = a.name.toLowerCase().replace(/^د\.?\s*/, '');
            const bClean = b.name.toLowerCase().replace(/^د\.?\s*/, '');
            const aStarts = aClean.startsWith(val);
            const bStarts = bClean.startsWith(val);
            if (aStarts && !bStarts) return -1;
            if (!aStarts && bStarts) return 1;
            return aClean.localeCompare(bClean);
        });

        if (matches.length > 0) {
            box.innerHTML = matches.map(m => `<div class="suggestion-item" onclick="selectSuggestion('${m.name}')">${m.name}</div>`).join('');
            box.classList.remove('hidden');
            selectedIndex = -1;
        } else box.classList.add('hidden');
    }

    function handleNameKey(e) {
        const items = document.querySelectorAll('.suggestion-item');
        if (e.key === "ArrowDown") selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
        else if (e.key === "ArrowUp") selectedIndex = Math.max(selectedIndex - 1, 0);
        else if (e.key === "Enter") {
            if (selectedIndex > -1) selectSuggestion(items[selectedIndex].innerText);
            else submitRegistration();
        }
        items.forEach((item, i) => item.classList.toggle('selected', i === selectedIndex));
    }

    function selectSuggestion(name) {
        document.getElementById('name-input').value = name;
        document.getElementById('suggestions').classList.add('hidden');
    }

    // ---------- LOOKUP FUNCTIONS ----------
    function showLookupUI() {
        const targetDate = getMedicalDate();
        const now = new Date();
        const timestamp = `${String(now.getDate()).padStart(2, '0')}-${now.toLocaleString('en-GB', {month:'short'})}-${now.getFullYear()} | ${now.toLocaleString('en-GB', {hour:'2-digit', minute:'2-digit', hour12:true}).toUpperCase()}`;
        
        document.getElementById('service-display').innerText = arabicSpecs[service] || service || "SERVICE";
        document.getElementById('time-stamp').innerText = timestamp;

        todayResident = db.schedule.find(s => s.specCode === service && s.date === targetDate);

        if (todayResident) {
            const info = db.names.find(n => n.name === todayResident.name);
            document.getElementById('name-display').innerText = todayResident.name;
            document.getElementById('phone-display').innerText = info ? info.phone : "No Number";
            if (info?.phone) {
                document.getElementById('call-link').href = "tel:" + info.phone;
                document.getElementById('call-link').classList.remove('hidden');
                document.getElementById('wa-link').style.display = 'flex';
                document.getElementById('wa-link').href = "whatsapp://send?phone=" + info.phone;
            }
        } else {
            document.getElementById('name-display').innerText = "No Duty Found";
            document.getElementById('phone-display').innerText = "Date: " + targetDate;
            document.getElementById('call-link').classList.add('hidden');
            document.getElementById('wa-link').style.display = 'none';
        }
    }

    // ---------- SUBMIT REGISTRATION ----------
    async function submitRegistration() {
        if (!dataLoaded) {
            alert('Data not loaded, please refresh');
            return;
        }
        const btn = document.getElementById('submit-btn');
        const name = document.getElementById('name-input').value;
        const spec = document.getElementById('spec-select').value;
        
        if (!name || !spec) {
            alert('Please select a resident and specialty');
            return;
        }

        btn.innerText = "Saving...";
        btn.disabled = true;

        const dutyDate = getMedicalDate();
        const entry = {
            date: dutyDate, specCode: spec, name: name,
            timestamp: new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})
        };

        db.schedule = db.schedule.filter(s => !(s.date === entry.date && s.specCode === entry.specCode));
        db.schedule.push(entry);

        try {
            const body = {
                message: `Update: ${name}`,
                content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                sha: fileSha
            };
            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                method: "PUT", headers: { "Authorization": `token ${GH_TOKEN}` }, body: JSON.stringify(body)
            });
            
            if (res.ok) {
                const r = await res.json();
                fileSha = r.content.sha;
                localStorage.setItem('duty_db_cache', JSON.stringify(db));
                
                btn.innerText = "✅ Saved!";
                btn.style.color = '#10b981';

                setTimeout(() => {
                    btn.innerText = "Confirm Duty";
                    btn.disabled = false;
                    btn.style.color = '';
                    document.getElementById('name-input').value = "";
                    document.getElementById('spec-select').value = "";
                    document.getElementById('name-section').classList.add('hidden');
                }, 1500);
            }
        } catch (e) {
            btn.innerText = "❌ Error";
            setTimeout(() => {
                btn.innerText = "Confirm Duty";
                btn.disabled = false;
            }, 2000);
        }
    }

    function openWhatsApp(e) {
        e.preventDefault();
        const info = db.names.find(n => n.name === todayResident.name);
        if (info?.phone) window.location.href = "whatsapp://send?phone=" + info.phone;
    }

    // Expose functions globally
    window.logout = logout;
    window.openWhatsApp = openWhatsApp;
    window.handleEntry = handleEntry;
    window.submitRegistration = submitRegistration;
    window.toggleNameSection = toggleNameSection;

    // Add input event listener for password
    document.addEventListener('DOMContentLoaded', function() {
        const pwInput = document.getElementById('pw');
        pwInput.addEventListener('input', function() {
            passwordValue = this.value;
        });
        pwInput.addEventListener('keydown', handlePasswordKey);
    });
</script>
