<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Portal | Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; }
        
        /* Custom Keyframes for the "Ripple" completion effect */
        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            100% { box-shadow: 0 0 0 30px rgba(16, 185, 129, 0); }
        }
        .animate-ripple { animation: ripple 0.8s ease-out; }

        /* Smoothly hiding views */
        .view-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <div class="fixed inset-0 z-[-1]">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-500/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-500/10 blur-[120px] rounded-full"></div>
    </div>

    <div id="main-card" class="w-full max-w-sm bg-slate-900/50 backdrop-blur-2xl border border-white/10 p-8 rounded-[2.5rem] shadow-2xl view-transition">
        
        <div id="login-view">
            <div class="text-center mb-8">
                <h1 class="text-white text-2xl font-bold tracking-tight">System Access</h1>
                <p id="status-text" class="text-slate-400 text-xs mt-2 uppercase tracking-widest">Awaiting Identity</p>
            </div>

            <div class="space-y-6">
                <input type="password" id="pw" inputmode="numeric" maxlength="4" placeholder="••••" 
                    class="w-full bg-slate-950/50 border border-white/5 rounded-2xl py-5 text-center text-3xl tracking-[1.5rem] text-blue-400 focus:border-blue-500 outline-none transition-all shadow-inner">
                
                <button id="entry-btn" onclick="handleEntry()" 
                    class="relative w-full py-5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl transition-all duration-300 shadow-[0_10px_20px_rgba(37,99,235,0.3)] active:scale-95 active:shadow-inner overflow-hidden">
                    <span id="btn-label">AUTHORIZE</span>
                    <div id="spinner" class="hidden absolute inset-0 flex items-center justify-center bg-blue-600">
                        <svg class="animate-spin h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </div>
                </button>
            </div>
        </div>

        <div id="lookup-view" class="hidden opacity-0 scale-95 transition-all duration-500">
            <div class="text-center mb-6">
                <span id="service-display" class="bg-emerald-500/10 text-emerald-400 px-4 py-1 rounded-full text-[0.6rem] font-bold tracking-tighter uppercase border border-emerald-500/20">SERVICE</span>
                <h2 id="name-display" class="text-white text-3xl font-bold mt-4 leading-tight">...</h2>
                <p id="phone-display" class="text-slate-400 font-medium text-lg mt-1">-</p>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <a href="#" id="call-link" class="flex flex-col items-center justify-center p-4 bg-slate-800/50 rounded-3xl border border-white/5 hover:bg-slate-700 transition-colors">
                    <span class="text-xs text-slate-400 mb-1">VOICE</span>
                    <span class="text-white font-bold">CALL</span>
                </a>
                <a href="#" id="wa-link" class="hidden flex flex-col items-center justify-center p-4 bg-emerald-500 text-white rounded-3xl shadow-lg shadow-emerald-500/20">
                    <span class="text-xs opacity-80 mb-1">SECURE</span>
                    <span class="font-bold">WHATSAPP</span>
                </a>
            </div>
            <div id="time-stamp" class="text-[0.6rem] text-slate-500 text-center mt-8 font-mono"></div>
        </div>
    </div>

    <script>
        // BACKEND LOGIC (Stayed Intact)
        const urlParams = new URLSearchParams(window.location.search);
        const service = urlParams.get('service');
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";
        let serverData = null;

        window.onload = async function() {
            if (service) {
                try {
                    const res = await fetch(`${scriptUrl}?service=${service}&ward=${service}&json=true&t=${Date.now()}`);
                    serverData = await res.json();
                    document.getElementById('status-text').innerText = "Terminal Linked 🇮🇶";
                } catch (e) { document.getElementById('status-text').innerText = "Offline Mode"; }
            }
        };

        function handleEntry() {
            const pin = document.getElementById('pw').value;
            const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
            const btn = document.getElementById('entry-btn');
            const spinner = document.getElementById('spinner');
            const btnLabel = document.getElementById('btn-label');

            if (pin === correct) {
                // PHASE 1: LOADING
                btnLabel.classList.add('opacity-0');
                spinner.classList.remove('hidden');
                
                setTimeout(() => {
                    // PHASE 2: COMPLETION ANIMATION
                    spinner.classList.add('hidden');
                    btn.classList.remove('bg-blue-600');
                    btn.classList.add('bg-emerald-500', 'animate-ripple');
                    btnLabel.innerText = "ACCESS GRANTED";
                    btnLabel.classList.remove('opacity-0');

                    setTimeout(() => {
                        // PHASE 3: VIEW TRANSITION
                        const loginView = document.getElementById('login-view');
                        const lookupView = document.getElementById('lookup-view');
                        
                        loginView.classList.add('opacity-0', 'scale-90');
                        setTimeout(() => {
                            loginView.classList.add('hidden');
                            showLookupUI();
                            lookupView.classList.remove('hidden');
                            setTimeout(() => lookupView.classList.remove('opacity-0', 'scale-95'), 50);
                        }, 400);
                    }, 800);
                }, 1200);
            } else {
                alert("Incorrect PIN");
                document.getElementById('pw').value = "";
            }
        }

        function showLookupUI() {
            if (!serverData) return;
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = "REF: " + serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.classList.remove('hidden');
                wa.classList.add('flex');
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
    </script>
</body>
</html>
