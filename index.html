<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On-Call Pro | Deep 3D</title>
    <style>
        :root {
            --panel-color: #252932;
            --panel-side: #16191f;
            --accent: #00d2ff;
            --btn-face: #3a4150;
            --btn-depth: #20242b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: #0a0c10;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            perspective: 2000px;
            overflow: hidden;
        }

        /* 3D Grid Background */
        body::before {
            content: ""; position: fixed; width: 200%; height: 200%;
            background-image: linear-gradient(var(--accent) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--accent) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05; transform: rotateX(60deg) translateY(-200px);
            z-index: -1;
        }

        .chassis {
            width: 90%; max-width: 380px;
            background: var(--panel-color);
            transform: rotateX(15deg) rotateY(-5deg);
            transform-style: preserve-3d;
            padding: 40px 25px;
            border-radius: 20px;
            box-shadow: 
                -10px 10px 0 var(--panel-side),
                -20px 20px 50px rgba(0,0,0,0.8);
            position: relative;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Floating Header */
        h2 { 
            margin: 0; font-weight: 900; text-transform: uppercase; 
            transform: translateZ(50px); /* Lifted way off the surface */
            text-shadow: 0 10px 10px rgba(0,0,0,0.5);
        }

        #status {
            font-size: 0.7rem; color: var(--accent);
            display: block; margin: 10px 0 30px;
            transform: translateZ(40px);
            font-weight: bold;
        }

        /* Deep Inset Inputs */
        .input-well {
            background: #111418;
            padding: 5px;
            border-radius: 12px;
            box-shadow: inset 5px 5px 15px #000;
            transform: translateZ(20px);
            margin-bottom: 25px;
        }

        select, input {
            width: 100%; padding: 15px; background: transparent;
            border: none; color: white !important; font-size: 1rem; outline: none;
        }

        input[type="password"] { text-align: center; font-size: 2rem; letter-spacing: 10px; }

        /* THE EXTRUDED 3D BUTTON */
        .btn-3d-wrap {
            position: relative; width: 100%; height: 60px;
            transform-style: preserve-3d; transform: translateZ(60px);
            margin-top: 20px; cursor: pointer;
        }

        .btn-3d-face {
            position: absolute; width: 100%; height: 100%;
            background: var(--btn-face);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            transform: translateZ(15px); /* Thickness of button */
            transition: 0.1s;
        }

        .btn-3d-side {
            position: absolute; width: 100%; height: 15px;
            background: var(--btn-depth);
            bottom: -15px; left: 0;
            transform-origin: top; transform: rotateX(-90deg);
        }

        .btn-3d-wrap:active .btn-3d-face { transform: translateZ(2px); }
        .btn-3d-wrap:active { transform: translateZ(47px); }

        /* LOOKUP SPECIFIC */
        .info-block {
            background: rgba(0,0,0,0.3);
            border-radius: 15px; padding: 20px;
            transform: translateZ(30px);
            border-left: 5px solid var(--accent);
            margin: 20px 0;
        }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; transform: translateZ(40px); }
        .action-3d {
            background: var(--accent); color: black; padding: 15px;
            text-decoration: none; text-align: center; font-weight: 900;
            box-shadow: 0 5px 0 #008eb0; border-radius: 8px;
        }

        .hidden { display: none !important; }

        /* TRANSITION */
        .flip-out { transform: rotateY(90deg) scale(0.5); opacity: 0; }
        .flip-in { animation: flipIn 0.7s forwards; }
        @keyframes flipIn {
            0% { transform: rotateY(-90deg) scale(0.5); opacity: 0; }
            100% { transform: rotateX(15deg) rotateY(-5deg) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="entry-screen" class="chassis">
        <h2>Auth_Terminal</h2>
        <span id="status">Secure Link: Operational</span>
        <div class="input-well">
            <input type="password" id="pw" inputmode="numeric" placeholder="PIN" maxlength="4">
        </div>
        <div class="btn-3d-wrap" onclick="handleEntry()">
            <div class="btn-3d-face" id="entry-btn-txt">Authorize</div>
            <div class="btn-3d-side"></div>
        </div>
    </div>

    <div id="lookup-view" class="chassis hidden">
        <h2 id="service-display">SERVICE</h2>
        <div class="info-block">
            <div id="name-display" style="font-size: 1.8rem; font-weight: 900;">...</div>
            <div id="phone-display" style="font-size: 1.2rem; margin-top: 10px; color: var(--accent);">-</div>
        </div>
        <div class="action-grid">
            <a href="#" id="call-link" class="action-3d">Call</a>
            <a href="#" id="wa-link" class="action-3d" style="display:none; background: #25D366; box-shadow: 0 5px 0 #128c7e;">WA</a>
        </div>
        <p id="time-stamp" style="font-size: 0.6rem; opacity: 0.4; margin-top: 25px; transform: translateZ(20px);"></p>
    </div>

    <div id="register-view" class="chassis hidden">
        <h2>Duty_Update 🇮🇶</h2>
        <div class="input-well">
            <select id="spec-select" onchange="toggleNameSection()">
                <option value="">-- Sector --</option>
                <option value="NS">Neuro</option>
                <option value="CT">Thoracic</option>
                <option value="GS">Surgery</option>
                <option value="US">Uro</option>
                <option value="ENT">ENT</option>
                <option value="H">Cardio</option>
                <option value="D">DeathCert</option>
                <option value="OP">OP Anes</option>
                <option value="ICU">ICU Anes</option>
                <option value="R">Radio</option>
                <option value="ON">Onco</option>
                <option value="PS">Plastic</option>
            </select>
        </div>

        <div id="name-section" class="hidden">
            <div class="input-well"><select id="name-list"></select></div>
            <div class="btn-3d-wrap" onclick="submitRegistration()">
                <div class="btn-3d-face">Commit</div>
                <div class="btn-3d-side"></div>
            </div>
        </div>
    </div>

<script>
    /* ORIGINAL LOGIC */
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    window.onload = async function() {
        if (mode === 'register') {
            prepareRegister();
        } else if (service) {
            prepareLookup();
        }
    };

    async function prepareRegister() {
        try {
            const response = await fetch(`${scriptUrl}?action=getNames`);
            const data = await response.json(); 
            allResidents = data.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
            document.getElementById('status').innerText = "Database Linked";
        } catch (e) { }
    }

    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');
        if (!selectedSpec) { nameSection.classList.add('hidden'); return; }
        let filtered;
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            filtered = allResidents.filter(res => res[1] === "A");
        } else if (selectedSpec === "D") {
            filtered = allResidents;
        } else {
            filtered = allResidents.filter(res => res[1] === selectedSpec);
        }
        if (filtered.length > 0) {
            dropdown.innerHTML = filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('');
            nameSection.classList.remove('hidden');
        }
    }

    async function prepareLookup() {
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                document.getElementById('status').innerText = "Target Locked";
            }
        } catch (e) { }
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            const chassis = document.querySelector('.chassis:not(.hidden)');
            chassis.classList.add('flip-out');
            setTimeout(() => {
                chassis.style.display = 'none';
                let next = mode === 'register' ? document.getElementById('register-view') : document.getElementById('lookup-view');
                if (mode !== 'register') showLookupUI();
                next.classList.remove('hidden');
                next.classList.add('flip-in');
            }, 700);
        } else { alert("DENIED"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = "UPTIME: " + serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'block';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
    }

    async function submitRegistration() {
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Success ✅");
        } catch (e) { alert("Error"); }
    }
</script>
</body>
</html>
