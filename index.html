<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHEDULER 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c20;
            --light: #2a2d34;
            --shadow: #0d0e11;
            --accent: #fbbf24;
            --emerald: #10b981;
            --crimson: #e11d48;
            --glow: 0 0 15px rgba(251, 191, 36, 0.8);
            --zebra: rgba(255, 255, 255, 0.02);
            --weekend-bg: rgba(16, 185, 129, 0.12); 
            /* Tightened Widths 🇮🇶 */
            --day-width: 70px;
            --date-width: 65px;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; overflow-x: hidden; }
        
        table { border-collapse: separate; border-spacing: 0; min-width: 1600px; }
        .ac-container { position: relative; width: 100%; min-width: 180px; direction: rtl; overflow: visible; }
        
        /* Column Colors */
        tr td:nth-child(1), thead th:nth-child(1) { --col-color: #fbbf24; }
        tr td:nth-child(2), thead th:nth-child(2) { --col-color: #60a5fa; }
        tr td:nth-child(3), thead th:nth-child(3) { --col-color: #a78bfa; }
        tr td:nth-child(4), thead th:nth-child(4) { --col-color: #f472b6; }
        tr td:nth-child(5), thead th:nth-child(5) { --col-color: #fb7185; }
        tr td:nth-child(6), thead th:nth-child(6) { --col-color: #38bdf8; }
        tr td:nth-child(7), thead th:nth-child(7) { --col-color: #c084fc; }
        tr td:nth-child(8), thead th:nth-child(8) { --col-color: #2dd4bf; }
        tr td:nth-child(9), thead th:nth-child(9) { --col-color: #94a3b8; }
        tr td:nth-child(10), thead th:nth-child(10) { --col-color: #fb923c; }
        tr td:nth-child(11), thead th:nth-child(11) { --col-color: #818cf8; }

        th { position: sticky; top: 0; background: var(--bg); z-index: 20; padding: 0.75rem 0.25rem; color: var(--col-color); font-weight: 800; font-size: 0.65rem; letter-spacing: 0.05em; border-bottom: 1px solid var(--light); text-shadow: 0 0 10px var(--col-color); text-transform: uppercase; }
        tr:nth-child(even) { background-color: var(--zebra); }

        /* Compact Sticky Columns 🇮🇶 */
        .day-col {
            position: sticky !important; right: 0 !important;
            width: var(--day-width) !important; min-width: var(--day-width) !important;
            background-color: var(--bg) !important; z-index: 30 !important;
            text-align: center; color: var(--accent); font-weight: 800; font-size: 0.7rem;
        }
        .date-col {
            position: sticky !important; right: var(--day-width) !important;
            width: var(--date-width) !important; min-width: var(--date-width) !important;
            background-color: var(--bg) !important; z-index: 30 !important;
            border-left: 1px solid rgba(255,255,255,0.1);
            color: #64748b; font-family: 'JetBrains Mono', monospace; text-align: center;
            font-size: 0.75rem;
        }

        /* Mobile/Tight View Logic */
        @media (max-width: 1024px) {
            .day-col { display: none !important; }
            .date-col { right: 0 !important; border-left: 2px solid var(--accent); }
            .year-text { display: none; }
        }
        
        thead th.day-col, thead th.date-col { z-index: 40 !important; top: 0; vertical-align: middle; }
        
        tr.weekend-row { background-color: var(--weekend-bg) !important; }
        tr.weekend-row td { --col-color: var(--emerald) !important; }
        tr.weekend-row td.day-col, tr.weekend-row td.date-col { background-color: #1a2e28 !important; }

        .cell-input, .ghost-text {
            width: 100%; padding: 0.6rem 0.5rem; font-size: 0.8rem; line-height: 1.4rem;
            font-family: 'IBM Plex Sans Arabic', sans-serif; text-align: right; box-sizing: border-box;
        }
        .cell-input { position: relative; background: transparent; color: #fff; border-radius: 0.5rem; outline: none; transition: all 0.2s; z-index: 5; border: 1px solid transparent; }
        .cell-input:focus { background: rgba(255, 255, 255, 0.03); border-color: var(--col-color); box-shadow: 0 0 8px var(--col-color); }
        
        .ghost-text { position: absolute; top: 0; right: 0; left: 0; bottom: 0; color: rgba(255, 255, 255, 0.4); pointer-events: none; white-space: pre; overflow: hidden; z-index: 1; direction: rtl; }
        .ghost-offset { color: transparent; visibility: visible; }

        .dropdown-arrow { position: absolute; left: 6px; top: 50%; transform: translateY(-50%); color: #475569; cursor: pointer; z-index: 10; font-size: 0.55rem; opacity: 0.5; }
        .prefilled { color: var(--col-color) !important; filter: brightness(0.9); font-weight: 600; }
        .new-entry { color: var(--crimson) !important; text-shadow: 0 0 10px var(--crimson); }

        .embossed-card { background: var(--bg); border-radius: 2rem; box-shadow: 20px 20px 60px var(--shadow), -10px -10px 40px var(--light); }
        .recessed-table-container { background: var(--bg); border-radius: 1rem; box-shadow: inset 8px 8px 16px var(--shadow), inset -4px -4px 12px var(--light); overflow-x: auto; }
        
        .led-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-flex; margin-right: 8px; }
        .led-loading { background: var(--crimson); animation: blink 1s infinite; }
        .led-ready { background: var(--emerald); box-shadow: 0 0 10px var(--emerald); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        .custom-menu { position: absolute; top: 100%; right: 0; width: 100%; max-height: 200px; overflow-y: auto; background: #1e2126; border: 1px solid var(--light); border-radius: 0.5rem; z-index: 100; box-shadow: 0 10px 30px var(--shadow); display: none; text-align: right; }
        .custom-menu div { padding: 0.5rem 0.8rem; cursor: pointer; color: #94a3b8; font-size: 0.75rem; }
        .custom-menu div:hover { background: var(--light); color: var(--col-color); }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="app-wrapper" class="max-w-full mx-auto opacity-30 pointer-events-none transition-opacity duration-700">
        <div class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-xl md:text-2xl font-black text-white" style="text-shadow: var(--glow)">HOSPITAL SCHEDULER 🇮🇶</h1>
                <div class="mt-2 flex items-center bg-black/40 px-4 py-1.5 rounded-full inline-flex border border-white/5">
                    <span id="led" class="led-dot led-loading"></span>
                    <span id="status-text" class="text-[0.6rem] font-bold uppercase tracking-widest text-rose-500">Syncing...</span>
                </div>
            </div>
            <div class="flex gap-2 items-center">
                <button onclick="triggerManualSync()" id="refresh-btn" class="text-[0.6rem] font-bold text-amber-500/40 border border-amber-500/10 px-4 py-2 rounded-full hover:bg-amber-500/10 transition-all">FORCE CACHE REFRESH</button>
                <div class="recessed-table-container px-4 py-1 flex items-center bg-black/20">
                    <input type="month" id="month-picker" class="bg-transparent text-amber-500 font-bold outline-none cursor-pointer text-sm" onchange="onMonthChange()">
                </div>
            </div>
        </div>

        <div id="main-table-area" class="embossed-card p-4">
            <div class="recessed-table-container max-h-[75vh]">
                <table id="schedule-table">
                    <thead><tr id="table-headers"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <div class="mt-6 flex justify-end">
                <button id="save-btn" onclick="saveAll()" class="bg-[#2a2d34] shadow-xl px-10 py-4 rounded-2xl text-amber-500 font-black text-xs uppercase tracking-widest transition-all hover:bg-black active:scale-95 border border-white/5">
                    UPDATE DATABASE
                </button>
            </div>
        </div>
    </div>

<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";
    const githubRawUrl = "https://raw.githubusercontent.com/mHub96/Exchange/main/data.json";
    
    const specialties = [
        { id: "NS", name: "Neurosurgery" }, { id: "CT", name: "Cardiothoracic" },
        { id: "GS", name: "General" }, { id: "US", name: "Urosurgery" },
        { id: "ENT", name: "ENT" }, { id: "H", name: "Cardiology" },
        { id: "D", name: "Death Cert" }, { id: "OP", name: "OT Anesth" },
        { id: "ICU", name: "ICU Anesth" }, { id: "R", name: "Radiology" },
        { id: "ON", name: "Oncology" }
    ];

    let nameData = {}; 
    let cachedFullData = null;

    window.onload = async () => {
        const now = new Date();
        const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        document.getElementById('month-picker').value = `${nextMonth.getFullYear()}-${String(nextMonth.getMonth() + 1).padStart(2, '0')}`;
        await startApp();
    };

    async function startApp() {
        try {
            const resp = await fetch(`${githubRawUrl}?t=${Date.now()}`);
            if (!resp.ok) throw new Error();
            const json = await resp.json();
            cachedFullData = json.data;
            renderApp(cachedFullData);
        } catch (e) {
            await loadFromGoogleDirectly();
        } finally {
            unlockTable();
        }
    }

    async function loadFromGoogleDirectly() {
        try {
            const respNames = await fetch(`${scriptUrl}?action=getNames`);
            const allResidents = await respNames.json();
            const monthVal = document.getElementById('month-picker').value;
            const respSchedule = await fetch(`${scriptUrl}?action=getSchedule&month=${monthVal}`);
            const schedule = await respSchedule.json();
            
            cachedFullData = { names: allResidents, schedule: schedule };
            renderApp(cachedFullData);
        } catch (e) { console.error("Sync Error"); }
    }

    function renderApp(data) {
        if (!data) return;
        specialties.forEach(spec => {
            if (spec.id === "OP" || spec.id === "ICU") nameData[spec.id] = data.names.filter(r => r[1] === "A").map(r => r[0]);
            else if (spec.id === "D") nameData[spec.id] = data.names.map(r => r[0]);
            else nameData[spec.id] = data.names.filter(r => r[1] === spec.id).map(r => r[0]);
        });

        generateTableStructure();
        const currentMonth = document.getElementById('month-picker').value;
        data.schedule.forEach(row => {
            const day = parseInt(row.date.split('/')[0]);
            const inputEl = document.getElementById(`input-${day}-${row.specCode}`);
            if (inputEl && row.name) {
                inputEl.value = row.name;
                inputEl.classList.add('prefilled');
            }
        });
    }

    function generateTableStructure() {
        const picker = document.getElementById('month-picker').value;
        const [year, month] = picker.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        
        document.getElementById('table-headers').innerHTML = specialties.map(s => `<th>${s.name}</th>`).join('') + `<th class="date-col">Date</th><th class="day-col">Day</th>`;

        const body = document.getElementById('table-body');
        let html = "";
        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(year, month-1, d);
            const dd = String(d).padStart(2, '0');
            const mm = String(month).padStart(2, '0');
            const dateStr = `${dd}/${mm}/${year}`;
            const dayName = new Intl.DateTimeFormat('ar-IQ', { weekday: 'short' }).format(dateObj);
            const isWeekend = (dateObj.getDay() === 5 || dateObj.getDay() === 6);
            
            html += `<tr class="${isWeekend ? 'weekend-row' : ''}">`;
            html += specialties.map(s => `
                <td><div class="ac-container">
                    <div class="ghost-text" id="ghost-${d}-${s.id}"></div>
                    <input type="text" class="cell-input" id="input-${d}-${s.id}" autocomplete="off" 
                        oninput="handleAC(this, '${s.id}', '${d}-${s.id}')" 
                        onkeydown="handleKeys(event, this, '${d}-${s.id}')" 
                        onblur="handleBlur('${d}-${s.id}')" data-date="${dateStr}" data-spec="${s.id}">
                    <span class="dropdown-arrow" onclick="toggleMenu('${d}-${s.id}', '${s.id}')">▼</span>
                    <div class="custom-menu" id="menu-${d}-${s.id}"></div>
                </div></td>`).join('');
            
            html += `<td class="date-col"><span class="text-white">${dd}</span><span class="opacity-30">/</span><span class="text-amber-500">${mm}</span><span class="year-text opacity-10">/${year}</span></td>`;
            html += `<td class="day-col">${dayName}</td></tr>`;
        }
        body.innerHTML = html;
    }

    function onMonthChange() {
        if (cachedFullData) renderApp(cachedFullData);
        else loadFromGoogleDirectly();
    }

    function handleAC(el, specId, uniqueId) {
        const ghost = document.getElementById(`ghost-${uniqueId}`);
        const val = el.value;
        const valLower = val.toLowerCase().trim();
        ghost.innerText = ""; ghost.removeAttribute('data-full-match'); el.classList.remove('prefilled');
        if (val.trim() === "") { el.classList.remove('new-entry'); return; }
        el.classList.add('new-entry');
        if (nameData[specId]) {
            const cleanInput = valLower.replace(/^د\.\s*/, "");
            const match = nameData[specId].find(name => {
                const nameLower = name.toLowerCase();
                return nameLower.startsWith(valLower) || nameLower.replace(/^د\.\s*/, "").startsWith(cleanInput);
            });
            if (match) {
                ghost.setAttribute('data-full-match', match);
                if (match.toLowerCase().startsWith(valLower)) {
                    ghost.innerHTML = `<span class="ghost-offset">${val}</span>${match.substring(val.length)}`;
                } else {
                    ghost.innerText = match;
                    ghost.style.color = "rgba(255, 255, 255, 0.1)";
                }
            }
        }
    }

    function handleKeys(e, el, uniqueId) {
        const ghost = document.getElementById(`ghost-${uniqueId}`);
        const fullMatch = ghost.getAttribute('data-full-match');
        if ((e.key === "Tab" || e.key === "ArrowRight") && fullMatch) {
            if (el.value !== fullMatch) { e.preventDefault(); el.value = fullMatch; }
        }
        if (e.key === "Enter") {
            e.preventDefault();
            if (fullMatch) el.value = fullMatch;
            const nextDay = parseInt(uniqueId.split('-')[0]) + 1;
            const nextEl = document.getElementById(`input-${nextDay}-${uniqueId.split('-')[1]}`);
            if (nextEl) nextEl.focus();
            else el.blur();
        }
    }

    function handleBlur(uniqueId) {
        setTimeout(() => {
            const ghost = document.getElementById(`ghost-${uniqueId}`);
            const input = document.getElementById(`input-${uniqueId}`);
            if (ghost.getAttribute('data-full-match')) input.value = ghost.getAttribute('data-full-match');
            ghost.innerText = "";
            document.getElementById(`menu-${uniqueId}`).style.display = "none";
        }, 200);
    }

    function toggleMenu(uniqueId, specId) {
        const menu = document.getElementById(`menu-${uniqueId}`);
        const open = menu.style.display === "block";
        document.querySelectorAll('.custom-menu').forEach(m => m.style.display = "none");
        if (!open) {
            menu.innerHTML = (nameData[specId] || []).map(n => `<div onmousedown="selectName('${uniqueId}', '${n}')">${n}</div>`).join('');
            menu.style.display = "block";
        }
    }

    function selectName(uniqueId, name) {
        const input = document.getElementById(`input-${uniqueId}`);
        input.value = name;
        input.classList.add('new-entry');
    }

    function unlockTable() {
        const wrapper = document.getElementById('app-wrapper');
        wrapper.classList.remove('opacity-30', 'pointer-events-none');
        document.getElementById('led').className = "led-dot led-ready";
        document.getElementById('status-text').innerText = "Ready 🇮🇶";
        document.getElementById('status-text').className = "text-[0.6rem] font-bold text-emerald-500 uppercase tracking-widest";
    }

    async function saveAll() {
        const btn = document.getElementById('save-btn');
        const activeInputs = Array.from(document.querySelectorAll('.cell-input')).filter(i => i.value.trim() !== "" && i.classList.contains('new-entry'));
        if (!activeInputs.length) return;
        btn.disabled = true; btn.innerText = "UPLOADING...";
        const bulkData = activeInputs.map(el => ({ date: el.dataset.date, specialty: el.dataset.spec, name: el.value.trim() }));
        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ payload: bulkData }) });
            btn.innerText = "SYNCED ✅";
            activeInputs.forEach(i => { i.classList.remove('new-entry'); i.classList.add('prefilled'); });
        } catch (e) { btn.innerText = "FAILED ⚠️"; }
        setTimeout(() => { btn.disabled = false; btn.innerText = "UPDATE DATABASE"; }, 2000);
    }

    function triggerManualSync() {
        alert("GitHub Action Trigger Required. Would you like the API setup for this? 🇮🇶");
    }
</script>
</body>
</html>
