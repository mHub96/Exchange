<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On-Call Pro | Kinetic</title>
    <style>
        :root {
            --safety-orange: #FF6B00;
            --steel-dark: #1A1C1E;
            --steel-light: #2C2F33;
            --text-white: #E1E1E1;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background: #0F1011;
            color: var(--text-white);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Industrial Background Grid */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,107,0,0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,107,0,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .kinetic-frame {
            width: 90%; max-width: 380px;
            background: var(--steel-dark);
            border: 4px solid var(--steel-light);
            position: relative;
            padding: 40px 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Decorative "Bolts" */
        .kinetic-frame::before, .kinetic-frame::after {
            content: ""; position: absolute; width: 10px; height: 10px;
            background: var(--steel-light); border-radius: 50%;
        }
        .kinetic-frame::before { top: 10px; left: 10px; box-shadow: 350px 0 0 var(--steel-light); }
        .kinetic-frame::after { bottom: 10px; left: 10px; box-shadow: 350px 0 0 var(--steel-light); }

        h2 { 
            font-weight: 900; text-transform: uppercase; letter-spacing: 1px; 
            border-left: 5px solid var(--safety-orange); padding-left: 15px;
            margin: 0 0 10px 0; font-size: 1.4rem;
        }

        #status { 
            font-size: 0.7rem; font-weight: 800; color: var(--safety-orange); 
            text-transform: uppercase; display: block; margin-bottom: 30px;
        }

        /* FORM ELEMENTS - INDUSTRIAL STYLE */
        select, input {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            background: #000;
            border: 2px solid var(--steel-light);
            border-radius: 0; /* Sharp industrial corners */
            color: var(--safety-orange) !important;
            font-family: 'Monaco', monospace;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus, select:focus { border-color: var(--safety-orange); }

        input[type="password"] {
            text-align: center; font-size: 2rem; letter-spacing: 10px;
        }

        /* HEAVY KINETIC BUTTON */
        .heavy-btn {
            width: 100%;
            padding: 20px;
            background: var(--safety-orange);
            color: black;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            box-shadow: 0 6px 0 #B34B00;
            transition: all 0.1s;
        }

        .heavy-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #B34B00;
        }

        .heavy-btn:disabled {
            background: #444; box-shadow: 0 6px 0 #222; color: #666;
        }

        /* DATA DISPLAY - PLATE STYLE */
        .info-plate {
            background: #25282C;
            border-top: 2px solid var(--safety-orange);
            padding: 25px;
            margin: 25px 0;
            transform: translateX(-10px);
            animation: slidePlate 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slidePlate { to { transform: translateX(0); } }

        .name-tag { font-size: 2rem; font-weight: 900; line-height: 1; margin: 10px 0; }
        
        .badge {
            font-size: 0.65rem; font-weight: 900; padding: 4px 8px;
            background: #3B3F45; color: var(--safety-orange);
            display: inline-block; margin-bottom: 10px;
        }

        .action-row { display: flex; gap: 5px; margin-top: 20px; }
        .action-link {
            flex: 1; padding: 18px; text-decoration: none; font-weight: 900;
            font-size: 0.8rem; text-align: center; background: var(--steel-light); color: white;
            transition: 0.2s;
        }
        .action-link:hover { background: var(--safety-orange); color: black; }
        .wa-btn { border-bottom: 4px solid #25D366; }

        .hidden { display: none !important; }

        /* Transition Animations */
        .plate-exit { transform: scale(0.9) rotateX(20deg); opacity: 0; }
    </style>
</head>
<body>

    <div id="entry-screen" class="kinetic-frame">
        <h2>Auth.Module</h2>
        <span id="status">Systems Nominal // Ready</span>
        <input type="password" id="pw" inputmode="numeric" placeholder="PIN" maxlength="4">
        <button id="entry-btn" class="heavy-btn" onclick="handleEntry()" disabled>Engage Link</button>
    </div>

    <div id="lookup-view" class="kinetic-frame hidden">
        <div id="service-display" class="badge">SERVICE_ID</div>
        <div id="name-display" class="name-tag">...</div>
        
        <div class="info-plate">
            <span style="font-size: 0.6rem; font-weight: 900; opacity: 0.5;">COMMS_CHANNEL</span>
            <div id="phone-display" style="font-size: 1.5rem; font-weight: 800; margin-top: 5px;">-</div>
        </div>

        <div class="action-row">
            <a href="#" id="call-link" class="action-link">VOICE</a>
            <a href="#" id="wa-link" class="action-link wa-btn" style="display:none;">WHATSAPP</a>
        </div>
        <p id="time-stamp" style="font-size: 0.6rem; opacity: 0.4; margin-top: 25px; font-weight: 900;"></p>
    </div>

    <div id="register-view" class="kinetic-frame hidden">
        <div class="badge">REGISTRY_UNIT 🇮🇶</div>
        <h2>Duty.Log</h2>
        <span id="status">Update Required</span>
        
        <select id="spec-select" onchange="toggleNameSection()">
            <option value="">-- SELECT SECTOR --</option>
            <option value="NS">Neuro</option>
            <option value="CT">Thoracic</option>
            <option value="GS">Surgery</option>
            <option value="US">Uro</option>
            <option value="ENT">ENT</option>
            <option value="H">Cardio</option>
            <option value="D">DeathCert</option>
            <option value="OP">OP Anes</option>
            <option value="ICU">ICU Anes</option>
            <option value="R">Radio</option>
            <option value="ON">Onco</option>
            <option value="PS">Plastic</option>
        </select>

        <div id="name-section" class="hidden">
            <select id="name-list"></select>
            <button id="submit-btn" class="heavy-btn" onclick="submitRegistration()">Confirm Entry</button>
        </div>
    </div>

<script>
    /* 100% ORIGINAL SCRIPT LOGIC */
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    window.onload = async function() {
        if (mode === 'register') {
            document.getElementById('entry-title').innerText = "MD Login";
            prepareRegister();
        } else if (service) {
            document.getElementById('entry-title').innerText = "Access";
            prepareLookup();
        } else {
            document.getElementById('status').innerText = "⚠️ Link Disconnected";
        }
    };

    async function prepareRegister() {
        document.getElementById('status').innerText = "Synchronizing Data...";
        try {
            const response = await fetch(`${scriptUrl}?action=getNames`);
            const data = await response.json(); 
            allResidents = data.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
            document.getElementById('status').innerText = "Uplink Established";
            document.getElementById('entry-btn').disabled = false;
        } catch (e) { document.getElementById('status').innerText = "Sync Failed"; }
    }

    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');
        if (!selectedSpec) { nameSection.classList.add('hidden'); return; }

        let filtered;
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            filtered = allResidents.filter(res => res[1] === "A");
        } else if (selectedSpec === "D") {
            filtered = allResidents;
        } else {
            filtered = allResidents.filter(res => res[1] === selectedSpec);
        }

        if (filtered.length > 0) {
            dropdown.innerHTML = filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('');
            nameSection.classList.remove('hidden');
        } else {
            dropdown.innerHTML = "<option value=''>Zero Matches</option>";
            nameSection.classList.remove('hidden');
        }
    }

    async function prepareLookup() {
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                document.getElementById('status').innerText = "Target Located";
                document.getElementById('entry-btn').disabled = false;
            } else {
                document.getElementById('status').innerText = "No Target Data";
            }
        } catch (e) { document.getElementById('status').innerText = "Offline"; }
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            // MECHANICAL TRANSITION
            const frame = document.getElementById('entry-screen');
            frame.classList.add('plate-exit');
            
            setTimeout(() => {
                frame.style.display = 'none';
                if (mode === 'register') {
                    document.getElementById('register-view').classList.remove('hidden');
                } else {
                    showLookupUI();
                }
            }, 400);
        } else { alert("ACCESS DENIED"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = "STAMP: " + serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'block';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
        document.getElementById('lookup-view').classList.remove('hidden');
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "UPLOADING...";
        btn.disabled = true;
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            alert("UPLOAD COMPLETE");
        } catch (e) { alert("ERROR"); }
        finally { btn.innerText = "Confirm Entry"; btn.disabled = false; }
    }
</script>
</body>
</html>
