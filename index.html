<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REVOLUTIONARY SCHEDULER 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1115;
            --card: #1a1c20;
            --accent: #fbbf24;
            --emerald: #10b981;
            --crimson: #e11d48;
            --column-width: 280px;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; }
        
        /* THE REVOLUTION: Horizontal scrolling of vertical tracks */
        .board-container {
            display: flex;
            gap: 1.5rem;
            padding: 2rem;
            overflow-x: auto;
            height: 85vh;
            align-items: flex-start;
            scroll-behavior: smooth;
        }

        .specialty-track {
            flex: 0 0 var(--column-width);
            background: var(--card);
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            max-height: 100%;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .track-header {
            padding: 1.25rem;
            background: rgba(251, 191, 36, 0.05);
            border-bottom: 2px solid var(--accent);
            border-radius: 1.5rem 1.5rem 0 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .track-header h2 { color: var(--accent); font-weight: 900; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; }

        .days-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        /* The Day Card */
        .day-box {
            position: relative;
            background: rgba(255,255,255,0.02);
            margin-bottom: 0.75rem;
            border-radius: 1rem;
            padding: 0.5rem;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .day-box:focus-within { border-color: var(--accent); background: rgba(251, 191, 36, 0.03); }
        .day-box.weekend { background: rgba(16, 185, 129, 0.08); }

        .day-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
            padding: 0 0.5rem;
            color: #64748b;
        }

        /* Input Styling */
        .cell-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            text-align: right;
            font-size: 0.9rem;
            padding: 0.5rem;
            z-index: 5;
            position: relative;
        }

        .ghost-text {
            position: absolute;
            bottom: 10px;
            right: 12px;
            color: rgba(255,255,255,0.2);
            pointer-events: none;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-size: 0.9rem;
            direction: rtl;
            white-space: pre;
        }

        .dropdown-arrow { position: absolute; left: 10px; bottom: 12px; font-size: 0.6rem; color: #475569; cursor: pointer; }

        /* Status Colors */
        .prefilled { color: var(--accent) !important; font-weight: 600; opacity: 0.8; }
        .new-entry { color: var(--crimson) !important; font-weight: 700; }

        .custom-menu {
            position: absolute; top: 100%; right: 0; width: 100%; max-height: 200px;
            overflow-y: auto; background: #1e2126; z-index: 100; display: none;
            border-radius: 0.5rem; border: 1px solid var(--accent);
        }
        .custom-menu div { padding: 0.7rem; font-size: 0.8rem; text-align: right; cursor: pointer; color: #94a3b8; }
        .custom-menu div:hover { background: var(--accent); color: #000; }

    </style>
</head>
<body>

    <div id="app-wrapper" class="opacity-30 pointer-events-none transition-opacity duration-700">
        <div class="p-6 flex justify-between items-center border-b border-white/5 bg-card">
            <h1 class="text-xl font-black text-white uppercase tracking-tighter">Iraqi Med-Scheduler <span class="text-amber-500">v2.0</span> 🇮🇶</h1>
            <div class="flex gap-4 items-center">
                <input type="month" id="month-picker" class="bg-black text-amber-500 p-2 rounded-lg font-bold border border-white/10" onchange="generateBoard()">
                <button onclick="saveAll()" class="bg-amber-500 text-black px-6 py-2 rounded-lg font-black text-xs uppercase hover:bg-white transition-colors">Sync Data</button>
            </div>
        </div>

        <div class="board-container" id="board">
            </div>
    </div>

<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";
    const specialties = [
        { id: "NS", name: "Neurosurgery" }, { id: "CT", name: "Cardiothoracic" },
        { id: "GS", name: "General Surg" }, { id: "US", name: "Urosurgery" },
        { id: "ENT", name: "ENT" }, { id: "H", name: "Cardiology" },
        { id: "D", name: "Death Certs" }, { id: "OP", name: "OT Anaesth" },
        { id: "ICU", name: "ICU Anaesth" }, { id: "R", name: "Radiology" },
        { id: "ON", name: "Oncology" }
    ];

    let nameData = {};

    window.onload = () => {
        const now = new Date();
        const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        document.getElementById('month-picker').value = `${nextMonth.getFullYear()}-${String(nextMonth.getMonth() + 1).padStart(2, '0')}`;
        initSync();
    };

    async function initSync() {
        try {
            const r = await fetch(`${scriptUrl}?action=getNames`);
            const all = await r.json();
            specialties.forEach(s => {
                if (s.id === "OP" || s.id === "ICU") nameData[s.id] = all.filter(x => x[1] === "A").map(x => x[0]);
                else if (s.id === "D") nameData[s.id] = all.map(x => x[0]);
                else nameData[s.id] = all.filter(x => x[1] === s.id).map(x => x[0]);
            });
            generateBoard();
        } catch(e) { unlock(); }
    }

    function generateBoard() {
        const picker = document.getElementById('month-picker').value;
        const [year, month] = picker.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        const board = document.getElementById('board');
        board.innerHTML = "";

        specialties.forEach(spec => {
            const track = document.createElement('div');
            track.className = 'specialty-track';
            
            let html = `<div class="track-header"><h2>${spec.name}</h2></div><div class="days-list">`;
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month-1, d);
                const isWeekend = (dateObj.getDay() === 5 || dateObj.getDay() === 6);
                const dayName = new Intl.DateTimeFormat('ar-IQ', { weekday: 'short' }).format(dateObj);
                const dateStr = `${String(d).padStart(2, '0')}/${String(month).padStart(2, '0')}`;
                
                html += `
                    <div class="day-box ${isWeekend ? 'weekend' : ''}">
                        <div class="day-label"><span>${dateStr}</span><span>${dayName}</span></div>
                        <div class="relative">
                            <div class="ghost-text" id="ghost-${d}-${spec.id}"></div>
                            <input type="text" class="cell-input" id="input-${d}-${spec.id}" 
                                oninput="handleAC(this, '${spec.id}', '${d}-${spec.id}')"
                                onkeydown="handleKeys(event, this, '${d}-${spec.id}')"
                                onblur="handleBlur('${d}-${spec.id}')"
                                data-date="${dateStr}/${year}" data-spec="${spec.id}" autocomplete="off">
                            <span class="dropdown-arrow" onclick="toggleMenu('${d}-${spec.id}', '${spec.id}')">▼</span>
                            <div class="custom-menu" id="menu-${d}-${spec.id}"></div>
                        </div>
                    </div>`;
            }
            html += `</div>`;
            track.innerHTML = html;
            board.appendChild(track);
        });
        fetchSchedule();
    }

    // THE NATURAL VERTICAL LOCK 🇮🇶
    function handleKeys(e, el, uid) {
        const ghost = document.getElementById(`ghost-${uid}`);
        const full = ghost.getAttribute('data-full');

        if (e.key === "Enter") {
            e.preventDefault();
            if (full) { el.value = full; el.classList.add('new-entry'); }
            
            const [d, sid] = uid.split('-');
            const nextDay = parseInt(d) + 1;
            const nextEl = document.getElementById(`input-${nextDay}-${sid}`);
            
            if (nextEl) {
                nextEl.focus();
                nextEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                el.blur();
            }
        }
    }

    function handleAC(el, sid, uid) {
        const ghost = document.getElementById(`ghost-${uid}`);
        const val = el.value.trim().toLowerCase();
        ghost.innerText = ""; ghost.removeAttribute('data-full');
        if (!val || !nameData[sid]) return;

        const cleanIn = val.replace(/^د\.\s*/, "");
        const match = nameData[sid].find(n => n.toLowerCase().includes(cleanIn));
        
        if (match) {
            ghost.setAttribute('data-full', match);
            let disp = el.value.startsWith("د.") ? match : match.replace(/^د\.\s*/, "");
            if (disp.toLowerCase().startsWith(val)) {
                ghost.innerHTML = `<span style="color:transparent">${el.value}</span>${disp.substring(el.value.length)}`;
            } else {
                ghost.innerText = disp;
                ghost.style.opacity = "0.3";
            }
        }
    }

    function toggleMenu(uid, sid) {
        const m = document.getElementById(`menu-${uid}`);
        const open = m.style.display === "block";
        document.querySelectorAll('.custom-menu').forEach(x => x.style.display = 'none');
        if (!open) {
            m.innerHTML = (nameData[sid] || []).map(n => `<div onmousedown="selectName('${uid}', '${n}')">${n}</div>`).join('');
            m.style.display = "block";
        }
    }

    function selectName(uid, name) {
        const i = document.getElementById(`input-${uid}`);
        i.value = name; i.classList.add('new-entry');
        document.getElementById(`ghost-${uid}`).innerText = "";
    }

    function handleBlur(uid) {
        setTimeout(() => {
            const m = document.getElementById(`menu-${uid}`);
            if (m) m.style.display = 'none';
        }, 200);
    }

    async function fetchSchedule() {
        const m = document.getElementById('month-picker').value;
        try {
            const r = await fetch(`${scriptUrl}?action=getSchedule&month=${m}`);
            const data = await r.json();
            data.forEach(row => {
                const d = parseInt(row.date.split('/')[0]);
                const el = document.getElementById(`input-${d}-${row.specCode}`);
                if (el && row.name) { el.value = row.name; el.classList.add('prefilled'); }
            });
        } finally { unlock(); }
    }

    function unlock() {
        document.getElementById('app-wrapper').style.opacity = "1";
        document.getElementById('app-wrapper').style.pointerEvents = "auto";
    }

    async function saveAll() {
        const inputs = Array.from(document.querySelectorAll('.cell-input')).filter(x => x.value.trim() !== "");
        const payload = inputs.map(x => ({ date: x.dataset.date, specialty: x.dataset.spec, name: x.value.trim() }));
        const btn = document.querySelector('button[onclick="saveAll()"]');
        btn.innerText = "Saving...";
        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ payload }) });
            btn.innerText = "Saved ✅";
            inputs.forEach(x => { x.classList.remove('new-entry'); x.classList.add('prefilled'); });
        } catch(e) { btn.innerText = "Error ⚠️"; }
        setTimeout(() => btn.innerText = "Sync Data", 2000);
    }
</script>
</body>
</html>
