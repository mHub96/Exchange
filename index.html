<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On-Call Pro | Tactical Deck</title>
    <style>
        :root {
            --bg: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --primary: #448aff;
            --text: #4d5d7d;
            --accent: #ff5252;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            margin: 0; padding: 20px;
            background: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .deck {
            width: 100%; max-width: 420px;
            padding: 35px 25px;
            background: var(--bg);
            border-radius: 40px;
            box-shadow: 20px 20px 60px var(--shadow-dark), 
                        -20px -20px 60px var(--shadow-light);
            text-align: center;
        }

        h2 { font-weight: 800; font-size: 1.4rem; color: var(--text); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        #status { font-size: 0.75rem; font-weight: 600; color: var(--shadow-dark); margin-bottom: 30px; display: block; }

        /* NEUMORPHIC INPUTS */
        .neu-inset {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: var(--bg);
            border: none;
            border-radius: 15px;
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }

        input[type="password"] {
            text-align: center; font-size: 1.5rem; letter-spacing: 10px; font-weight: 900;
        }

        /* NEUMORPHIC BUTTONS */
        .neu-btn {
            width: 100%;
            padding: 18px;
            margin-top: 10px;
            background: var(--bg);
            border: none;
            border-radius: 15px;
            box-shadow: 6px 6px 12px var(--shadow-dark), 
                        -6px -6px 12px var(--shadow-light);
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s all ease;
        }

        .neu-btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
            transform: scale(0.98);
        }

        .neu-btn:disabled { color: var(--shadow-dark); cursor: not-allowed; }

        /* LOOKUP SPECIFIC STYLE */
        .info-display {
            padding: 25px;
            border-radius: 30px;
            margin: 20px 0;
            box-shadow: inset 8px 8px 16px var(--shadow-dark), 
                        inset -8px -8px 16px var(--shadow-light);
            background: var(--bg);
        }

        .service-badge {
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 900;
            margin-bottom: 10px;
            display: block;
        }

        .name-label { font-size: 1.8rem; font-weight: 800; color: var(--text); margin: 5px 0; }
        .phone-val { font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-top: 10px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .action-link {
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.8rem;
            background: var(--bg);
            box-shadow: 5px 5px 10px var(--shadow-dark), 
                        -5px -5px 10px var(--shadow-light);
            color: var(--text);
        }

        .action-link.wa { color: #25D366; }

        /* REGISTRY SPECIFIC STYLE */
        .registry-panel {
            margin-top: 20px;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 8px 8px 16px var(--shadow-dark), 
                        -8px -8px 16px var(--shadow-light);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="deck">
        <div id="entry-screen">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">🛡️</div>
            <h2>Secure Gateway</h2>
            <span id="status">Syncing Neural Link...</span>
            <input type="password" id="pw" class="neu-inset" inputmode="numeric" placeholder="••••" maxlength="4">
            <button id="entry-btn" class="neu-btn" onclick="handleEntry()" disabled>Authorize Access</button>
        </div>

        <div id="lookup-view" class="hidden">
            <h2>Live Status</h2>
            <span id="status">On-Call Data Active</span>
            <div class="info-display">
                <span id="service-display" class="service-badge">SERVICE</span>
                <div id="name-display" class="name-label">...</div>
                <div id="phone-display" class="phone-val">-</div>
            </div>
            <div class="btn-grid">
                <a href="#" id="call-link" class="action-link">📞 CALL</a>
                <a href="#" id="wa-link" class="action-link wa" style="display:none;">💬 WA</a>
            </div>
            <p id="time-stamp" style="font-size: 0.6rem; margin-top: 20px; opacity: 0.6;"></p>
        </div>

        <div id="register-view" class="hidden">
            <div style="font-size: 1.5rem; margin-bottom: 5px;">✍️</div>
            <h2>Registry Deck</h2>
            <span id="status">Database Master Console 🇮🇶</span>
            
            <div class="registry-panel">
                <select id="spec-select" class="neu-inset" onchange="toggleNameSection()">
                    <option value="">Select Specialty</option>
                    <option value="NS">Neuro</option>
                    <option value="CT">Thoracic</option>
                    <option value="GS">Surgery</option>
                    <option value="US">Uro</option>
                    <option value="ENT">ENT</option>
                    <option value="H">Cardio</option>
                    <option value="D">DeathCertificates</option>
                    <option value="OP">OP Anesthesia</option>
                    <option value="ICU">ICU Anesthesia</option>
                    <option value="R">Radio</option>
                    <option value="ON">Onco</option>
                    <option value="PS">Plastic</option>
                </select>

                <div id="name-section" class="hidden">
                    <select id="name-list" class="neu-inset"></select>
                    <button id="submit-btn" class="neu-btn" onclick="submitRegistration()">Commit Update</button>
                </div>
            </div>
        </div>
    </div>

<script>
    // CORE LOGIC REMAINS UNTOUCHED
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    window.onload = async function() {
        if (mode === 'register') {
            document.getElementById('entry-title').innerText = "Registry Access";
            prepareRegister();
        } else if (service) {
            document.getElementById('entry-title').innerText = "Ward Access";
            prepareLookup();
        } else {
            document.getElementById('status').innerText = "⚠️ LINK ERROR";
        }
    };

    async function prepareRegister() {
        document.getElementById('status').innerText = "Syncing Records...";
        try {
            const response = await fetch(`${scriptUrl}?action=getNames`);
            const data = await response.json(); 
            allResidents = data.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
            document.getElementById('status').innerText = "Database Online ✅";
            document.getElementById('entry-btn').disabled = false;
        } catch (e) { document.getElementById('status').innerText = "Offline Mode"; }
    }

    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');
        if (!selectedSpec) { nameSection.classList.add('hidden'); return; }
        let filtered;
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            filtered = allResidents.filter(res => res[1] === "A");
        } else if (selectedSpec === "D") {
            filtered = allResidents;
        } else {
            filtered = allResidents.filter(res => res[1] === selectedSpec);
        }
        if (filtered.length > 0) {
            dropdown.innerHTML = filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('');
            nameSection.classList.remove('hidden');
        } else {
            dropdown.innerHTML = "<option value=''>Empty Records</option>";
            nameSection.classList.remove('hidden');
        }
    }

    async function prepareLookup() {
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                document.getElementById('status').innerText = "Authorized ✅";
                document.getElementById('entry-btn').disabled = false;
            } else {
                document.getElementById('status').innerText = "No Duty Found";
            }
        } catch (e) { document.getElementById('status').innerText = "Network Error"; }
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            document.getElementById('entry-screen').style.display = 'none';
            if (mode === 'register') {
                document.getElementById('register-view').classList.remove('hidden');
            } else {
                showLookupUI();
            }
        } else { alert("INVALID CREDENTIALS"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = "SYNCED: " + serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'block';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
        document.getElementById('lookup-view').classList.remove('hidden');
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "COMMITTING...";
        btn.disabled = true;
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            alert("REGISTRY UPDATED");
        } catch (e) { alert("SYNC FAILED"); }
        finally { btn.innerText = "Commit Update"; btn.disabled = false; }
    }
</script>
</body>
</html>
