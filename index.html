<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On-Call Pro | Blueprint</title>
    <style>
        :root {
            --paper: #0047AB; /* Engineering Blue */
            --ink: #FFFFFF;
            --ink-dim: rgba(255, 255, 255, 0.6);
            --grid: rgba(255, 255, 255, 0.1);
            --highlight: #00FFCC; /* Glow Cyan */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Courier New', Courier, monospace; }

        body {
            margin: 0; padding: 20px;
            background-color: var(--paper);
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--ink);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .terminal {
            width: 100%; max-width: 400px;
            border: 2px solid var(--ink);
            padding: 30px;
            position: relative;
            background: var(--paper);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
        }

        /* Loading Spinner */
        .loader {
            width: 20px; height: 20px;
            border: 2px solid var(--ink);
            border-top-color: var(--highlight);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        h2 { font-size: 1.2rem; margin: 0 0 20px 0; text-transform: uppercase; border-bottom: 2px solid var(--ink); padding-bottom: 10px; }

        .status-bar { font-size: 0.7rem; margin-bottom: 20px; text-transform: uppercase; color: var(--highlight); }

        /* Blueprint Style Inputs */
        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: transparent;
            border: 1px solid var(--ink);
            color: var(--ink) !important;
            font-size: 1rem;
            border-radius: 0;
            outline: none;
        }

        select option { background: var(--paper); color: white; }

        input[type="password"] {
            text-align: center; font-size: 1.8rem; letter-spacing: 15px; background: rgba(255,255,255,0.05);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--ink);
            color: var(--paper);
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active { filter: invert(1); }
        button:disabled { background: var(--ink-dim); cursor: not-allowed; }

        /* UI Sections */
        .info-box { border: 1px dashed var(--ink); padding: 20px; margin: 20px 0; position: relative; }
        .label { font-size: 0.6rem; position: absolute; top: -10px; left: 10px; background: var(--paper); padding: 0 5px; color: var(--highlight); }

        .big-text { font-size: 1.8rem; font-weight: bold; margin: 10px 0; }
        
        .action-row { display: flex; gap: 10px; }
        .btn-outline {
            flex: 1; text-align: center; padding: 12px; border: 1px solid var(--ink);
            text-decoration: none; color: var(--ink); font-size: 0.8rem; font-weight: bold;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="terminal">
        <div id="entry-screen">
            <h2>System_Auth_v3</h2>
            <div class="status-bar"><span id="loader-icon" class="loader"></span><span id="status">Initializing...</span></div>
            <input type="password" id="pw" inputmode="numeric" placeholder="PIN" maxlength="4">
            <button id="entry-btn" onclick="handleEntry()" disabled>Access_Link</button>
        </div>

        <div id="lookup-view" class="hidden">
            <h2 id="service-display">SERVICE_NAME</h2>
            <div class="status-bar">Live_Feed_Active</div>
            <div class="info-box">
                <span class="label">ON_CALL_PERSONNEL</span>
                <div id="name-display" class="big-text">---</div>
                <div id="phone-display" style="color: var(--highlight);">---</div>
            </div>
            <div class="action-row">
                <a href="#" id="call-link" class="btn-outline">VOICE_CALL</a>
                <a href="#" id="wa-link" class="btn-outline" style="display:none; color: #00FFCC; border-color: #00FFCC;">WHATSAPP</a>
            </div>
            <p id="time-stamp" style="font-size: 0.6rem; margin-top: 20px; opacity: 0.7;"></p>
        </div>

        <div id="register-view" class="hidden">
            <h2>Duty_Registry</h2>
            <div class="status-bar">Mode: Database_Update 🇮🇶</div>
            
            <select id="spec-select" onchange="toggleNameSection()">
                <option value="">[SELECT_SPECIALTY]</option>
                <option value="NS">NEURO</option>
                <option value="CT">THORACIC</option>
                <option value="GS">SURGERY</option>
                <option value="US">URO</option>
                <option value="ENT">ENT</option>
                <option value="H">CARDIO</option>
                <option value="D">DEATH_CERT</option>
                <option value="OP">OP_ANESTHESIA</option>
                <option value="ICU">ICU_ANESTHESIA</option>
                <option value="R">RADIO</option>
                <option value="ON">ONCO</option>
                <option value="PS">PLASTIC</option>
            </select>

            <div id="name-section" class="hidden">
                <select id="name-list"></select>
                <button id="submit-btn" onclick="submitRegistration()">Commit_Changes</button>
            </div>
        </div>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    window.onload = async function() {
        if (mode === 'register') {
            await prepareRegister();
        } else if (service) {
            await prepareLookup();
        } else {
            updateStatus("Error: No_Service_ID", false);
        }
    };

    function updateStatus(text, showLoader) {
        document.getElementById('status').innerText = text;
        document.getElementById('loader-icon').style.display = showLoader ? 'inline-block' : 'none';
    }

    async function prepareRegister() {
        updateStatus("Syncing_Registry...", true);
        try {
            const response = await fetch(`${scriptUrl}?action=getNames`);
            allResidents = await response.json();
            allResidents.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
            updateStatus("Registry_Synced", false);
            document.getElementById('entry-btn').disabled = false;
        } catch (e) { updateStatus("Offline_Error", false); }
    }

    async function prepareLookup() {
        updateStatus("Fetching_Duty...", true);
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                updateStatus("Link_Ready", false);
                document.getElementById('entry-btn').disabled = false;
            } else { updateStatus("No_Duty_Assigned", false); }
        } catch (e) { updateStatus("Link_Failed", false); }
    }

    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');
        if (!selectedSpec) { nameSection.classList.add('hidden'); return; }
        
        let filtered = (selectedSpec === "OP" || selectedSpec === "ICU") ? 
                       allResidents.filter(res => res[1] === "A") : 
                       (selectedSpec === "D" ? allResidents : allResidents.filter(res => res[1] === selectedSpec));

        dropdown.innerHTML = filtered.length ? 
            filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('') : 
            "<option value=''>Empty</option>";
        nameSection.classList.remove('hidden');
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            document.getElementById('entry-screen').classList.add('hidden');
            if (mode === 'register') {
                document.getElementById('register-view').classList.remove('hidden');
            } else {
                showLookupUI();
            }
        } else { alert("ACCESS_DENIED"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = "Update_Ref: " + serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'block';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
        document.getElementById('lookup-view').classList.remove('hidden');
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "WRITING...";
        btn.disabled = true;
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("DB_UPDATED_SUCCESS");
        } catch (e) { alert("WRITE_ERROR"); }
        finally { btn.innerText = "Commit_Changes"; btn.disabled = false; }
    }
</script>
</body>
</html>
