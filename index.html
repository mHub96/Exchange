<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Portal | Arctic Crystal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f4f8; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4); }
            100% { box-shadow: 0 0 0 25px rgba(52, 211, 153, 0); }
        }
        .animate-ripple { animation: ripple 0.8s ease-out; }
        
        #shield { position: fixed; inset: 0; background: #f0f4f8; z-index: 100; transition: opacity 0.5s; }
        
        /* Smooth scale-up for names */
        .name-reveal { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <div id="shield"></div>

    <div class="fixed inset-0 z-[-1]">
        <div class="absolute top-[10%] left-[10%] w-[50%] h-[50%] bg-blue-200/40 blur-[100px] rounded-full"></div>
        <div class="absolute bottom-[10%] right-[10%] w-[50%] h-[50%] bg-emerald-100/40 blur-[100px] rounded-full"></div>
    </div>

    <div id="main-card" class="w-full max-w-sm glass-card p-8 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] transition-all duration-500">
        
        <div id="login-view">
            <div class="text-center mb-8">
                <h1 id="title-text" class="text-slate-800 text-2xl font-bold tracking-tight">Medical Terminal</h1>
                <p id="status-text" class="text-slate-500 text-[0.65rem] mt-2 uppercase tracking-[0.2em] font-bold">Secure Connection Active</p>
            </div>
            <div class="space-y-6">
                <input type="password" id="pw" inputmode="numeric" maxlength="4" placeholder="••••" 
                    class="w-full bg-white/50 border border-slate-200 rounded-2xl py-5 text-center text-3xl tracking-[1.5rem] text-blue-600 focus:border-blue-400 outline-none shadow-sm transition-all">
                
                <button id="entry-btn" onclick="handleEntry()" 
                    class="relative w-full py-5 bg-slate-800 text-white font-bold rounded-2xl transition-all shadow-lg active:scale-95 overflow-hidden">
                    <span id="btn-label">UNLOCK</span>
                    <div id="spinner" class="hidden absolute inset-0 flex items-center justify-center bg-slate-800">
                        <svg class="animate-spin h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </div>
                </button>
            </div>
        </div>

        <div id="register-view" class="hidden space-y-4 name-reveal">
            <h2 class="text-slate-800 text-xl font-bold text-center mb-6">Duty Registration 🇮🇶</h2>
            <select id="spec-select" onchange="toggleNameSection()" class="w-full bg-white border border-slate-200 rounded-xl p-4 text-slate-700 outline-none focus:border-blue-400 shadow-sm">
                <option value="">-- Sector --</option>
                <option value="NS">Neuro</option><option value="CT">Thoracic</option>
                <option value="GS">Surgery</option><option value="US">Uro</option>
                <option value="ENT">ENT</option><option value="H">Cardio</option>
                <option value="D">DeathCert</option><option value="OP">Anes (OP)</option>
                <option value="ICU">Anes (ICU)</option><option value="R">Radio</option>
                <option value="ON">Onco</option><option value="PS">Plastic</option>
            </select>
            <div id="name-section" class="hidden space-y-4 name-reveal">
                <select id="name-list" class="w-full bg-white border border-slate-200 rounded-xl p-4 text-slate-700 outline-none shadow-sm"></select>
                <button id="submit-btn" onclick="submitRegistration()" class="w-full py-5 bg-blue-600 text-white font-bold rounded-2xl transition-all shadow-md active:scale-95">
                    COMMIT CHANGES
                </button>
            </div>
        </div>

        <div id="lookup-view" class="hidden text-center name-reveal">
            <span id="service-display" class="bg-blue-100 text-blue-600 px-4 py-1 rounded-full text-[0.65rem] font-bold tracking-widest border border-blue-200 uppercase">UNIT_ACCESS</span>
            <h2 id="name-display" class="text-slate-800 text-3xl font-bold mt-4">...</h2>
            <p id="phone-display" class="text-slate-500 text-lg mt-1">-</p>
            
            <div class="grid grid-cols-2 gap-3 mt-8">
                <a href="#" id="call-link" class="p-4 bg-white rounded-3xl border border-slate-200 text-slate-700 font-bold shadow-sm hover:bg-slate-50 transition-colors">CALL</a>
                <a href="#" id="wa-link" class="hidden p-4 bg-emerald-500 text-white rounded-3xl font-bold shadow-lg shadow-emerald-200">WHATSAPP</a>
            </div>
            <div id="time-stamp" class="text-[0.6rem] text-slate-400 mt-8 font-mono"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const service = urlParams.get('service');
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

        let serverData = null;
        let allResidents = [];

        window.onload = async function() {
            setTimeout(() => { 
                document.getElementById('shield').style.opacity = '0'; 
                setTimeout(() => document.getElementById('shield').remove(), 500);
            }, 300);

            if (mode === 'register') {
                document.getElementById('title-text').innerText = "Doctor Login";
                const res = await fetch(`${scriptUrl}?action=getNames`);
                allResidents = (await res.json()).sort((a,b) => a[0].localeCompare(b[0], 'ar'));
            } else if (service) {
                const res = await fetch(`${scriptUrl}?service=${service}&ward=${service}&json=true&t=${Date.now()}`);
                serverData = await res.json();
            }
        };

        function toggleNameSection() {
            const val = document.getElementById('spec-select').value;
            const list = document.getElementById('name-list');
            if (!val) { document.getElementById('name-section').classList.add('hidden'); return; }
            
            let filtered = (val === "OP" || val === "ICU") ? allResidents.filter(r => r[1] === "A") : (val === "D" ? allResidents : allResidents.filter(r => r[1] === val));
            
            list.innerHTML = filtered.map(r => `<option value="${r[0]}">${r[0]}</option>`).join('');
            document.getElementById('name-section').classList.remove('hidden');
        }

        function handleEntry() {
            const pin = document.getElementById('pw').value;
            const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
            const btn = document.getElementById('entry-btn');
            
            if (pin === correct) {
                document.getElementById('spinner').classList.remove('hidden');
                document.getElementById('btn-label').classList.add('opacity-0');
                
                setTimeout(() => {
                    btn.classList.replace('bg-slate-800', 'bg-emerald-500');
                    btn.classList.add('animate-ripple');
                    document.getElementById('spinner').classList.add('hidden');
                    document.getElementById('btn-label').innerText = "AUTHORIZED";
                    document.getElementById('btn-label').classList.remove('opacity-0');
                    
                    setTimeout(() => {
                        document.getElementById('login-view').classList.add('hidden');
                        const next = mode === 'register' ? document.getElementById('register-view') : document.getElementById('lookup-view');
                        if (mode !== 'register') showLookupUI();
                        next.classList.remove('hidden');
                    }, 800);
                }, 1000);
            } else { 
                alert("Incorrect PIN"); 
                document.getElementById('pw').value = "";
            }
        }

        function showLookupUI() {
            if (!serverData) return;
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = "UPDATED: " + serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                document.getElementById('wa-link').classList.remove('hidden');
                document.getElementById('wa-link').href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }

        async function submitRegistration() {
            const btn = document.getElementById('submit-btn');
            btn.innerText = "UPLOADING...";
            const payload = {
                action: "submitDuty",
                specialty: document.getElementById('spec-select').value,
                name: document.getElementById('name-list').value
            };
            try {
                await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                btn.classList.replace('bg-blue-600', 'bg-emerald-500');
                btn.classList.add('animate-ripple');
                btn.innerText = "COMMIT SUCCESSFUL ✅";
            } catch (e) { alert("ERROR"); btn.innerText = "RETRY"; }
        }
    </script>
</body>
</html>
