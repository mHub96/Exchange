<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHEDULER 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=JetBrains+Mono:wght@700&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c20;
            --light: #2a2d34;
            --shadow: #0d0e11;
            --accent: #fbbf24;
            --zebra: rgba(255, 255, 255, 0.02);
            --weekend-bg: rgba(16, 185, 129, 0.12); 
            --day-w: 55px;
            --date-w: 80px;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; }
        
        /* Table Layout */
        table { border-collapse: separate; border-spacing: 0; min-width: 1600px; }
        .ac-container { position: relative; width: 100%; direction: rtl; }
        
        th { position: sticky; top: 0; background: var(--bg); z-index: 20; padding: 1rem 0.5rem; color: var(--accent); font-weight: 800; font-size: 0.7rem; border-bottom: 2px solid var(--light); text-transform: uppercase; }
        tr:nth-child(even) { background-color: var(--zebra); }

        /* --- THE STICKY UNIT (NO GAPS) 🇮🇶 --- */
        .day-col, .date-col {
            position: sticky !important;
            background-color: #1a1c20 !important; /* Solid color prevents transparency */
            z-index: 30 !important;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .day-col { 
            right: 0 !important; 
            width: var(--day-w) !important; 
            color: var(--accent); 
            font-size: 0.75rem; 
            font-weight: 800;
        }

        .date-col { 
            right: var(--day-w) !important; 
            width: var(--date-w) !important; 
            color: #64748b; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 0.8rem;
            border-left: 1px solid rgba(255,255,255,0.1); /* Visible divider from main data */
        }

        @media (max-width: 768px) {
            .date-display { display: flex; flex-direction: row-reverse; justify-content: center; gap: 2px; }
            .year-text { display: none; }
        }

        thead th.day-col, thead th.date-col { z-index: 40 !important; top: 0; border-bottom: 2px solid var(--light); }
        tr.weekend-row { background-color: var(--weekend-bg) !important; }
        tr.weekend-row .day-col, tr.weekend-row .date-col { background-color: #1a2e28 !important; }

        /* Inputs */
        .cell-input { width: 100%; padding: 0.8rem; font-size: 0.85rem; font-family: 'IBM Plex Sans Arabic', sans-serif; text-align: right; background: transparent; color: #fff; outline: none; border: 1px solid transparent; }
        .cell-input:focus { background: rgba(255, 255, 255, 0.05); border-color: var(--accent); }
        .ghost-text { position: absolute; top: 0; right: 0; left: 0; bottom: 0; color: rgba(255, 255, 255, 0.2); pointer-events: none; direction: rtl; padding: 0.8rem; font-size: 0.85rem; }
        .ghost-offset { color: transparent; }
        .prefilled { color: #94a3b8 !important; opacity: 0.5; }

        /* Design Cards */
        .embossed-card { background: var(--bg); border-radius: 1.5rem; box-shadow: 20px 20px 60px var(--shadow); border: 1px solid rgba(255,255,255,0.02); margin-top: 1rem; }
        .recessed-container { background: var(--bg); border-radius: 1rem; box-shadow: inset 8px 8px 16px var(--shadow); overflow-x: auto; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app-wrapper" class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-white">SCHEDULER 🇮🇶</h1>
            <input type="month" id="month-picker" class="bg-black/40 text-amber-500 font-bold p-2 rounded-lg border border-white/10" onchange="generateTable()">
        </div>

        <div class="embossed-card p-4">
            <div class="recessed-container max-h-[70vh]">
                <table id="schedule-table">
                    <thead><tr id="table-headers"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <div class="mt-6 flex justify-end">
                <button id="save-btn" onclick="saveAll()" class="bg-[#2a2d34] px-10 py-4 rounded-xl text-amber-500 font-black text-xs tracking-widest border border-white/5">
                    UPDATE DATABASE
                </button>
            </div>
        </div>
    </div>

<script>
    // 1. YOUR GOOGLE SCRIPT URL HERE
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";
    
    const specialties = [
        { id: "NS", name: "Neuro" }, { id: "CT", name: "Cardio" },
        { id: "GS", name: "General" }, { id: "US", name: "Uro" },
        { id: "ENT", name: "ENT" }, { id: "H", name: "Heart" },
        { id: "D", name: "Death" }, { id: "OP", name: "OT-A" },
        { id: "ICU", name: "ICU-A" }
    ];

    let nameData = {}; 

    window.onload = () => {
        const now = new Date();
        const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        document.getElementById('month-picker').value = `${nextMonth.getFullYear()}-${String(nextMonth.getMonth() + 1).padStart(2, '0')}`;
        initDataSync();
    };

    async function initDataSync() {
        try {
            const respNames = await fetch(`${scriptUrl}?action=getNames`);
            const allResidents = await respNames.json();
            specialties.forEach(spec => {
                nameData[spec.id] = allResidents.filter(r => r[1] === spec.id || spec.id === "D").map(r => r[0]);
            });
            generateTable(); 
        } catch (e) { generateTable(); }
    }

    function generateTable() {
        const picker = document.getElementById('month-picker').value;
        const [year, month] = picker.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        
        let hHtml = specialties.map(s => `<th>${s.name}</th>`).join('') + `<th class="date-col">Date</th><th class="day-col">Day</th>`;
        document.getElementById('table-headers').innerHTML = hHtml;

        const body = document.getElementById('table-body');
        body.innerHTML = "";
        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(year, month-1, d);
            const dd = String(d).padStart(2, '0');
            const mm = String(month).padStart(2, '0');
            const dayShort = new Intl.DateTimeFormat('ar-IQ', { weekday: 'short' }).format(dateObj);
            
            const tr = document.createElement('tr');
            if (dateObj.getDay() === 5 || dateObj.getDay() === 6) tr.classList.add('weekend-row');
            
            let rHtml = specialties.map(s => `
                <td><div class="ac-container">
                    <div class="ghost-text" id="ghost-${d}-${s.id}"></div>
                    <input type="text" class="cell-input" id="input-${d}-${s.id}" 
                        oninput="handleAC(this, '${s.id}', '${d}-${s.id}')" 
                        onkeydown="handleKeys(event, this, ${d}, '${s.id}')" 
                        onblur="handleBlur('${d}-${s.id}')" data-date="${dd}/${mm}/${year}" data-spec="${s.id}">
                </div></td>`).join('');
            
            rHtml += `
                <td class="date-col">
                    <div class="date-display">
                        <span>${dd}</span><span>/</span><span class="text-amber-500/40">${mm}</span><span class="year-text">/${year}</span>
                    </div>
                </td>
                <td class="day-col">${dayShort}</td>`;
            tr.innerHTML = rHtml;
            body.appendChild(tr);
        }
        fetchExistingSchedule();
    }

    // THE FIXED VERTICAL ENTER KEY 🇮🇶
    function handleKeys(e, el, currentDay, specId) {
        const ghost = document.getElementById(`ghost-${currentDay}-${specId}`);
        const fullMatch = ghost.getAttribute('data-full-match');

        if (e.key === "Enter") {
            e.preventDefault(); 
            if (fullMatch) el.value = fullMatch;
            
            // Move DOWN to the next day in the same column
            const nextDay = currentDay + 1;
            const nextEl = document.getElementById(`input-${nextDay}-${specId}`);
            if (nextEl) nextEl.focus();
            else el.blur();
        }
    }

    async function fetchExistingSchedule() {
        const monthVal = document.getElementById('month-picker').value;
        try {
            const resp = await fetch(`${scriptUrl}?action=getSchedule&month=${monthVal}`);
            const schedule = await resp.json();
            schedule.forEach(row => {
                const day = parseInt(row.date.split('/')[0]);
                const inputEl = document.getElementById(`input-${day}-${row.specCode}`);
                if (inputEl && row.name) { inputEl.value = row.name; inputEl.classList.add('prefilled'); }
            });
        } catch(e){}
    }

    function handleAC(el, specId, uniqueId) {
        const ghost = document.getElementById(`ghost-${uniqueId}`);
        const val = el.value.trim().toLowerCase();
        ghost.innerText = ""; ghost.removeAttribute('data-full-match');
        if (!val || !nameData[specId]) return;
        const match = nameData[specId].find(n => n.toLowerCase().includes(val));
        if (match) {
            ghost.setAttribute('data-full-match', match);
            ghost.innerHTML = `<span class="ghost-offset">${el.value}</span>${match.substring(el.value.length)}`;
        }
    }

    function handleBlur(uniqueId) {
        setTimeout(() => { 
            const g = document.getElementById(`ghost-${uniqueId}`);
            if (g) g.innerText = ""; 
        }, 150);
    }

    async function saveAll() {
        const btn = document.getElementById('save-btn');
        btn.innerText = "UPLOADING..."; btn.disabled = true;
        const activeInputs = Array.from(document.querySelectorAll('.cell-input')).filter(i => i.value.trim() !== "");
        const bulkData = activeInputs.map(el => ({ date: el.dataset.date, specialty: el.dataset.spec, name: el.value.trim() }));
        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ payload: bulkData }) });
            btn.innerText = "SYNCED ✅";
        } catch (e) { btn.innerText = "ERROR ⚠️"; }
        setTimeout(() => { btn.innerText = "UPDATE DATABASE"; btn.disabled = false; }, 2000);
    }
</script>
</body>
</html>
