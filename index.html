<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHEDULER 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=JetBrains+Mono:wght@700&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c20;
            --light: #2a2d34;
            --shadow: #0d0e11;
            --accent: #fbbf24;
            --emerald: #10b981;
            --crimson: #e11d48;
            --zebra: rgba(255, 255, 255, 0.02);
            --weekend-bg: rgba(16, 185, 129, 0.1); 
            --day-w: 50px;
            --date-w: 70px;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; overflow-x: hidden; }
        
        /* Table Structure */
        table { border-collapse: separate; border-spacing: 0; min-width: 1600px; table-layout: fixed; }
        .ac-container { position: relative; width: 100%; direction: rtl; }
        
        th { position: sticky; top: 0; background: var(--bg); z-index: 20; padding: 1rem 0.5rem; color: var(--accent); font-weight: 800; font-size: 0.7rem; border-bottom: 1px solid var(--light); text-transform: uppercase; letter-spacing: 0.1em; }
        tr:nth-child(even) { background-color: var(--zebra); }

        /* --- STICKY COLUMNS (FIXED GAP) 🇮🇶 --- */
        .day-col {
            position: sticky !important; right: 0 !important;
            width: var(--day-w) !important; 
            background-color: var(--bg) !important; z-index: 30 !important;
            text-align: center; color: var(--accent); font-weight: 800; font-size: 0.75rem;
            border-left: 1px solid rgba(255,255,255,0.1); /* Line between table and sticky area */
        }
        .date-col {
            position: sticky !important; 
            right: var(--day-w) !important; /* Locks exactly to the edge of the day-col */
            width: var(--date-w) !important;
            background-color: var(--bg) !important; z-index: 30 !important;
            color: #64748b; font-family: 'JetBrains Mono', monospace; text-align: center;
            font-size: 0.8rem;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .date-display { display: flex; flex-direction: row-reverse; justify-content: center; gap: 2px; }
            .year-text { display: none; }
            .day-col { font-size: 0.65rem !important; }
            .date-col { font-size: 0.75rem !important; }
        }

        thead th.day-col, thead th.date-col { z-index: 40 !important; top: 0; }
        tr.weekend-row { background-color: var(--weekend-bg) !important; }
        tr.weekend-row td.day-col, tr.weekend-row td.date-col { background-color: #1a2e28 !important; }

        /* Inputs & Design */
        .cell-input { width: 100%; padding: 0.8rem; font-size: 0.85rem; font-family: 'IBM Plex Sans Arabic', sans-serif; text-align: right; background: transparent; color: #fff; border-radius: 0.8rem; outline: none; border: 1px solid transparent; transition: 0.2s; }
        .cell-input:focus { background: rgba(255, 255, 255, 0.05); border-color: var(--accent); box-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }
        
        .ghost-text { position: absolute; top: 0; right: 0; left: 0; bottom: 0; color: rgba(255, 255, 255, 0.2); pointer-events: none; white-space: pre; overflow: hidden; direction: rtl; padding: 0.8rem; font-size: 0.85rem; }
        .ghost-offset { color: transparent; }
        
        .prefilled { color: #94a3b8 !important; opacity: 0.6; }
        .new-entry { color: var(--crimson) !important; font-weight: 700; text-shadow: 0 0 8px var(--crimson); }

        .embossed-card { background: var(--bg); border-radius: 2rem; box-shadow: 20px 20px 60px var(--shadow), -10px -10px 40px var(--light); border: 1px solid rgba(255,255,255,0.02); }
        .recessed-container { background: var(--bg); border-radius: 1.5rem; box-shadow: inset 8px 8px 16px var(--shadow), inset -4px -4px 12px var(--light); overflow-x: auto; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app-wrapper" class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tight">SCHEDULER 🇮🇶</h1>
                <p class="text-[0.6rem] uppercase tracking-[0.3em] text-emerald-500 font-bold mt-1">Live Database Connection</p>
            </div>
            <div class="recessed-container px-4 py-1 flex items-center bg-black/20">
                <input type="month" id="month-picker" class="bg-transparent text-amber-500 font-bold outline-none p-2 cursor-pointer" onchange="generateTable()">
            </div>
        </div>

        <div class="embossed-card p-6">
            <div class="recessed-container max-h-[70vh]">
                <table id="schedule-table">
                    <thead><tr id="table-headers"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <div class="mt-8 flex justify-end">
                <button id="save-btn" onclick="saveAll()" class="bg-[#2a2d34] shadow-2xl px-12 py-5 rounded-2xl text-amber-500 font-black text-xs tracking-widest hover:scale-105 active:scale-95 transition-all border border-white/5">
                    UPDATE DATABASE
                </button>
            </div>
        </div>
    </div>

<script>
    const scriptUrl = "YOUR_SCRIPT_URL_HERE"; // Keep your URL here
    const specialties = [
        { id: "NS", name: "Neuro" }, { id: "CT", name: "Cardio" },
        { id: "GS", name: "General" }, { id: "US", name: "Uro" },
        { id: "ENT", name: "ENT" }, { id: "H", name: "Heart" },
        { id: "D", name: "Death" }, { id: "OP", name: "OT-A" },
        { id: "ICU", name: "ICU-A" }
    ];

    let nameData = {}; 

    window.onload = () => {
        const now = new Date();
        const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        document.getElementById('month-picker').value = `${nextMonth.getFullYear()}-${String(nextMonth.getMonth() + 1).padStart(2, '0')}`;
        // Placeholder for initial load - you'd call your actual data sync here
        generateTable();
    };

    function generateTable() {
        const picker = document.getElementById('month-picker').value;
        const [year, month] = picker.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        
        let hHtml = specialties.map(s => `<th>${s.name}</th>`).join('') + `<th class="date-col">Date</th><th class="day-col">Day</th>`;
        document.getElementById('table-headers').innerHTML = hHtml;

        const body = document.getElementById('table-body');
        body.innerHTML = "";
        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(year, month-1, d);
            const dd = String(d).padStart(2, '0');
            const mm = String(month).padStart(2, '0');
            const dayShort = new Intl.DateTimeFormat('ar-IQ', { weekday: 'short' }).format(dateObj);
            
            const tr = document.createElement('tr');
            if (dateObj.getDay() === 5 || dateObj.getDay() === 6) tr.classList.add('weekend-row');
            
            let rHtml = specialties.map(s => `
                <td><div class="ac-container">
                    <div class="ghost-text" id="ghost-${d}-${s.id}"></div>
                    <input type="text" class="cell-input" id="input-${d}-${s.id}" 
                        oninput="handleAC(this, '${s.id}', '${d}-${s.id}')" 
                        onkeydown="handleKeys(event, this, ${d}, '${s.id}')" 
                        onblur="handleBlur('${d}-${s.id}')" data-date="${dd}/${mm}/${year}" data-spec="${s.id}">
                </div></td>`).join('');
            
            rHtml += `
                <td class="date-col">
                    <div class="date-display">
                        <span>${dd}</span><span>/</span><span class="text-amber-500/40">${mm}</span><span class="year-text">/${year}</span>
                    </div>
                </td>
                <td class="day-col">${dayShort}</td>`;
            tr.innerHTML = rHtml;
            body.appendChild(tr);
        }
    }

    // THE KEYBOARD FIX 🇮🇶
    function handleKeys(e, el, currentDay, specId) {
        const ghost = document.getElementById(`ghost-${currentDay}-${specId}`);
        const fullMatch = ghost.getAttribute('data-full-match');

        if (e.key === "Enter") {
            e.preventDefault(); // Stop default "Next field" behavior
            if (fullMatch) el.value = fullMatch;
            
            // STRICTLY MOVE VERTICALLY DOWN
            const nextDay = currentDay + 1;
            const nextEl = document.getElementById(`input-${nextDay}-${specId}`);
            
            if (nextEl) {
                nextEl.focus();
            } else {
                el.blur(); // Bottom of table reached
            }
        }
    }

    // Auto-complete logic
    function handleAC(el, specId, uniqueId) {
        const ghost = document.getElementById(`ghost-${uniqueId}`);
        const val = el.value.trim().toLowerCase();
        ghost.innerText = ""; ghost.removeAttribute('data-full-match');
        if (!val || !nameData[specId]) return;
        const match = nameData[specId].find(n => n.toLowerCase().includes(val));
        if (match) {
            ghost.setAttribute('data-full-match', match);
            ghost.innerHTML = `<span class="ghost-offset">${el.value}</span>${match.substring(el.value.length)}`;
        }
    }

    function handleBlur(uniqueId) {
        setTimeout(() => { 
            const g = document.getElementById(`ghost-${uniqueId}`);
            if (g) g.innerText = ""; 
        }, 150);
    }
</script>
</body>
</html>
