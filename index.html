<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>On-Call Pro | Liquid Access</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --cy-green: #32D74B;
            --cy-violet: #AF52DE;
            --ios-bg: #000000;
            --fluid-panel: rgba(10, 10, 12, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-sec: #8E8E93;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background: var(--ios-bg);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* The Fluid Background blobs */
        .fluid-blob {
            position: fixed; width: 400px; height: 400px;
            background: linear-gradient(var(--cy-violet), #4a38ca);
            filter: blur(70px); opacity: 0.15; z-index: -1;
            border-radius: 50%;
            animation: moveBlobs 20s infinite alternate;
        }

        @keyframes moveBlobs {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(30%, 30%); }
        }

        .container {
            width: 90%; max-width: 380px;
            padding: 40px 25px;
            background: var(--fluid-panel);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--border);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            text-align: center;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(0.9); opacity: 0;
            animation: viewEntry 0.6s forwards;
        }

        @keyframes viewEntry { to { transform: scale(1); opacity: 1; } }

        /* The Face-ID style Grid */
        .bio-grid {
            width: 70px; height: 70px;
            margin: 0 auto 20px;
            background-image: 
                linear-gradient(var(--cy-green) 1px, transparent 1px),
                linear-gradient(90deg, var(--cy-green) 1px, transparent 1px);
            background-size: 14px 14px;
            border-radius: 12px;
            animation: gridScan 2s linear infinite;
        }

        @keyframes gridScan {
            0% { opacity: 0.5; box-shadow: 0 0 10px rgba(50, 215, 75, 0.2); }
            50% { opacity: 1; box-shadow: 0 0 20px rgba(50, 215, 75, 0.5); }
            100% { opacity: 0.5; box-shadow: 0 0 10px rgba(50, 215, 75, 0.2); }
        }

        h2 { font-weight: 700; font-size: 1.6rem; letter-spacing: -1px; margin-bottom: 5px; }
        #status, .subtitle { font-size: 0.85rem; color: var(--text-sec); margin-bottom: 30px; letter-spacing: 0.5px;}

        /* Modern, minimal forms */
        select, input {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: white !important;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus { border-color: var(--cy-green); background: rgba(50, 215, 75, 0.1); }

        select option { background-color: #1c1c1e; color: white; }

        input[type="password"] {
            text-align: center; font-size: 2.2rem; letter-spacing: 15px; font-weight: 900;
        }

        /* Buttons with Digital Shimmer */
        .cy-btn {
            position: relative;
            width: 100%;
            padding: 18px;
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            overflow: hidden;
            transition: 0.3s;
        }

        .cy-btn::before {
            content: '';
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .cy-btn:hover::before { left: 100%; }
        .cy-btn:active { transform: scale(0.96); opacity: 0.9; }
        .cy-btn:disabled { background: #334155; color: #777; cursor: not-allowed; box-shadow: none; }

        /* LOOKUP SPECIFIC UI */
        .bio-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            border-radius: 25px;
            padding: 30px 20px;
            margin: 25px 0;
            border: 1px solid var(--border);
        }

        .name-label { font-size: 2.2rem; font-weight: 800; color: white; margin: 10px 0; }
        .service-badge {
            background: var(--ios-blue);
            color: white;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
        }

        .btn-row { display: flex; gap: 12px; margin-top: 25px; }
        .action-btn {
            flex: 1; padding: 16px; border-radius: 15px;
            text-decoration: none; font-weight: 700; font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .call { background: white; color: black; }
        .wa { background: #25D366; color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="fluid-blob"></div>

    <div id="entry-screen" class="container">
        <div class="bio-grid"></div>
        <h2 id="entry-title">Resident Portal</h2>
        <p id="status">Secure Biometric Verified</p>
        <input type="password" id="pw" inputmode="numeric" placeholder="••••" maxlength="4">
        <button id="entry-btn" class="cy-btn" onclick="handleEntry()" disabled>AUTHORIZE ACCESS</button>
    </div>

    <div id="lookup-view" class="container hidden">
        <div id="service-display" class="service-badge">SERVICE</div>
        <div id="name-display" class="name-label">Loading...</div>
        <div class="bio-card">
            <div style="opacity: 0.6; font-size: 0.7rem; letter-spacing: 1.5px; margin-bottom: 8px;">DIRECT COMMS LINE</div>
            <div id="phone-display" style="font-size: 1.5rem; font-weight: 700; color: var(--ios-blue);">-</div>
        </div>
        <div class="btn-row">
            <a href="#" id="call-link" class="action-btn call"><span>📞</span> Voice</a>
            <a href="#" id="wa-link" class="action-btn wa" style="display:none;"><span>💬</span> WhatsApp</a>
        </div>
        <p id="time-stamp" style="font-size: 0.65rem; opacity: 0.5; margin-top: 25px;"></p>
    </div>

    <div id="register-view" class="container hidden">
        <div style="font-size: 1.5rem; margin-bottom: 5px;">✍️</div>
        <h2>Data Update</h2>
        <p class="subtitle">Assign today's on-call resident 🇮🇶</p>
        
        <select id="spec-select" onchange="toggleNameSection()">
            <option value="">Choose Specialty</option>
            <option value="NS">Neuro</option>
            <option value="CT">Thoracic</option>
            <option value="GS">Surgery</option>
            <option value="US">Uro</option>
            <option value="ENT">ENT</option>
            <option value="H">Cardio</option>
            <option value="D">DeathCertificates</option>
            <option value="OP">OP Anesthesia</option>
            <option value="ICU">ICU Anesthesia</option>
            <option value="R">Radio</option>
            <option value="ON">Onco</option>
            <option value="PS">Plastic</option>
        </select>

        <div id="name-section" class="hidden">
            <select id="name-list"></select>
            <button id="submit-btn" class="cy-btn" onclick="submitRegistration()">COMMIT CHANGE</button>
        </div>
    </div>

<script>
    /* ALL YOUR ORIGINAL CORE MECHANISM REMAINS UNTOUCHED */
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    // Helper for entry button state
    document.getElementById('pw').addEventListener('input', function() {
        document.getElementById('entry-btn').disabled = this.value.length !== 4;
    });

    window.onload = async function() {
        if (mode === 'register') {
            document.getElementById('entry-title').innerText = "Security Login";
            prepareRegister();
        } else if (service) {
            document.getElementById('entry-title').innerText = "System Access";
            prepareLookup();
        } else {
            document.getElementById('status').innerText = "⚠️ Link Incomplete";
        }
    };

    async function prepareRegister() {
        document.getElementById('status').innerText = "Fetching Master List...";
        try {
            const response = await fetch(`${scriptUrl}?action=getNames`);
            const data = await response.json(); 
            allResidents = data.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
            document.getElementById('status').innerText = "Biometrics Synced ✅";
            // Enabling the button once master list is synced
            document.getElementById('entry-btn').disabled = document.getElementById('pw').value.length !== 4;
        } catch (e) { 
            document.getElementById('status').innerText = "Offline Mode - Check Internet"; 
        }
    }

    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');
        if (!selectedSpec) {
            nameSection.classList.add('hidden');
            return;
        }
        let filtered;
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            filtered = allResidents.filter(res => res[1] === "A");
        } else if (selectedSpec === "D") {
            filtered = allResidents;
        } else {
            filtered = allResidents.filter(res => res[1] === selectedSpec);
        }
        if (filtered.length > 0) {
            dropdown.innerHTML = filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('');
            nameSection.classList.remove('hidden');
        } else {
            dropdown.innerHTML = "<option value=''>No residents found</option>";
            nameSection.classList.remove('hidden');
        }
    }

    async function prepareLookup() {
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                document.getElementById('status').innerText = "Link Verified ✅";
                document.getElementById('entry-btn').disabled = document.getElementById('pw').value.length !== 4;
            } else {
                document.getElementById('status').innerText = "No data found for today";
            }
        } catch (e) { document.getElementById('status').innerText = "Offline Mode"; }
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            // TRANSITION MECHANISM
            const currentView = document.getElementById('entry-screen');
            currentView.style.transform = "scale(0.8) translateY(20px)";
            currentView.style.opacity = "0";
            
            setTimeout(() => {
                currentView.style.display = 'none';
                if (mode === 'register') {
                    document.getElementById('register-view').classList.remove('hidden');
                } else {
                    showLookupUI();
                }
            }, 500); // Matches the scale/opacity transition time

        } else { alert("ACCESS DENIED"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'flex';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
        document.getElementById('lookup-view').classList.remove('hidden');
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Saving...";
        btn.disabled = true;
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            alert("Database Updated Successfully ✅");
        } catch (e) {
            alert("Error connecting to server");
        } finally {
            btn.innerText = "Commit Change";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
