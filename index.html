<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>On-Call Pro</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #000000;
            --card-bg: rgba(28, 28, 30, 0.8);
            --secondary-bg: rgba(44, 44, 46, 0.6);
            --separator: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-sec: #8E8E93;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background: var(--ios-bg);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1c1c1e, #000000);
        }

        .container {
            width: 92%; max-width: 380px;
            padding: 34px 24px;
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 38px;
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { font-weight: 700; font-size: 1.5rem; letter-spacing: -0.5px; margin: 10px 0 5px 0; }
        #status, .subtitle { font-size: 0.9rem; color: var(--text-sec); margin-bottom: 25px; }

        /* Modern iOS Inset Grouped List */
        .ios-group {
            background: var(--secondary-bg);
            border-radius: 14px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        select, input {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: none;
            color: white !important;
            font-size: 17px;
            outline: none;
            appearance: none;
            display: block;
        }

        .divider {
            height: 0.5px;
            background: var(--separator);
            margin-left: 16px;
        }

        input[type="password"] {
            text-align: center;
            font-size: 2rem;
            letter-spacing: 12px;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        button:active { transform: scale(0.97); opacity: 0.8; }
        button:disabled { background: #3a3a3c; color: #8e8e93; }

        .service-badge {
            background: rgba(0, 122, 255, 0.15);
            color: var(--ios-blue);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 8px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 24px;
            margin: 20px 0;
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .name-label { font-size: 2.2rem; font-weight: 800; color: white; margin-bottom: 5px; }
        
        .btn-row { display: flex; gap: 12px; margin-top: 25px; }
        .action-btn {
            flex: 1;
            padding: 15px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .call { background: white; color: black; }
        .wa { background: #34C759; color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="entry-screen" class="container">
        <div style="font-size: 3.5rem; margin-bottom: 10px;">👤</div>
        <h2 id="entry-title">Resident Portal</h2>
        <p id="status">Secure Link Verified</p>
        <div class="ios-group">
            <input type="password" id="pw" inputmode="numeric" placeholder="••••" maxlength="4" oninput="toggleEntryBtn()">
        </div>
        <button id="entry-btn" onclick="handleEntry()" disabled>Continue</button>
    </div>

    <div id="lookup-view" class="container hidden">
        <div id="service-display" class="service-badge">SERVICE</div>
        <div id="name-display" class="name-label">Loading...</div>
        <div class="info-card">
            <div style="color: var(--text-sec); font-size: 0.75rem; font-weight: 600; margin-bottom: 8px; letter-spacing: 0.5px;">MOBILE</div>
            <div id="phone-display" style="font-size: 1.4rem; font-weight: 600; letter-spacing: 1px;">-</div>
        </div>
        <div class="btn-row">
            <a href="#" id="call-link" class="action-btn call">Call</a>
            <a href="#" id="wa-link" class="action-btn wa" style="display:none;">WhatsApp</a>
        </div>
        <p id="time-stamp" style="font-size: 11px; color: var(--text-sec); margin-top: 20px; opacity: 0.6;"></p>
    </div>

    <div id="register-view" class="container hidden">
        <div class="service-badge">REGISTRY</div>
        <h2>Daily Duty</h2>
        <p class="subtitle">Assign today's on-call resident 🇮🇶</p>
        
        <div class="ios-group">
            <select id="spec-select" onchange="toggleNameSection()">
                <option value="">Choose Specialty</option>
                <option value="NS">Neuro</option>
                <option value="CT">Thoracic</option>
                <option value="GS">Surgery</option>
                <option value="US">Uro</option>
                <option value="ENT">ENT</option>
                <option value="H">Cardio</option>
                <option value="D">DeathCertificates</option>
                <option value="OP">OP Anesthesia</option>
                <option value="ICU">ICU Anesthesia</option>
                <option value="R">Radio</option>
                <option value="ON">Onco</option>
                <option value="PS">Plastic</option>
            </select>
            <div id="name-section" class="hidden">
                <div class="divider"></div>
                <select id="name-list"></select>
            </div>
        </div>

        <button id="submit-btn" onclick="submitRegistration()">Confirm Duty</button>
    </div>
    
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = []; // <--- Hidden local storage for the name list

    window.onload = async function() {
        if (mode === 'register') {
            document.getElementById('entry-title').innerText = "Doctor Login";
            prepareRegister();
        } else if (service) {
            document.getElementById('entry-title').innerText = "System Access";
            prepareLookup();
        } else {
            document.getElementById('status').innerText = "⚠️ Link Incomplete";
        }
    };

async function prepareRegister() {
    document.getElementById('status').innerText = "Fetching Master List...";
    try {
        const response = await fetch(`${scriptUrl}?action=getNames`);
        const data = await response.json(); 
        
        // SORTING LOGIC: Sorts alphabetically by Name (index 0)
        allResidents = data.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
        
        document.getElementById('status').innerText = "Ready ✅";
        document.getElementById('entry-btn').disabled = false;
    } catch (e) { 
        document.getElementById('status').innerText = "Offline Mode - Check Internet"; 
    }
}

    // THIS IS THE FILTERING MAGIC - NO FETCHING HERE!
    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');

        if (!selectedSpec) {
            nameSection.classList.add('hidden');
            return;
        }

        let filtered;

        // NEW LOGIC: Check for Anesthesia (OP/ICU), Death Certificates (D), or standard filter
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            // Show all Anesthesia residents (Code 'A')
            filtered = allResidents.filter(res => res[1] === "A");
        } else if (selectedSpec === "D") {
            // Show everyone for Death Certificates
            filtered = allResidents;
        } else {
            // Otherwise, filter by the specific specialty code in Column B
            filtered = allResidents.filter(res => res[1] === selectedSpec);
        }

        if (filtered.length > 0) {
            dropdown.innerHTML = filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('');
            nameSection.classList.remove('hidden');
        } else {
            dropdown.innerHTML = "<option value=''>No residents found</option>";
            nameSection.classList.remove('hidden');
        }
    }

    // --- REST OF YOUR WORKING LOGIC ---
    async function prepareLookup() {
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                document.getElementById('status').innerText = "Connection Secured ✅";
                document.getElementById('entry-btn').disabled = false;
            } else {
                document.getElementById('status').innerText = "No data found for today";
            }
        } catch (e) { document.getElementById('status').innerText = "Offline Mode"; }
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            document.getElementById('entry-screen').style.display = 'none';
            if (mode === 'register') {
                document.getElementById('register-view').classList.remove('hidden');
            } else {
                showLookupUI();
            }
        } else { alert("Incorrect Password"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'flex';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
        document.getElementById('lookup-view').classList.remove('hidden');
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Saving...";
        btn.disabled = true;
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            alert("Duty Updated Successfully ✅");
        } catch (e) {
            alert("Error connecting to server");
        } finally {
            btn.innerText = "Confirm Duty";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
