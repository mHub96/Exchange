<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>On-Call Pro</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #030303;
            --panel-bg: rgba(30, 30, 32, 0.7);
            --accent-glow: rgba(0, 122, 255, 0.3);
            --text-main: #FFFFFF;
            --text-sec: #A1A1A6;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background: var(--ios-bg);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Advanced Mesh Background */
        .mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(at 0% 0%, #1a1a1a 0%, transparent 50%),
                radial-gradient(at 100% 0%, #002b5e 0%, transparent 50%),
                radial-gradient(at 50% 100%, #111 0%, transparent 50%);
        }

        .container {
            width: 92%; max-width: 380px;
            padding: 40px 24px;
            background: var(--panel-bg);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 44px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 0 0.5px rgba(255,255,255,0.2);
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h2 { font-weight: 700; font-size: 26px; letter-spacing: -0.8px; margin: 15px 0 5px 0; }
        .subtitle { font-size: 15px; color: var(--text-sec); margin-bottom: 35px; }

        /* Stylish Input Group */
        .ios-list {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        select, input {
            width: 100%;
            padding: 18px;
            background: transparent;
            border: none;
            color: white;
            font-size: 17px;
            outline: none;
            appearance: none;
        }

        .separator {
            height: 0.5px;
            background: rgba(255, 255, 255, 0.1);
            margin-left: 18px;
        }

        input[type="password"] {
            text-align: center;
            font-size: 28px;
            letter-spacing: 14px;
            color: var(--ios-blue);
        }

        /* Advanced Button with Shimmer */
        .btn-prime {
            position: relative;
            width: 100%;
            padding: 18px;
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
        }

        .btn-prime::after {
            content: '';
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .btn-prime:active { transform: scale(0.96); brightness: 0.9; }
        .btn-prime:disabled { background: #2c2c2e; color: #48484a; box-shadow: none; }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            background: var(--accent-glow);
            color: #82bfff;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 30px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .name-txt { font-size: 34px; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }

        .action-row { display: flex; gap: 12px; margin-top: 30px; }
        .btn-sub {
            flex: 1; padding: 16px; border-radius: 16px; text-decoration: none;
            font-weight: 600; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .white { background: #fff; color: #000; }
        .green { background: #34C759; color: #fff; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="mesh"></div>

    <div id="entry-screen" class="container">
        <div style="font-size: 60px; filter: drop-shadow(0 0 20px var(--accent-glow));">🛡️</div>
        <h2>Resident Portal</h2>
        <p class="subtitle">Secure Iraqi Medical Network 🇮🇶</p>
        <div class="ios-list">
            <input type="password" id="pw" inputmode="numeric" placeholder="••••" maxlength="4">
        </div>
        <button id="entry-btn" class="btn-prime" onclick="handleEntry()" disabled>Verify Identity</button>
    </div>

    <div id="lookup-view" class="container hidden">
        <span class="badge" id="service-display">Cardiology</span>
        <div class="name-txt" id="name-display">Dr. Name</div>
        <div class="info-box">
            <div style="color: var(--text-sec); font-size: 11px; font-weight: 700; margin-bottom: 10px;">ENCRYPTED LINE</div>
            <div id="phone-display" style="font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums;">-</div>
        </div>
        <div class="action-row">
            <a href="#" id="call-link" class="btn-sub white">Call</a>
            <a href="#" id="wa-link" class="btn-sub green" style="display:none;">WhatsApp</a>
        </div>
    </div>

    <div id="register-view" class="container hidden">
        <span class="badge">Registry Update</span>
        <h2>Daily Duty</h2>
        <p class="subtitle">Assign the current resident on-call</p>
        
        <div class="ios-list">
            <select id="spec-select" onchange="toggleNameSection()">
                <option value="">Choose Specialty</option>
                <option value="NS">Neuro</option>
                <option value="CT">Thoracic</option>
                <option value="GS">Surgery</option>
                <option value="US">Uro</option>
                <option value="ENT">ENT</option>
                <option value="H">Cardio</option>
                <option value="D">DeathCertificates</option>
                <option value="OP">OP Anesthesia</option>
                <option value="ICU">ICU Anesthesia</option>
                <option value="R">Radio</option>
                <option value="ON">Onco</option>
                <option value="PS">Plastic</option>
            </select>
            <div id="name-section" class="hidden">
                <div class="separator"></div>
                <select id="name-list"></select>
            </div>
        </div>

        <button id="submit-btn" class="btn-prime" onclick="submitRegistration()">Confirm Duty</button>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = []; // <--- Hidden local storage for the name list

    window.onload = async function() {
        if (mode === 'register') {
            document.getElementById('entry-title').innerText = "Doctor Login";
            prepareRegister();
        } else if (service) {
            document.getElementById('entry-title').innerText = "System Access";
            prepareLookup();
        } else {
            document.getElementById('status').innerText = "⚠️ Link Incomplete";
        }
    };

async function prepareRegister() {
    document.getElementById('status').innerText = "Fetching Master List...";
    try {
        const response = await fetch(`${scriptUrl}?action=getNames`);
        const data = await response.json(); 
        
        // SORTING LOGIC: Sorts alphabetically by Name (index 0)
        allResidents = data.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
        
        document.getElementById('status').innerText = "Ready ✅";
        document.getElementById('entry-btn').disabled = false;
    } catch (e) { 
        document.getElementById('status').innerText = "Offline Mode - Check Internet"; 
    }
}

    // THIS IS THE FILTERING MAGIC - NO FETCHING HERE!
    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');

        if (!selectedSpec) {
            nameSection.classList.add('hidden');
            return;
        }

        let filtered;

        // NEW LOGIC: Check for Anesthesia (OP/ICU), Death Certificates (D), or standard filter
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            // Show all Anesthesia residents (Code 'A')
            filtered = allResidents.filter(res => res[1] === "A");
        } else if (selectedSpec === "D") {
            // Show everyone for Death Certificates
            filtered = allResidents;
        } else {
            // Otherwise, filter by the specific specialty code in Column B
            filtered = allResidents.filter(res => res[1] === selectedSpec);
        }

        if (filtered.length > 0) {
            dropdown.innerHTML = filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('');
            nameSection.classList.remove('hidden');
        } else {
            dropdown.innerHTML = "<option value=''>No residents found</option>";
            nameSection.classList.remove('hidden');
        }
    }

    // --- REST OF YOUR WORKING LOGIC ---
    async function prepareLookup() {
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                document.getElementById('status').innerText = "Connection Secured ✅";
                document.getElementById('entry-btn').disabled = false;
            } else {
                document.getElementById('status').innerText = "No data found for today";
            }
        } catch (e) { document.getElementById('status').innerText = "Offline Mode"; }
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            document.getElementById('entry-screen').style.display = 'none';
            if (mode === 'register') {
                document.getElementById('register-view').classList.remove('hidden');
            } else {
                showLookupUI();
            }
        } else { alert("Incorrect Password"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'flex';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
        document.getElementById('lookup-view').classList.remove('hidden');
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Saving...";
        btn.disabled = true;
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            alert("Duty Updated Successfully ✅");
        } catch (e) {
            alert("Error connecting to server");
        } finally {
            btn.innerText = "Confirm Duty";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
