<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On-Call Pro</title>
    <style>
        :root {
            --primary: #00f2ff; /* Cyber Cyan */
            --primary-glow: rgba(0, 242, 255, 0.3);
            --bg-deep: #05070a;
            --surface: #0f172a;
            --surface-accent: #1e293b;
            --text-bright: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-deep);
            color: var(--text-bright);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* Dynamic grid background */
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Animated Background Pulse */
        body::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, var(--primary-glow) 0%, transparent 70%);
            z-index: -1;
            opacity: 0.4;
        }

        .container {
            width: 90%; max-width: 420px;
            padding: 40px 30px;
            background: var(--surface);
            border-radius: 12px; /* Sharp professional edges */
            border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 
                        inset 0 0 20px rgba(0, 242, 255, 0.05);
            text-align: center;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%); /* Tactical corner cut */
        }

        /* Top Accent Bar */
        .container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 40px; height: 3px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        h2 { 
            font-weight: 800; font-size: 1.6rem; 
            letter-spacing: 1px; margin-bottom: 5px; 
            text-transform: uppercase;
            color: var(--primary);
        }

        #status { 
            font-size: 0.75rem; color: var(--text-dim); 
            margin-bottom: 35px; letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* TACTILE INPUTS */
        select, input {
            width: 100%;
            padding: 16px;
            margin-bottom: 18px;
            background: var(--surface-accent);
            border: 1px solid var(--border);
            border-left: 3px solid var(--primary);
            border-radius: 4px;
            color: white !important;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            background: #1e293b;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        input[type="password"] {
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 20px;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 18px;
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) {
            background: var(--primary);
            color: var(--bg-deep);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        button:disabled { border-color: #334155; color: #334155; }

        /* DATA DISPLAY */
        .info-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed var(--border);
            padding: 25px;
            margin: 25px 0;
        }

        .name-label { 
            font-size: 1.8rem; font-weight: 300; 
            color: white; margin: 15px 0;
            border-bottom: 1px solid var(--primary-glow);
            padding-bottom: 10px;
        }

        .service-badge {
            background: var(--primary-glow);
            color: var(--primary);
            padding: 4px 12px;
            border: 1px solid var(--primary);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: inline-block;
        }

        .btn-row { display: flex; gap: 15px; margin-top: 25px; }
        .action-btn {
            flex: 1; padding: 14px; text-decoration: none;
            font-weight: 700; font-size: 0.8rem; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            border: 1px solid var(--text-bright); color: white;
        }
        
        .wa { border-color: var(--success); color: var(--success); }
        .wa:hover { background: var(--success); color: white; }

        .hidden { display: none !important; }
        
        /* Dropdown fix for Desktop */
        select option { background: #0f172a; color: white; }
    </style>
</head>
<body>
    <div style="position:fixed; top:10%; left:10%; font-size: 0.6rem; color: var(--primary); opacity: 0.2; transform: rotate(-90deg);">SYS_VER_2026_PRO</div>

    <div id="entry-screen" class="container">
        <div style="font-size: 2.5rem; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--primary));">💠</div>
        <h2 id="entry-title">Resident Portal</h2>
        <p id="status">Secure Connection Active</p>
        <input type="password" id="pw" inputmode="numeric" placeholder="PASSCODE" maxlength="4">
        <button id="entry-btn" onclick="handleEntry()" disabled>Access System</button>
    </div>

    <div id="lookup-view" class="container hidden">
        <div id="service-display" class="service-badge">SERVICE</div>
        <div id="name-display" class="name-label">Loading...</div>
        <div class="info-card">
            <div style="color: var(--text-dim); font-size: 0.65rem; letter-spacing: 1.5px; margin-bottom: 10px;">COMMS_ENCRYPTED_LINE</div>
            <div id="phone-display" style="font-size: 1.5rem; font-weight: 600; color: var(--primary);">-</div>
        </div>
        <div class="btn-row">
            <a href="#" id="call-link" class="action-btn">CALL</a>
            <a href="#" id="wa-link" class="action-btn wa" style="display:none;">WHATSAPP</a>
        </div>
        <p id="time-stamp" style="font-size: 0.6rem; color: var(--text-dim); margin-top: 30px;"></p>
    </div>

    <div id="register-view" class="container hidden">
        <div class="service-badge">REGISTRY 🇮🇶</div>
        <h2>Duty Log</h2>
        <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 25px;">Database Override Mode</p>
        
        <select id="spec-select" onchange="toggleNameSection()">
            <option value="">SELECT SPECIALTY</option>
            <option value="NS">NEURO</option>
            <option value="CT">THORACIC</option>
            <option value="GS">SURGERY</option>
            <option value="US">URO</option>
            <option value="ENT">ENT</option>
            <option value="H">CARDIO</option>
            <option value="D">DEATH CERT</option>
            <option value="OP">OP ANESTHESIA</option>
            <option value="ICU">ICU ANESTHESIA</option>
            <option value="R">RADIO</option>
            <option value="ON">ONCO</option>
            <option value="PS">PLASTIC</option>
        </select>

        <div id="name-section" class="hidden">
            <select id="name-list"></select>
            <button id="submit-btn" onclick="submitRegistration()">Update Record</button>
        </div>
    </div>

<script>
    // CORE LOGIC - DO NOT CHANGE
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    // Auto-enable entry button when 4 digits are typed
    document.getElementById('pw').addEventListener('input', function() {
        document.getElementById('entry-btn').disabled = this.value.length !== 4;
    });

    window.onload = async function() {
        if (mode === 'register') {
            document.getElementById('entry-title').innerText = "Security Login";
            prepareRegister();
        } else if (service) {
            document.getElementById('entry-title').innerText = "Secure Lookup";
            prepareLookup();
        } else {
            document.getElementById('status').innerText = "⚠️ SYSTEM_LINK_ERROR";
        }
    };

    async function prepareRegister() {
        document.getElementById('status').innerText = "SYNCING_DATABASE...";
        try {
            const response = await fetch(`${scriptUrl}?action=getNames`);
            const data = await response.json(); 
            allResidents = data.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
            document.getElementById('status').innerText = "READY_TO_ASSIGN";
        } catch (e) { 
            document.getElementById('status').innerText = "OFFLINE_MODE"; 
        }
    }

    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');
        if (!selectedSpec) {
            nameSection.classList.add('hidden');
            return;
        }
        let filtered;
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            filtered = allResidents.filter(res => res[1] === "A");
        } else if (selectedSpec === "D") {
            filtered = allResidents;
        } else {
            filtered = allResidents.filter(res => res[1] === selectedSpec);
        }
        if (filtered.length > 0) {
            dropdown.innerHTML = filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('');
            nameSection.classList.remove('hidden');
        } else {
            dropdown.innerHTML = "<option value=''>NO_RECORDS_FOUND</option>";
            nameSection.classList.remove('hidden');
        }
    }

    async function prepareLookup() {
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                document.getElementById('status').innerText = "LINK_ESTABLISHED ✅";
                document.getElementById('entry-btn').disabled = false;
            } else {
                document.getElementById('status').innerText = "NO_ON_CALL_FOUND";
            }
        } catch (e) { document.getElementById('status').innerText = "OFFLINE_MODE"; }
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            document.getElementById('entry-screen').style.display = 'none';
            if (mode === 'register') {
                document.getElementById('register-view').classList.remove('hidden');
            } else {
                showLookupUI();
            }
        } else { alert("ACCESS DENIED: INVALID PIN"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = "SYNCED: " + serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'flex';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
        document.getElementById('lookup-view').classList.remove('hidden');
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "UPLOADING...";
        btn.disabled = true;
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            alert("RECORD UPDATED SUCCESSFULLY");
        } catch (e) {
            alert("SYSTEM ERROR: UPLOAD FAILED");
        } finally {
            btn.innerText = "UPDATE RECORD";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
