<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COLOR SCHEDULER 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1115;
            --card: #1a1c20;
            --column-width: 280px;
            --font-size: 0.9rem;
            --line-height: 1.5;
            --padding-y: 0.6rem;
            --padding-x: 0.75rem;
        }

        /* Specialty-Specific Hues 🇮🇶 */
        .track-NS { --spec-color: #fbbf24; } /* Neurosurgery - Amber/Nerves */
        .track-CT { --spec-color: #f87171; } /* Cardiothoracic - Heart Red */
        .track-GS { --spec-color: #34d399; } /* General Surg - Scrub Green */
        .track-US { --spec-color: #60a5fa; } /* Urosurgery - Water Blue */
        .track-ENT { --spec-color: #a78bfa; } /* ENT - Purple */
        .track-H { --spec-color: #fb7185; } /* Cardiology - Rose */
        .track-D { --spec-color: #94a3b8; } /* Death Certs - Slate/Grey */
        .track-OP { --spec-color: #fb923c; } /* OT Anaesth - Orange */
        .track-ICU { --spec-color: #2dd4bf; } /* ICU Anaesth - Teal */
        .track-R { --spec-color: #818cf8; } /* Radiology - Indigo/X-ray */
        .track-ON { --spec-color: #f472b6; } /* Oncology - Pink */

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; overflow: hidden; }
        
        .board-container {
            display: flex; gap: 1.5rem; padding: 1.5rem; overflow-x: auto;
            height: calc(100vh - 100px); align-items: flex-start;
        }

        .specialty-track {
            flex: 0 0 var(--column-width); background: var(--card); border-radius: 1.5rem;
            display: flex; flex-direction: column; max-height: 100%;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .track-header {
            padding: 1.2rem; border-radius: 1.5rem 1.5rem 0 0; text-align: center;
            position: sticky; top: 0; z-index: 60;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), transparent);
            border-bottom: 3px solid var(--spec-color);
        }

        .track-header h2 { color: var(--spec-color); font-weight: 900; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,0,0,0.5); }

        .days-list { flex: 1; overflow-y: auto; padding: 0.75rem; scrollbar-width: none; }

        .day-box {
            position: relative; background: rgba(255,255,255,0.02); margin-bottom: 0.6rem;
            border-radius: 0.8rem; padding: 0.4rem; border: 1px solid transparent; transition: 0.2s;
        }
        .day-box:focus-within { border-color: var(--spec-color); background: rgba(255, 255, 255, 0.04); }
        .day-box.weekend { background: rgba(255,255,255,0.05); }

        .day-label {
            display: flex; justify-content: space-between; font-size: 0.65rem;
            font-weight: 800; margin-bottom: 0.3rem; color: #64748b; padding: 0 0.5rem;
        }

        .input-wrapper { position: relative; width: 100%; direction: rtl; }

        .cell-input, .ghost-text {
            width: 100%; font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-size: var(--font-size); line-height: var(--line-height);
            padding: var(--padding-y) var(--padding-x); text-align: right;
            box-sizing: border-box; white-space: pre; overflow: hidden;
        }

        .cell-input { background: transparent; border: none; outline: none; color: #fff; position: relative; z-index: 10; }

        .ghost-text { position: absolute; top: 0; right: 0; left: 0; bottom: 0; color: rgba(255,255,255,0.15); z-index: 5; pointer-events: none; }
        .ghost-offset { color: transparent; visibility: visible; }

        .dropdown-arrow { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 0.55rem; color: #475569; cursor: pointer; z-index: 25; padding: 5px; }

        .prefilled { color: var(--spec-color) !important; font-weight: 600; }
        .new-entry { color: #fff !important; font-weight: 700; text-decoration: underline decoration-white/30; }

        .custom-menu {
            position: absolute; top: 100%; right: 0; width: 100%; max-height: 220px;
            overflow-y: auto; background: #1e2126; border: 1px solid var(--spec-color);
            border-radius: 0.5rem; z-index: 1000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .custom-menu div { padding: 0.8rem; font-size: 0.85rem; text-align: right; cursor: pointer; color: #94a3b8; }
        .custom-menu div:hover { background: var(--spec-color); color: #000; }
    </style>
</head>
<body>

    <div id="app-wrapper" class="opacity-30 pointer-events-none transition-opacity duration-500">
        <div class="p-4 flex justify-between items-center bg-card border-b border-white/5">
            <h1 class="text-xl font-black text-white uppercase tracking-tighter">Iraqi Med-Scheduler 🇮🇶</h1>
            <div class="flex gap-4 items-center">
                <input type="month" id="month-picker" class="bg-black text-amber-500 p-2 rounded-lg font-bold border border-white/10" onchange="generateBoard()">
                <button onclick="saveAll()" id="sync-btn" class="bg-white text-black px-6 py-2 rounded-lg font-black text-xs uppercase active:scale-95">Update All Tracks</button>
            </div>
        </div>
        <div class="board-container" id="board"></div>
    </div>

<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";
    const specialties = [
        { id: "NS", name: "Neurosurgery" }, { id: "CT", name: "Cardiothoracic" },
        { id: "GS", name: "General Surg" }, { id: "US", name: "Urosurgery" },
        { id: "ENT", name: "ENT Dept" }, { id: "H", name: "Cardiology" },
        { id: "D", name: "Death Certs" }, { id: "OP", name: "OT Anaesth" },
        { id: "ICU", name: "ICU Anaesth" }, { id: "R", name: "Radiology" },
        { id: "ON", name: "Oncology" }
    ];

    let nameData = {};

    window.onload = () => {
        const now = new Date();
        const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        document.getElementById('month-picker').value = `${nextMonth.getFullYear()}-${String(nextMonth.getMonth() + 1).padStart(2, '0')}`;
        initSync();
    };

    async function initSync() {
        try {
            const r = await fetch(`${scriptUrl}?action=getNames`);
            const all = await r.json();
            specialties.forEach(s => {
                if (s.id === "OP" || s.id === "ICU") nameData[s.id] = all.filter(x => x[1] === "A").map(x => x[0]);
                else if (s.id === "D") nameData[s.id] = all.map(x => x[0]);
                else nameData[s.id] = all.filter(x => x[1] === s.id).map(x => x[0]);
            });
            generateBoard();
        } catch(e) { unlock(); }
    }

    function generateBoard() {
        const picker = document.getElementById('month-picker').value;
        const [year, month] = picker.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        const board = document.getElementById('board');
        board.innerHTML = "";

        specialties.forEach(spec => {
            const track = document.createElement('div');
            track.className = `specialty-track track-${spec.id}`;
            let html = `<div class="track-header"><h2>${spec.name}</h2></div><div class="days-list">`;
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month-1, d);
                const dayName = new Intl.DateTimeFormat('ar-IQ', { weekday: 'short' }).format(dateObj);
                const dateFull = `${String(d).padStart(2, '0')}/${String(month).padStart(2, '0')}/${year}`;
                const uid = `${d}-${spec.id}`;

                html += `
                    <div class="day-box ${dateObj.getDay() === 5 || dateObj.getDay() === 6 ? 'weekend' : ''}">
                        <div class="day-label"><span>${dateFull.substring(0,5)}</span><span>${dayName}</span></div>
                        <div class="input-wrapper">
                            <div class="ghost-text" id="ghost-${uid}"></div>
                            <input type="text" class="cell-input" id="input-${uid}" 
                                oninput="handleAC(this, '${spec.id}', '${uid}')"
                                onkeydown="handleKeys(event, this, '${uid}')"
                                onblur="handleBlur('${uid}')"
                                data-date="${dateFull}" data-spec="${spec.id}" autocomplete="off">
                            <span class="dropdown-arrow" onclick="toggleMenu(event, '${uid}', '${spec.id}')">▼</span>
                            <div class="custom-menu" id="menu-${uid}"></div>
                        </div>
                    </div>`;
            }
            html += `</div>`;
            track.innerHTML = html;
            board.appendChild(track);
        });
        fetchSchedule();
    }

    function handleAC(el, sid, uid) {
        const ghost = document.getElementById(`ghost-${uid}`);
        const val = el.value;
        ghost.innerText = ""; ghost.removeAttribute('data-full');
        el.classList.remove('prefilled');
        if (!val.trim()) { el.classList.remove('new-entry'); return; }
        el.classList.add('new-entry');

        if (nameData[sid]) {
            const cleanInput = val.toLowerCase().replace(/^د\.\s*/, "");
            const match = nameData[sid].find(n => {
                const nLower = n.toLowerCase();
                return nLower.startsWith(val.toLowerCase()) || nLower.replace(/^د\.\s*/, "").startsWith(cleanInput);
            });
            if (match) {
                ghost.setAttribute('data-full', match);
                let display = val.startsWith("د.") ? match : match.replace(/^د\.\s*/, "");
                if (display.toLowerCase().startsWith(val.toLowerCase())) {
                    ghost.innerHTML = `<span class="ghost-offset">${val}</span>${display.substring(val.length)}`;
                } else ghost.innerText = display;
            }
        }
    }

    function toggleMenu(e, uid, sid) {
        e.stopPropagation();
        const m = document.getElementById(`menu-${uid}`);
        const open = m.style.display === "block";
        document.querySelectorAll('.custom-menu').forEach(x => x.style.display = 'none');
        if (!open) {
            m.innerHTML = (nameData[sid] || []).map(n => `<div onmousedown="selectName('${uid}', '${n}')">${n}</div>`).join('');
            m.style.display = "block";
        }
    }

    function selectName(uid, name) {
        const i = document.getElementById(`input-${uid}`);
        i.value = name; i.classList.add('new-entry');
        document.getElementById(`ghost-${uid}`).innerText = "";
        document.getElementById(`menu-${uid}`).style.display = 'none';
    }

    function handleKeys(e, el, uid) {
        const ghost = document.getElementById(`ghost-${uid}`);
        const full = ghost.getAttribute('data-full');
        if (e.key === "Enter") {
            e.preventDefault();
            if (full) { el.value = full; el.classList.add('new-entry'); ghost.innerText = ""; }
            const [d, sid] = uid.split('-');
            const nextEl = document.getElementById(`input-${parseInt(d) + 1}-${sid}`);
            if (nextEl) { nextEl.focus(); nextEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            else el.blur();
        }
    }

    function handleBlur(uid) {
        setTimeout(() => {
            const m = document.getElementById(`menu-${uid}`);
            const g = document.getElementById(`ghost-${uid}`);
            const input = document.getElementById(`input-${uid}`);
            if (m) m.style.display = 'none';
            if (g && g.getAttribute('data-full') && input.value !== "") {
                input.value = g.getAttribute('data-full');
                input.classList.add('new-entry');
            }
            if (g) g.innerText = "";
        }, 250);
    }

    async function fetchSchedule() {
        const m = document.getElementById('month-picker').value;
        try {
            const r = await fetch(`${scriptUrl}?action=getSchedule&month=${m}`);
            const data = await r.json();
            data.forEach(row => {
                const d = parseInt(row.date.split('/')[0]);
                const el = document.getElementById(`input-${d}-${row.specCode}`);
                if (el && row.name) { el.value = row.name; el.classList.add('prefilled'); }
            });
        } finally { unlock(); }
    }

    function unlock() {
        document.getElementById('app-wrapper').style.opacity = "1";
        document.getElementById('app-wrapper').style.pointerEvents = "auto";
    }

    async function saveAll() {
        const inputs = Array.from(document.querySelectorAll('.cell-input')).filter(x => x.value.trim() !== "");
        const payload = inputs.map(x => ({ date: x.dataset.date, specialty: x.dataset.spec, name: x.value.trim() }));
        const btn = document.getElementById('sync-btn');
        btn.innerText = "Processing...";
        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ payload }) });
            btn.innerText = "Synced ✅";
            inputs.forEach(x => { x.classList.remove('new-entry'); x.classList.add('prefilled'); });
        } catch(e) { btn.innerText = "Error ⚠️"; }
        setTimeout(() => btn.innerText = "Update All Tracks", 2000);
    }
</script>
</body>
</html>
