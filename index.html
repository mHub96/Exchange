<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD Portal | Cyber-Steel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --steel-dark: #0f1218;
            --steel-light: #1e2530;
            --neon-blue: #00f2ff;
            --neon-green: #00ff88;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: var(--steel-dark);
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 30px 30px;
            margin: 0; overflow: hidden;
        }

        .stage-3d { perspective: 1000px; }

        /* THE METALLIC PANEL */
        .panel-3d {
            transform-style: preserve-3d;
            transform: rotateX(15deg);
            background: var(--steel-light);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            transition: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* HEAVY SLAB BUTTON */
        .slab-wrap {
            position: relative; height: 60px;
            transform-style: preserve-3d;
            margin-top: 25px;
        }

        .slab-face {
            position: absolute; inset: 0;
            background: linear-gradient(145deg, #232a36, #1a1f29);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: var(--neon-blue);
            font-weight: 700; font-size: 0.9rem; letter-spacing: 2px;
            display: flex; align-items: center; justify-content: center;
            transform: translateZ(15px);
            transition: all 0.1s, color 0.4s, border 0.4s, box-shadow 0.4s;
            pointer-events: none;
        }

        .slab-side {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 15px;
            background: #0a0d12;
            transform-origin: top; transform: rotateX(-90deg) translateZ(-45px);
        }

        .click-shield { position: absolute; inset: -10px; z-index: 10; cursor: pointer; }

        /* Pressed State */
        .slab-wrap:active .slab-face { transform: translateZ(5px); }
        
        /* Success Glow */
        .slab-wrap.success .slab-face {
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .input-recess {
            background: #0a0d12;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
            border-radius: 4px;
        }

        .hidden { display: none !important; }
        .slam-out { transform: translateZ(-200px) rotateX(90deg); opacity: 0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 stage-3d">

    <div id="main-card" class="panel-3d w-full max-w-sm p-10">
        
        <div id="login-view">
            <div class="mb-10 border-l-4 border-cyan-500 pl-4">
                <h1 class="text-white text-xl font-bold uppercase tracking-tighter">Medical_Core_v3</h1>
                <p id="status-text" class="text-cyan-500/60 text-[0.6rem] font-bold uppercase mt-1">Status: System_Idle</p>
            </div>
            
            <div class="input-recess p-2 mb-8">
                <input type="password" id="pw" inputmode="numeric" maxlength="4" placeholder="----" 
                    class="w-full bg-transparent p-4 text-center text-4xl tracking-[1.5rem] text-white outline-none font-bold">
            </div>
            
            <div class="slab-wrap" id="login-btn-wrap">
                <div class="click-shield" onclick="handleEntry()"></div>
                <div class="slab-face" id="btn-label">INITIATE_AUTH</div>
                <div class="slab-side"></div>
            </div>
        </div>

        <div id="register-view" class="hidden">
            <h2 class="text-white text-lg font-bold mb-6 flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                DUTY_UPDATE_LOG 🇮🇶
            </h2>
            <div class="input-recess mb-4">
                <select id="spec-select" onchange="toggleNameSection()" class="w-full bg-transparent p-4 text-white outline-none appearance-none">
                    <option class="bg-slate-900" value="">[ SELECT_SECTOR ]</option>
                    <option class="bg-slate-900" value="NS">Neuro</option><option class="bg-slate-900" value="CT">Thoracic</option>
                    <option class="bg-slate-900" value="GS">Surgery</option><option class="bg-slate-900" value="US">Uro</option>
                    <option class="bg-slate-900" value="ENT">ENT</option><option class="bg-slate-900" value="H">Cardio</option>
                    <option class="bg-slate-900" value="D">DeathCert</option><option class="bg-slate-900" value="OP">Anes (OP)</option>
                    <option class="bg-slate-900" value="ICU">Anes (ICU)</option><option class="bg-slate-900" value="R">Radio</option>
                    <option class="bg-slate-900" value="ON">Onco</option><option class="bg-slate-900" value="PS">Plastic</option>
                </select>
            </div>
            <div id="name-section" class="hidden">
                <div class="input-recess mb-6">
                    <select id="name-list" class="w-full bg-transparent p-4 text-white outline-none appearance-none"></select>
                </div>
                <div class="slab-wrap" id="reg-btn-wrap">
                    <div class="click-shield" onclick="submitRegistration()"></div>
                    <div class="slab-face" id="reg-label">UPLOAD_RECORDS</div>
                    <div class="slab-side"></div>
                </div>
            </div>
        </div>

        <div id="lookup-view" class="hidden text-left">
            <div class="mb-8">
                <div id="service-display" class="text-emerald-400 text-[0.6rem] font-bold tracking-[0.3em] uppercase">---</div>
                <h2 id="name-display" class="text-white text-4xl font-bold mt-2">...</h2>
                <p id="phone-display" class="text-white/40 text-lg font-mono">---</p>
            </div>
            
            <div class="grid grid-cols-1 gap-4">
                <a href="#" id="call-link" class="input-recess p-4 text-white font-bold flex justify-between items-center hover:bg-white/5 transition-all">
                    <span>VOICE_COMMS</span>
                    <span class="text-emerald-500">>></span>
                </a>
                <a href="#" id="wa-link" class="hidden bg-emerald-500/10 border border-emerald-500/50 p-4 text-emerald-400 font-bold flex justify-between items-center">
                    <span>WHATSAPP_LINK</span>
                    <span>>></span>
                </a>
            </div>
            <p id="time-stamp" class="text-[0.5rem] text-white/20 mt-10 font-mono tracking-widest"></p>
        </div>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    window.onload = async function() {
        if (mode === 'register') {
            const res = await fetch(`${scriptUrl}?action=getNames`);
            allResidents = (await res.json()).sort((a,b) => a[0].localeCompare(b[0], 'ar'));
            document.getElementById('status-text').innerText = "Database_Secure";
        } else if (service) {
            const res = await fetch(`${scriptUrl}?service=${service}&ward=${service}&json=true&t=${Date.now()}`);
            serverData = await res.json();
            document.getElementById('status-text').innerText = "Handshake_Complete";
        }
    };

    function toggleNameSection() {
        const val = document.getElementById('spec-select').value;
        const list = document.getElementById('name-list');
        if (!val) { document.getElementById('name-section').classList.add('hidden'); return; }
        let filtered = (val === "OP" || val === "ICU") ? allResidents.filter(r => r[1] === "A") : (val === "D" ? allResidents : allResidents.filter(r => r[1] === val));
        list.innerHTML = filtered.map(r => `<option class="bg-slate-900" value="${r[0]}">${r[0]}</option>`).join('');
        document.getElementById('name-section').classList.remove('hidden');
    }

    function handleEntry() {
        const pin = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        const wrap = document.getElementById('login-btn-wrap');
        const label = document.getElementById('btn-label');

        if (pin === correct) {
            wrap.classList.add('success');
            label.innerText = "ACCESS_GRANTED";
            
            setTimeout(() => {
                const card = document.getElementById('main-card');
                card.classList.add('slam-out');
                
                setTimeout(() => {
                    document.getElementById('login-view').classList.add('hidden');
                    if (mode === 'register') {
                        document.getElementById('register-view').classList.remove('hidden');
                    } else {
                        showLookupUI();
                        document.getElementById('lookup-view').classList.remove('hidden');
                    }
                    card.classList.remove('slam-out');
                }, 600);
            }, 800);
        } else {
            alert("SECURITY_ALERT: INCORRECT_PIN");
            document.getElementById('pw').value = "";
        }
    }

    function showLookupUI() {
        if (!serverData) return;
        document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
        document.getElementById('name-display').innerText = serverData.resident.name;
        document.getElementById('phone-display').innerText = serverData.resident.phone;
        document.getElementById('time-stamp').innerText = "REF_ID: " + serverData.timestamp;
        document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
        if (serverData.whatsappDigits) {
            const wa = document.getElementById('wa-link');
            wa.classList.remove('hidden');
            wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
        }
    }

    async function submitRegistration() {
        const wrap = document.getElementById('reg-btn-wrap');
        const label = document.getElementById('reg-label');
        label.innerText = "UPLOADING...";
        
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };

        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            wrap.classList.add('success');
            label.innerText = "RECORDS_SAVED";
        } catch (e) { label.innerText = "UPLOAD_FAILED"; }
    }
</script>
</body>
</html>
