<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD Portal | Embossed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e6eef4;
            --light: #ffffff;
            --shadow: #c8d4e2;
            --accent: #3b82f6;
            --success: #10b981;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #5a6b81; }

        /* THE EMBOSSED CARD */
        .embossed-card {
            background: var(--bg);
            border-radius: 3rem;
            box-shadow: 25px 25px 50px var(--shadow), -25px -25px 50px var(--light);
        }

        /* RECESSED INPUT (Carved into the screen) */
        .recessed-input {
            background: var(--bg);
            border-radius: 1.5rem;
            box-shadow: inset 8px 8px 16px var(--shadow), inset -8px -8px 16px var(--light);
        }

        /* EMBOSSED BUTTON (Coming out of the screen) */
        .embossed-btn {
            background: var(--bg);
            border-radius: 1.5rem;
            box-shadow: 8px 8px 20px var(--shadow), -8px -8px 20px var(--light);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #7a8ba3;
            font-weight: 800;
        }

        .embossed-btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--light);
            transform: scale(0.97);
        }

        /* DYNAMIC COLOR CHANGE WHEN FETCHED */
        .fetched-active {
            background: var(--success);
            color: white;
            box-shadow: 8px 8px 20px rgba(16, 185, 129, 0.3), -8px -8px 20px var(--light);
        }

        #shield { position: fixed; inset: 0; background: var(--bg); z-index: 100; transition: opacity 0.5s; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="shield"></div>

    <div id="main-card" class="w-full max-w-sm embossed-card p-10 transition-all duration-700">
        
        <div id="login-view">
            <div class="text-center mb-10">
                <h1 class="text-slate-700 text-2xl font-extrabold tracking-tight">On-Call Portal</h1>
                <p id="status-text" class="text-[0.6rem] mt-2 uppercase font-bold tracking-[0.3em] pulse">Syncing Link...</p>
            </div>
            
            <div class="space-y-8">
                <div class="recessed-input p-2">
                    <input type="password" id="pw" inputmode="numeric" maxlength="4" placeholder="••••" 
                        class="w-full bg-transparent py-5 text-center text-4xl tracking-[1rem] text-slate-600 outline-none">
                </div>
                
                <button id="entry-btn" onclick="handleEntry()" class="embossed-btn w-full py-6 tracking-widest">
                    AUTHORIZE
                </button>
            </div>
        </div>

        <div id="register-view" class="hidden space-y-6">
            <h2 class="text-slate-700 text-xl font-extrabold text-center mb-2">Duty Log 🇮🇶</h2>
            <div class="recessed-input p-2">
                <select id="spec-select" onchange="toggleNameSection()" class="w-full bg-transparent p-4 text-slate-700 font-bold outline-none appearance-none">
                    <option value="">-- Sector --</option>
                    <option value="NS">Neuro</option><option value="CT">Thoracic</option>
                    <option value="GS">Surgery</option><option value="US">Uro</option>
                    <option value="ENT">ENT</option><option value="H">Cardio</option>
                    <option value="D">DeathCert</option><option value="OP">Anes (OP)</option>
                    <option value="ICU">Anes (ICU)</option><option value="R">Radio</option>
                    <option value="ON">Onco</option><option value="PS">Plastic</option>
                </select>
            </div>
            <div id="name-section" class="hidden space-y-6">
                <div class="recessed-input p-2">
                    <select id="name-list" class="w-full bg-transparent p-4 text-slate-700 outline-none"></select>
                </div>
                <button id="submit-btn" onclick="submitRegistration()" class="embossed-btn w-full py-6 text-slate-500">
                    COMMIT CHANGES
                </button>
            </div>
        </div>

        <div id="lookup-view" class="hidden text-center">
            <div class="recessed-input inline-block px-8 py-2 mb-6">
                <span id="service-display" class="text-slate-500 text-[0.6rem] font-black tracking-widest uppercase">SERVICE</span>
            </div>
            <h2 id="name-display" class="text-slate-800 text-3xl font-extrabold mb-1">...</h2>
            <p id="phone-display" class="text-slate-500 font-bold text-lg mb-8">-</p>
            
            <div class="grid grid-cols-2 gap-6">
                <a href="#" id="call-link" class="embossed-btn p-5 text-sm">VOICE</a>
                <a href="#" id="wa-link" class="hidden p-5 bg-emerald-500 text-white rounded-[1.5rem] font-extrabold text-sm shadow-lg shadow-emerald-200">WHATSAPP</a>
            </div>
            <p id="time-stamp" class="text-[0.55rem] text-slate-400 mt-10 font-mono tracking-widest uppercase"></p>
        </div>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    window.onload = async function() {
        // Remove loading shield
        setTimeout(() => { 
            document.getElementById('shield').style.opacity = '0'; 
            setTimeout(() => document.getElementById('shield').remove(), 500);
        }, 300);

        const btn = document.getElementById('entry-btn');
        const status = document.getElementById('status-text');

        try {
            if (mode === 'register') {
                const res = await fetch(`${scriptUrl}?action=getNames`);
                allResidents = (await res.json()).sort((a,b) => a[0].localeCompare(b[0], 'ar'));
            } else if (service) {
                const res = await fetch(`${scriptUrl}?service=${service}&ward=${service}&json=true&t=${Date.now()}`);
                serverData = await res.json();
            }
            
            // DATA FETCHED: Change button color and update status
            btn.classList.add('fetched-active');
            status.innerText = "Connection Secure 🇮🇶";
            status.classList.remove('pulse');
            status.style.color = "#10b981";
        } catch (e) {
            status.innerText = "Offline Mode";
            status.classList.remove('pulse');
        }
    };

    function toggleNameSection() {
        const val = document.getElementById('spec-select').value;
        const list = document.getElementById('name-list');
        if (!val) { document.getElementById('name-section').classList.add('hidden'); return; }
        let filtered = (val === "OP" || val === "ICU") ? allResidents.filter(r => r[1] === "A") : (val === "D" ? allResidents : allResidents.filter(r => r[1] === val));
        list.innerHTML = filtered.map(r => `<option value="${r[0]}">${r[0]}</option>`).join('');
        document.getElementById('name-section').classList.remove('hidden');
    }

    function handleEntry() {
        const pin = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        const card = document.getElementById('main-card');

        if (pin === correct) {
            card.style.transform = "scale(0.9) translateY(20px)";
            card.style.opacity = "0";
            
            setTimeout(() => {
                document.getElementById('login-view').classList.add('hidden');
                if (mode === 'register') {
                    document.getElementById('register-view').classList.remove('hidden');
                } else {
                    showLookupUI();
                    document.getElementById('lookup-view').classList.remove('hidden');
                }
                card.style.transform = "scale(1) translateY(0)";
                card.style.opacity = "1";
            }, 600);
        } else {
            alert("ACCESS DENIED");
            document.getElementById('pw').value = "";
        }
    }

    function showLookupUI() {
        if (!serverData) return;
        document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
        document.getElementById('name-display').innerText = serverData.resident.name;
        document.getElementById('phone-display').innerText = serverData.resident.phone;
        document.getElementById('time-stamp').innerText = "Ref ID: " + serverData.timestamp;
        document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
        if (serverData.whatsappDigits) {
            const wa = document.getElementById('wa-link');
            wa.classList.remove('hidden');
            wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
        }
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "UPLOADING...";
        btn.classList.add('pulse');
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            btn.classList.remove('pulse');
            btn.classList.add('fetched-active');
            btn.innerText = "SAVED ✅";
        } catch (e) { btn.innerText = "RETRY"; }
    }
</script>
</body>
</html>
