<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On-Call Pro | 3D Console</title>
    <style>
        :root {
            --base-plate: #2c3e50;
            --side-plate: #1a252f;
            --btn-top: #3498db;
            --btn-side: #2980b9;
            --accent: #2ecc71;
            --text: #ecf0f1;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background: #121212;
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            perspective: 1200px;
            overflow: hidden;
        }

        .console-box {
            width: 90%; max-width: 400px;
            background: var(--base-plate);
            padding: 40px 30px;
            border-radius: 20px;
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 20px 0 var(--side-plate), 0 30px 50px rgba(0,0,0,0.7);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* LED Indicator */
        .led {
            position: absolute; top: 20px; right: 25px;
            width: 10px; height: 10px;
            border-radius: 50%; background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        h2 { font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 5px 0; }
        #status { font-size: 0.7rem; color: #95a5a6; font-weight: bold; margin-bottom: 30px; display: block; }

        /* RECESSED INPUTS */
        select, input {
            width: 100%;
            padding: 16px;
            margin-bottom: 25px;
            background: #1a1a1a;
            border: none;
            border-radius: 10px;
            color: var(--accent) !important;
            font-size: 1.1rem;
            outline: none;
            box-shadow: inset 4px 4px 8px #000, inset -1px -1px 4px #444;
        }

        input[type="password"] { text-align: center; font-size: 2rem; letter-spacing: 12px; }

        /* EXTRUDED BUTTON */
        .extrude-btn {
            width: 100%;
            padding: 18px;
            background: var(--btn-top);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            /* The 3D Depth */
            box-shadow: 0 8px 0 var(--btn-side), 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s;
            transform: translateY(-4px);
        }

        .extrude-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--btn-side), 0 5px 10px rgba(0,0,0,0.4);
        }

        .extrude-btn:disabled {
            background: #7f8c8d; box-shadow: 0 8px 0 #34495e; cursor: not-allowed;
        }

        /* DATA DISPLAY PLATE */
        .data-plate {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid rgba(255,255,255,0.05);
            box-shadow: inset 2px 2px 10px rgba(0,0,0,0.5);
        }

        .name-txt { font-size: 2rem; font-weight: 900; margin: 10px 0; color: #fff; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .action-btn {
            padding: 15px; border-radius: 10px; text-decoration: none;
            text-align: center; font-weight: 800; font-size: 0.8rem;
            background: #ecf0f1; color: #2c3e50;
            box-shadow: 0 5px 0 #bdc3c7; transition: 0.1s;
        }
        .action-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #bdc3c7; }
        .action-btn.wa { background: var(--accent); color: #fff; box-shadow: 0 5px 0 #27ae60; }
        .action-btn.wa:active { box-shadow: 0 2px 0 #27ae60; }

        .hidden { display: none !important; }

        /* HYDRAULIC ANIMATION */
        .hydraulic-out { transform: translateZ(-300px) rotateX(20deg); opacity: 0; }
        .hydraulic-in { animation: hydroIn 0.6s forwards; }

        @keyframes hydroIn {
            0% { transform: translateZ(-300px) rotateX(-20deg); opacity: 0; }
            100% { transform: translateZ(0) rotateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="entry-screen" class="console-box">
        <div class="led"></div>
        <h2>System Entry</h2>
        <span id="status">Hardware Check: OK</span>
        <input type="password" id="pw" inputmode="numeric" placeholder="••••" maxlength="4">
        <button id="entry-btn" class="extrude-btn" onclick="handleEntry()" disabled>Engage</button>
    </div>

    <div id="lookup-view" class="console-box hidden">
        <div class="led" style="background: var(--btn-top); box-shadow: 0 0 10px var(--btn-top);"></div>
        <h2 id="service-display">SERVICE</h2>
        <div class="data-plate">
            <div id="name-display" class="name-txt">...</div>
            <div id="phone-display" style="font-size: 1.3rem; font-weight: 700; color: var(--btn-top);">-</div>
        </div>
        <div class="btn-row">
            <a href="#" id="call-link" class="action-btn">📞 CALL</a>
            <a href="#" id="wa-link" class="action-btn wa" style="display:none;">💬 WHATSAPP</a>
        </div>
        <p id="time-stamp" style="font-size: 0.65rem; opacity: 0.5; margin-top: 25px;"></p>
    </div>

    <div id="register-view" class="console-box hidden">
        <div class="led" style="background: var(--btn-top);"></div>
        <h2>Duty Log 🇮🇶</h2>
        <span id="status">Update Terminal Active</span>
        
        <select id="spec-select" onchange="toggleNameSection()">
            <option value="">-- Select Specialty --</option>
            <option value="NS">Neuro</option>
            <option value="CT">Thoracic</option>
            <option value="GS">Surgery</option>
            <option value="US">Uro</option>
            <option value="ENT">ENT</option>
            <option value="H">Cardio</option>
            <option value="D">DeathCert</option>
            <option value="OP">OP Anesthesia</option>
            <option value="ICU">ICU Anesthesia</option>
            <option value="R">Radio</option>
            <option value="ON">Onco</option>
            <option value="PS">Plastic</option>
        </select>

        <div id="name-section" class="hidden">
            <select id="name-list"></select>
            <button id="submit-btn" class="extrude-btn" onclick="submitRegistration()">Commit Changes</button>
        </div>
    </div>

<script>
    /* ORIGINAL LOGIC UNTOUCHED */
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    window.onload = async function() {
        if (mode === 'register') {
            document.getElementById('entry-title').innerText = "Doctor Login";
            prepareRegister();
        } else if (service) {
            document.getElementById('entry-title').innerText = "Clinical Access";
            prepareLookup();
        } else {
            document.getElementById('status').innerText = "⚠️ Link Disconnected";
        }
    };

    async function prepareRegister() {
        document.getElementById('status').innerText = "Uplinking Database...";
        try {
            const response = await fetch(`${scriptUrl}?action=getNames`);
            const data = await response.json(); 
            allResidents = data.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
            document.getElementById('status').innerText = "Uplink Secure";
            document.getElementById('entry-btn').disabled = false;
        } catch (e) { document.getElementById('status').innerText = "Sync Failed"; }
    }

    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');
        if (!selectedSpec) { nameSection.classList.add('hidden'); return; }

        let filtered;
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            filtered = allResidents.filter(res => res[1] === "A");
        } else if (selectedSpec === "D") {
            filtered = allResidents;
        } else {
            filtered = allResidents.filter(res => res[1] === selectedSpec);
        }

        if (filtered.length > 0) {
            dropdown.innerHTML = filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('');
            nameSection.classList.remove('hidden');
        } else {
            dropdown.innerHTML = "<option value=''>Error</option>";
            nameSection.classList.remove('hidden');
        }
    }

    async function prepareLookup() {
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                document.getElementById('status').innerText = "Uplink Secure";
                document.getElementById('entry-btn').disabled = false;
            } else {
                document.getElementById('status').innerText = "No Data Found";
            }
        } catch (e) { document.getElementById('status').innerText = "Offline"; }
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            // HYDRAULIC ANIMATION
            const current = document.querySelector('.console-box:not(.hidden)');
            current.classList.add('hydraulic-out');
            
            setTimeout(() => {
                current.style.display = 'none';
                let next;
                if (mode === 'register') {
                    next = document.getElementById('register-view');
                } else {
                    showLookupUI();
                    next = document.getElementById('lookup-view');
                }
                next.classList.remove('hidden');
                next.classList.add('hydraulic-in');
            }, 600);
        } else { alert("ACCESS DENIED"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = "LAST UPDATE: " + serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'block';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "UPLOADING...";
        btn.disabled = true;
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            alert("UPLOAD SUCCESSFUL ✅");
        } catch (e) { alert("ERROR"); }
        finally { btn.innerText = "Commit Changes"; btn.disabled = false; }
    }
</script>
</body>
</html>
