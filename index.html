<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Duty Portal 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c20;
            --light: #2a2d34;
            --shadow: #0d0e11;
            --accent: #fbbf24;
            --crimson: #e11d48;
            --btn-grey: #33373e;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        .embossed-card {
            position: relative;
            background: var(--bg);
            border-radius: 3rem;
            box-shadow: 20px 20px 60px var(--shadow), -10px -10px 40px var(--light);
            z-index: 10;
        }

        .breathing { animation: frameBreath 3s infinite ease-in-out; }
        @keyframes frameBreath {
            0%, 100% { box-shadow: 20px 20px 60px var(--shadow), -10px -10px 40px var(--light); }
            50% { box-shadow: 15px 15px 45px var(--shadow), -8px -8px 30px var(--light), 0 0 50px rgba(251, 191, 36, 0.3); }
        }

        .tube-container { position: absolute; inset: 0; pointer-events: none; z-index: 20; width: 100%; height: 100%; }
        #tube-bg { fill: none; stroke: rgba(251, 191, 36, 0.03); stroke-width: 4; }
        #tube-fluid {
            fill: none; stroke: var(--accent); stroke-width: 5; stroke-linecap: round;
            filter: drop-shadow(0 0 12px var(--accent));
            stroke-dasharray: 500 1200; stroke-dashoffset: 1700;
            opacity: 0; transition: opacity 0.4s;
        }

        .loading-active #tube-fluid { opacity: 1; animation: seamlessFlow 2s linear infinite; }
        @keyframes seamlessFlow { from { stroke-dashoffset: 1700; } to { stroke-dashoffset: 0; } }

        .recessed-input {
            background: var(--bg);
            border-radius: 1.5rem;
            box-shadow: inset 8px 8px 16px var(--shadow), inset -4px -4px 12px var(--light);
        }

        .embossed-btn {
            background: var(--bg);
            border-radius: 1.5rem;
            box-shadow: 10px 10px 20px var(--shadow), -5px -5px 15px var(--light);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #64748b; font-weight: 800;
        }

        .btn-register { background: var(--btn-grey); color: #e2e8f0; }

        .fetched-active {
            background: var(--accent) !important;
            color: #1a1c20 !important;
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.6), -5px -5px 15px var(--light) !important;
        }

        .crimson-warning {
            background: var(--crimson) !important;
            color: white !important;
            animation: shake 0.4s both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #shield { position: fixed; inset: 0; background: var(--bg); z-index: 100; transition: opacity 0.5s; }
        .phone-display { direction: ltr !important; unicode-bidi: isolate; display: inline-block; }
        .hidden { display: none !important; }

        /* Suggestion List Styles */
        .suggestions-box {
            max-height: 200px;
            overflow-y: auto;
            border-radius: 1rem;
            margin-top: 0.5rem;
            background: var(--bg);
            box-shadow: 10px 10px 20px var(--shadow);
        }
        .suggestion-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--light); }
        .suggestion-item:hover, .suggestion-item.selected { background: var(--light); color: var(--accent); }
    </style>
</head>
<body class="p-4">

    <div id="shield"></div>

    <div id="main-card" class="w-full max-w-sm embossed-card breathing p-10 transition-all duration-700 mx-auto">
        
        <svg class="tube-container" viewBox="0 0 384 512" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <rect id="tube-bg" x="2" y="2" width="380" height="508" rx="48" />
            <rect id="tube-fluid" x="2" y="2" width="380" height="508" rx="48" />
        </svg>

        <div id="login-view">
            <div class="text-center mb-10">
                <h1 class="text-white text-2xl font-extrabold tracking-tight">On-Call Portal</h1>
                <p id="status-text" class="text-[0.6rem] mt-2 uppercase font-bold tracking-[0.3em] text-amber-500/60">Connecting Database...</p>
            </div>
            <div class="space-y-8">
                <div class="recessed-input p-2">
                    <input type="password" id="pw" inputmode="numeric" maxlength="4" placeholder="••••" 
                        onkeydown="if(event.key==='Enter') handleEntry()"
                        class="w-full bg-transparent py-5 text-center text-4xl tracking-[1rem] text-amber-500 outline-none">
                </div>
                <button id="entry-btn" onclick="handleEntry()" class="embossed-btn w-full py-6 tracking-widest uppercase">Authorize</button>
            </div>
        </div>

        <div id="register-view" class="hidden space-y-6">
            <h2 class="text-white text-xl font-extrabold text-center mb-2">Duty Update 🇮🇶</h2>
            <div class="recessed-input p-2">
                <select id="spec-select" onchange="prepNameInput()" class="w-full bg-transparent p-4 text-slate-300 font-bold outline-none appearance-none">
                    <option value="" class="bg-[#1a1c20]">SPECIALTY</option>
                    <option value="NS" class="bg-[#1a1c20]">جراحة الجملة العصبية</option>
                    <option value="CT" class="bg-[#1a1c20]">جراحة القلب والصدر</option>
                    <option value="GS" class="bg-[#1a1c20]">الجراحة العامة</option>
                    <option value="US" class="bg-[#1a1c20]">جراحة المسالك البولية</option>
                    <option value="ENT" class="bg-[#1a1c20]">الأنف والأذن والحنجرة</option>
                    <option value="H" class="bg-[#1a1c20]">أمراض القلب</option>
                    <option value="ICU" class="bg-[#1a1c20]">تخدير العناية المركزة</option>
                    <option value="OP" class="bg-[#1a1c20]">تخدير العمليات</option>
                    <option value="R" class="bg-[#1a1c20]">الأشعة و السونار</option>
                    <option value="ON" class="bg-[#1a1c20]">الأورام</option>
                    <option value="D" class="bg-[#1a1c20]">الوفيات</option>
                </select>
            </div>

            <div id="name-section" class="hidden space-y-4">
                <div class="relative">
                    <div class="recessed-input p-2">
                        <input type="text" id="name-input" autocomplete="off" placeholder="Resident Name..." 
                            oninput="filterNames()" onkeydown="handleNameKey(event)"
                            class="w-full bg-transparent p-4 text-slate-300 font-bold outline-none">
                    </div>
                    <div id="suggestions" class="suggestions-box hidden absolute w-full z-50"></div>
                </div>
                <button id="submit-btn" onclick="submitRegistration()" class="embossed-btn btn-register w-full py-6 uppercase tracking-widest">
                    UPDATE
                </button>
            </div>
        </div>

        <div id="lookup-view" class="hidden text-center">
            <div class="recessed-input inline-block px-6 py-4 mb-6">
                <span id="service-display" class="text-amber-500 text-xl sm:text-2xl font-black uppercase">SERVICE</span>
            </div>
            <h2 id="name-display" class="text-white text-3xl font-extrabold mb-1">...</h2>
            <p id="phone-display" class="text-slate-500 font-bold text-lg mb-8 phone-display">-</p>
            
            <div class="flex flex-row gap-2 w-full">
                <a href="#" id="call-link" class="embossed-btn flex-1 py-5 px-1 uppercase tracking-tighter whitespace-nowrap text-[0.75rem] sm:text-base text-center">
                    📞 SIM Call
                </a>
                <a href="#" id="wa-link" onclick="openWhatsApp(event)" class="hidden flex-1 py-5 px-1 bg-emerald-500/20 border border-emerald-500 text-emerald-500 rounded-[1.5rem] font-extrabold shadow-lg tracking-tighter whitespace-nowrap text-[0.75rem] sm:text-base text-center">
                    💬 WhatsApp
                </a>
            </div>
            <p id="time-stamp" class="text-[0.55rem] text-slate-600 mt-10 font-mono tracking-widest uppercase"></p>
        </div>
    </div>

<script>
    const CONFIG = { user: "mHub96", repo: "s", path: "data.json" };
    const _pt1 = "ghp_dAUtsFhTH";
    const _pt2 = "a2KeJQOsxsC";
    const _pt3 = "Ct1vz8z1Z63";
    const _pt4 = "Am sjS"; 
    const GH_TOKEN = (_pt1 + _pt2 + _pt3 + _pt4).replace(/\s/g, '');

    const arabicSpecs = {
        "NS": "جراحة الجملة العصبية", "CT": "جراحة القلب والصدر", "GS": "الجراحة العامة",
        "US": "جراحة المسالك البولية", "ENT": "الأنف والأذن والحنجرة", "H": "أمراض القلب",
        "ICU": "تخدير العناية المركزة", "OP": "تخدير العمليات", "R": "الأشعة و السونار",
        "ON": "الأورام", "D": "الوفيات"
    };

    let db = { names: [], schedule: [] };
    let fileSha = "";
    let todayResident = null;
    let currentPool = [];
    let selectedIndex = -1;

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service'); 

    window.onload = async function() {
        setTimeout(() => { 
            const s = document.getElementById('shield');
            if(s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 500); }
        }, 300);
        await fetchData();
    };

    async function fetchData() {
        const status = document.getElementById('status-text');
        const entryBtn = document.getElementById('entry-btn');
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${GH_TOKEN}` }
            });
            if (res.ok) {
                const data = await res.json();
                fileSha = data.sha;
                db = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g, '')))));
                if (service) {
                    const todayStr = getTodayStr();
                    todayResident = db.schedule.find(s => s.specCode === service && s.date === todayStr);
                }
                status.innerText = "READY 🇮🇶";
                entryBtn.classList.add('fetched-active');
            }
        } catch (e) { console.error(e); }
    }

    function getTodayStr() {
        const now = new Date();
        return `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;
    }

    function handleEntry() {
        const pwField = document.getElementById('pw');
        const pin = pwField.value;
        const btn = document.getElementById('entry-btn');
        const card = document.getElementById('main-card');

        if (pin === "1234") { 
            card.style.opacity = "0";
            setTimeout(() => {
                document.getElementById('login-view').classList.add('hidden');
                if (mode === 'register') document.getElementById('register-view').classList.remove('hidden');
                else { showLookupUI(); document.getElementById('lookup-view').classList.remove('hidden'); }
                card.style.opacity = "1";
            }, 600);
        } else {
            pwField.value = ""; // Clear on fail
            btn.classList.add('crimson-warning');
            btn.innerText = "INCORRECT PIN";
            setTimeout(() => { btn.classList.remove('crimson-warning'); btn.innerText = "Authorize"; }, 2000);
        }
    }

    function prepNameInput() {
        const spec = document.getElementById('spec-select').value;
        const nameInput = document.getElementById('name-input');
        const section = document.getElementById('name-section');
        
        if (!spec) { section.classList.add('hidden'); return; }
        
        nameInput.value = "";
        section.classList.remove('hidden');

        // Logic for pool selection
        if (spec === "ICU" || spec === "OP") {
            currentPool = db.names.filter(n => n.spec === "A" && n.spec !== "RESERVE");
        } else if (spec === "D") {
            currentPool = db.names.filter(n => n.spec !== "RESERVE");
        } else {
            currentPool = db.names.filter(n => n.spec === spec && n.spec !== "RESERVE");
        }
    }

    function filterNames() {
        const val = document.getElementById('name-input').value.toLowerCase().replace(/^د\.?\s*/, '');
        const box = document.getElementById('suggestions');
        
        if (!val) { box.classList.add('hidden'); return; }

        const matches = currentPool.filter(n => 
            n.name.toLowerCase().replace(/^د\.?\s*/, '').includes(val)
        );

        if (matches.length > 0) {
            box.innerHTML = matches.map((m, i) => 
                `<div class="suggestion-item" onclick="selectSuggestion('${m.name}')">${m.name}</div>`
            ).join('');
            box.classList.remove('hidden');
            selectedIndex = -1;
        } else {
            box.classList.add('hidden');
        }
    }

    function handleNameKey(e) {
        const box = document.getElementById('suggestions');
        const items = box.querySelectorAll('.suggestion-item');

        if (e.key === "ArrowDown") {
            selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
            updateSelection(items);
        } else if (e.key === "ArrowUp") {
            selectedIndex = Math.max(selectedIndex - 1, 0);
            updateSelection(items);
        } else if (e.key === "Enter") {
            if (selectedIndex > -1) {
                selectSuggestion(items[selectedIndex].innerText);
            } else if (items.length > 0) {
                selectSuggestion(items[0].innerText); // Select first if nothing highlighted
            } else {
                submitRegistration(); // Direct submit if pool is small/exact
            }
        }
    }

    function updateSelection(items) {
        items.forEach((item, i) => {
            item.classList.toggle('selected', i === selectedIndex);
            if(i === selectedIndex) item.scrollIntoView({ block: 'nearest' });
        });
    }

    function selectSuggestion(name) {
        document.getElementById('name-input').value = name;
        document.getElementById('suggestions').classList.add('hidden');
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        const name = document.getElementById('name-input').value;
        const spec = document.getElementById('spec-select').value;
        const card = document.getElementById('main-card');

        if (!name || !spec) return;

        card.classList.add('loading-active');
        btn.innerText = "UPLOADING...";

        const entry = {
            date: getTodayStr(),
            specCode: spec, // Logic handled: ICU, OP, or D saved as selected
            name: name,
            timestamp: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
        };

        db.schedule = db.schedule.filter(s => !(s.date === entry.date && s.specCode === entry.specCode));
        db.schedule.push(entry);

        try {
            const body = {
                message: `Duty Update: ${spec} - ${name} 🇮🇶`,
                content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                sha: fileSha
            };

            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                method: "PUT",
                headers: { "Authorization": `token ${GH_TOKEN}` },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                const result = await res.json();
                fileSha = result.content.sha;
                btn.classList.add('fetched-active');
                btn.innerText = "SUCCESS ✅";
            }
        } catch (e) { btn.innerText = "RETRY ❌"; }

        setTimeout(() => {
            card.classList.remove('loading-active');
            btn.classList.remove('fetched-active');
            btn.innerText = "UPDATE";
        }, 2000);
    }

    function showLookupUI() {
        const nameDisp = document.getElementById('name-display');
        const phoneDisp = document.getElementById('phone-display');
        const servDisp = document.getElementById('service-display');
        servDisp.innerText = arabicSpecs[service] || service || "Service Unknown";

        if (todayResident) {
            const info = db.names.find(n => n.name === todayResident.name);
            const phone = info ? info.phone : "No Number";
            nameDisp.innerText = todayResident.name;
            phoneDisp.innerText = phone;
            document.getElementById('time-stamp').innerText = todayResident.timestamp ? "Updated: " + todayResident.timestamp : "";
            if (phone && phone !== "No Number") {
                document.getElementById('call-link').href = "tel:" + phone;
                document.getElementById('wa-link').classList.remove('hidden');
            }
        } else {
            nameDisp.innerText = "No Duty Found";
            phoneDisp.innerText = getTodayStr();
            document.getElementById('call-link').classList.add('hidden');
        }
    }

    function openWhatsApp(e) {
        e.preventDefault();
        const info = db.names.find(n => n.name === todayResident.name);
        if (info && info.phone) {
            window.location.href = "whatsapp://send?phone=" + info.phone;
        }
    }
</script>
</body>
</html>
