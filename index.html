<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duty Portal 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c20;
            --light: #2a2d34;
            --shadow: #0d0e11;
            --accent: #fbbf24;
            --crimson: #e11d48;
            --btn-grey: #33373e;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; overflow-x: hidden; }

        .embossed-card {
            position: relative;
            background: var(--bg);
            border-radius: 3rem;
            box-shadow: 20px 20px 60px var(--shadow), -10px -10px 40px var(--light);
            z-index: 10;
        }

        .breathing { animation: frameBreath 3s infinite ease-in-out; }
        @keyframes frameBreath {
            0%, 100% { box-shadow: 20px 20px 60px var(--shadow), -10px -10px 40px var(--light), 0 0 0px transparent; }
            50% { box-shadow: 15px 15px 45px var(--shadow), -8px -8px 30px var(--light), 0 0 50px rgba(251, 191, 36, 0.4); }
        }

        .tube-container { position: absolute; inset: 0; pointer-events: none; z-index: 20; width: 100%; height: 100%; }
        #tube-bg { fill: none; stroke: rgba(251, 191, 36, 0.03); stroke-width: 4; }
        #tube-fluid {
            fill: none; stroke: var(--accent); stroke-width: 5; stroke-linecap: round;
            filter: drop-shadow(0 0 12px var(--accent));
            stroke-dasharray: 500 1200; stroke-dashoffset: 1700;
            opacity: 0; transition: opacity 0.4s;
        }

        .loading-active #tube-fluid { opacity: 1; animation: seamlessFlow 2s linear infinite; }
        @keyframes seamlessFlow { from { stroke-dashoffset: 1700; } to { stroke-dashoffset: 0; } }

        .recessed-input {
            background: var(--bg);
            border-radius: 1.5rem;
            box-shadow: inset 8px 8px 16px var(--shadow), inset -4px -4px 12px var(--light);
        }

        .embossed-btn {
            background: var(--bg);
            border-radius: 1.5rem;
            box-shadow: 10px 10px 20px var(--shadow), -5px -5px 15px var(--light);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #64748b; font-weight: 800;
        }

        .fetched-active {
            background: var(--accent) !important;
            color: #1a1c20 !important;
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.6), -5px -5px 15px var(--light) !important;
        }

        .crimson-warning {
            background: var(--crimson) !important;
            color: white !important;
            animation: shake 0.4s both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #shield { position: fixed; inset: 0; background: var(--bg); z-index: 100; transition: opacity 0.5s; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="shield"></div>

    <div id="main-card" class="w-full max-w-sm embossed-card breathing p-10 transition-all duration-700">
        
        <svg class="tube-container" viewBox="0 0 384 512" preserveAspectRatio="none">
            <rect id="tube-bg" x="2" y="2" width="380" height="508" rx="48" />
            <rect id="tube-fluid" x="2" y="2" width="380" height="508" rx="48" />
        </svg>

        <div id="login-view">
            <div class="text-center mb-10">
                <h1 class="text-white text-2xl font-extrabold tracking-tight">On-Call Portal</h1>
                <p id="status-text" class="text-[0.6rem] mt-2 uppercase font-bold tracking-[0.3em] text-amber-500/60">Linking Database...</p>
            </div>
            <div class="space-y-8">
                <div class="recessed-input p-2">
                    <input type="password" id="pw" inputmode="numeric" maxlength="4" placeholder="••••" 
                        class="w-full bg-transparent py-5 text-center text-4xl tracking-[1rem] text-amber-500 outline-none">
                </div>
                <button id="entry-btn" onclick="handleEntry()" class="embossed-btn w-full py-6 tracking-widest uppercase">Authorize</button>
            </div>
        </div>

        <div id="lookup-view" class="hidden text-center">
            <div class="recessed-input inline-block px-6 py-4 mb-6 max-w-full">
                <span id="service-display" class="text-amber-500 text-lg font-black uppercase leading-tight">SERVICE</span>
            </div>
            <h2 id="name-display" class="text-white text-3xl font-extrabold mb-1">...</h2>
            <p id="phone-display" class="text-slate-500 font-bold text-lg mb-8">-</p>
            
            <div class="flex flex-row gap-2 w-full">
                <a href="#" id="call-link" class="embossed-btn flex-1 py-5 px-1 uppercase tracking-tighter whitespace-nowrap text-[0.7rem] sm:text-base">
                    📞 SIM Call
                </a>
                <a href="#" id="wa-link" class="hidden flex-1 py-5 px-1 bg-emerald-500/20 border border-emerald-500 text-emerald-500 rounded-[1.5rem] font-extrabold shadow-lg tracking-tighter whitespace-nowrap text-[0.7rem] sm:text-base">
                    💬 WhatsApp
                </a>
            </div>
            
            <p id="time-stamp" class="text-[0.55rem] text-slate-600 mt-10 font-mono tracking-widest uppercase"></p>
        </div>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const service = urlParams.get('service');
    
    const specialtyNames = {
        "NS": "جراحة الجملة العصبية",
        "CT": "جراحة الصدر و الاوعية الدموية",
        "GS": "الجراحة العامة",
        "US": "جراحة المسالك البولية",
        "ENT": "جراحة الاذن و الانف و الحنجرة",
        "H": "القلبية",
        "D": "الوفيات",
        "ICU": "تخدير العناية المركزة",
        "OP": "تخدير العمليات",
        "R": "الاشعة و السونار",
        "ON": "الاورام",
        "PS": "جراحة التجميل"
    };

    const CONFIG = {
        user: "mHub96",
        repo: "s",
        path: "data.json",
        rawUrl: "https://raw.githubusercontent.com/mHub96/s/main/data.json"
    };

    let db = null;
    let serverData = null;

    window.onload = async function() {
        setTimeout(() => { 
            const s = document.getElementById('shield');
            if(s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 500); }
        }, 300);

        const status = document.getElementById('status-text');
        const entryBtn = document.getElementById('entry-btn');

        // Logic for 8AM Shift Change 🇮🇶
        const now = new Date();
        const currentHour = now.getHours();
        
        // If before 8AM, we reference "yesterday's" duty resident
        if (currentHour < 8) {
            now.setDate(now.getDate() - 1);
        }

        const dutyDateStr = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;

        try {
            const res = await fetch(`${CONFIG.rawUrl}?t=${Date.now()}`);
            db = await res.json();

            if (service) {
                const duty = db.schedule.find(item => item.date === dutyDateStr && item.specCode === service);
                
                if (duty) {
                    const resident = db.names.find(n => n.name === duty.name);
                    serverData = {
                        pin: "1234", 
                        name: duty.name,
                        serviceCode: service,
                        phone: resident ? resident.phone : "No Number",
                        wa: resident ? resident.phone : null,
                        time: dutyDateStr
                    };
                    status.innerText = "LINK SECURE 🇮🇶";
                    entryBtn.classList.add('fetched-active');
                } else {
                    status.innerText = "NO DUTY FOUND";
                    status.style.color = "#e11d48";
                }
            } else {
                status.innerText = "INVALID QR LINK";
            }
        } catch (e) {
            status.innerText = "OFFLINE/ERROR";
        }
    };

    function handleEntry() {
        const pin = document.getElementById('pw').value;
        const btn = document.getElementById('entry-btn');
        const card = document.getElementById('main-card');

        if (pin === (serverData?.pin || "1234")) {
            card.style.opacity = "0";
            setTimeout(() => {
                document.getElementById('login-view').classList.add('hidden');
                showLookupUI();
                document.getElementById('lookup-view').classList.remove('hidden');
                card.style.opacity = "1";
            }, 600);
        } else {
            btn.classList.add('crimson-warning');
            btn.innerText = "WRONG PIN";
            setTimeout(() => { btn.classList.remove('crimson-warning'); btn.innerText = "Authorize"; }, 2000);
        }
    }

    function showLookupUI() {
        if (!serverData) return;
        
        const arabicTitle = specialtyNames[serverData.serviceCode] || serverData.serviceCode;
        
        document.getElementById('service-display').innerText = arabicTitle;
        document.getElementById('name-display').innerText = serverData.name;
        document.getElementById('phone-display').innerText = serverData.phone;
        document.getElementById('time-stamp').innerText = "DUTY DATE: " + serverData.time;
        
        document.getElementById('call-link').href = "tel:" + serverData.phone;
        
        if (serverData.wa) {
            const wa = document.getElementById('wa-link');
            wa.classList.remove('hidden');
            wa.href = "whatsapp://send?phone=" + serverData.wa;
        }
    }
</script>
</body>
</html>
