<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCHEDULER 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c20;
            --light: #2a2d34;
            --shadow: #0d0e11;
            --accent: #fbbf24;
            --emerald: #10b981;
            --crimson: #e11d48;
            --glow: 0 0 15px rgba(251, 191, 36, 0.8);
            --zebra: rgba(255, 255, 255, 0.02);
            --weekend-bg: rgba(16, 185, 129, 0.12); 
            /* WIDER CELLS FOR FULL NAMES 🇮🇶 */
            --cell-width: 240px; 
            --day-width: 70px;
            --date-width: 90px;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; overflow-x: hidden; }
        
        table { border-collapse: separate; border-spacing: 0; min-width: 2800px; table-layout: fixed; }
        .ac-container { position: relative; width: 100%; direction: rtl; overflow: visible; }
        
        /* Dynamic Column Colors */
        tr td:nth-child(1), thead th:nth-child(1) { --col-color: #fbbf24; }
        tr td:nth-child(2), thead th:nth-child(2) { --col-color: #60a5fa; }
        tr td:nth-child(3), thead th:nth-child(3) { --col-color: #a78bfa; }
        tr td:nth-child(4), thead th:nth-child(4) { --col-color: #f472b6; }
        tr td:nth-child(5), thead th:nth-child(5) { --col-color: #fb7185; }
        tr td:nth-child(6), thead th:nth-child(6) { --col-color: #38bdf8; }
        tr td:nth-child(7), thead th:nth-child(7) { --col-color: #c084fc; }
        tr td:nth-child(8), thead th:nth-child(8) { --col-color: #2dd4bf; }
        tr td:nth-child(9), thead th:nth-child(9) { --col-color: #94a3b8; }
        tr td:nth-child(10), thead th:nth-child(10) { --col-color: #fb923c; }
        tr td:nth-child(11), thead th:nth-child(11) { --col-color: #818cf8; }

        th { position: sticky; top: 0; background: var(--bg); z-index: 20; padding: 1.2rem 0.5rem; color: var(--col-color); font-weight: 800; font-size: 0.75rem; letter-spacing: 0.1em; border-bottom: 2px solid var(--light); text-shadow: 0 0 10px var(--col-color); width: var(--cell-width); }
        tr:nth-child(even) { background-color: var(--zebra); }

        /* Solid Sticky Unit 🇮🇶 */
        .day-col, .date-col {
            position: sticky !important; background-color: #1a1c20 !important;
            z-index: 30 !important; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .day-col { right: 0 !important; width: var(--day-width) !important; color: var(--accent); font-weight: 800; font-size: 0.75rem; }
        .date-col { 
            right: var(--day-width) !important; width: var(--date-width) !important; 
            border-left: 1px solid rgba(255,255,255,0.1); color: #64748b; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
        }
        
        thead th.day-col, thead th.date-col { z-index: 40 !important; top: 0; border-bottom: 2px solid var(--light); }
        tr.weekend-row { background-color: var(--weekend-bg) !important; }
        tr.weekend-row .day-col, tr.weekend-row .date-col { background-color: #1a2e28 !important; }

        /* Inputs & Suggestions */
        .cell-input, .ghost-text { width: 100%; padding: 1rem; font-size: 0.9rem; font-family: 'IBM Plex Sans Arabic', sans-serif; text-align: right; box-sizing: border-box; }
        .cell-input { position: relative; background: transparent; color: #fff; border-radius: 0.5rem; outline: none; z-index: 5; border: 1px solid transparent; }
        .cell-input:focus { background: rgba(255, 255, 255, 0.04); border-color: var(--col-color); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        
        .ghost-text { position: absolute; top: 0; right: 0; left: 0; bottom: 0; color: rgba(255, 255, 255, 0.35); pointer-events: none; white-space: pre; overflow: hidden; z-index: 1; direction: rtl; }
        .ghost-offset { color: transparent; }

        .dropdown-arrow { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #475569; cursor: pointer; z-index: 10; font-size: 0.65rem; padding: 5px; }
        .prefilled { color: var(--col-color) !important; opacity: 0.7; font-weight: 600; }
        .new-entry { color: var(--crimson) !important; text-shadow: 0 0 10px var(--crimson); font-weight: 700; }

        .custom-menu { position: absolute; top: 100%; right: 0; width: 100%; max-height: 250px; overflow-y: auto; background: #1e2126; border: 1px solid var(--light); border-radius: 0.8rem; z-index: 100; box-shadow: 0 10px 30px var(--shadow); display: none; text-align: right; }
        .custom-menu div { padding: 0.8rem 1rem; cursor: pointer; color: #94a3b8; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .custom-menu div:hover { background: var(--light); color: var(--col-color); }
    </style>
</head>
<body class="p-4">

    <div id="app-wrapper" class="max-w-full mx-auto opacity-30 pointer-events-none transition-opacity duration-500">
        <div class="flex justify-between items-center mb-8 px-4">
            <h1 class="text-2xl font-black text-white" style="text-shadow: var(--glow)">HOSPITAL SCHEDULER 🇮🇶</h1>
            <input type="month" id="month-picker" class="bg-black/40 text-amber-500 font-bold p-3 rounded-xl border border-white/10 outline-none" onchange="generateTable()">
        </div>

        <div class="bg-black/20 rounded-[2.5rem] p-4 shadow-2xl border border-white/5">
            <div class="recessed-table-container max-h-[75vh] overflow-x-auto rounded-2xl">
                <table id="schedule-table">
                    <thead><tr id="table-headers"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <div class="mt-6 flex justify-end">
                <button id="save-btn" onclick="saveAll()" class="bg-[#2a2d34] px-12 py-5 rounded-2xl text-amber-500 font-black tracking-widest active:scale-95 transition-all">
                    UPDATE DATABASE
                </button>
            </div>
        </div>
    </div>

<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";
    const specialties = [
        { id: "NS", name: "Neurosurgery" }, { id: "CT", name: "Cardiothoracic" },
        { id: "GS", name: "General Surg" }, { id: "US", name: "Urosurgery" },
        { id: "ENT", name: "ENT Dept" }, { id: "H", name: "Cardiology" },
        { id: "D", name: "Death Certs" }, { id: "OP", name: "OT Anaesth" },
        { id: "ICU", name: "ICU Anaesth" }, { id: "R", name: "Radiology" },
        { id: "ON", name: "Oncology" }
    ];

    let nameData = {}; 

    window.onload = () => {
        const now = new Date();
        const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        document.getElementById('month-picker').value = `${nextMonth.getFullYear()}-${String(nextMonth.getMonth() + 1).padStart(2, '0')}`;
        initDataSync();
    };

    async function initDataSync() {
        try {
            const respNames = await fetch(`${scriptUrl}?action=getNames`);
            const allResidents = await respNames.json();
            specialties.forEach(spec => {
                if (spec.id === "OP" || spec.id === "ICU") nameData[spec.id] = allResidents.filter(r => r[1] === "A").map(r => r[0]);
                else if (spec.id === "D") nameData[spec.id] = allResidents.map(r => r[0]);
                else nameData[spec.id] = allResidents.filter(r => r[1] === spec.id).map(r => r[0]);
            });
            generateTable(); 
        } catch (e) { unlockTable(); }
    }

    function generateTable() {
        const picker = document.getElementById('month-picker').value;
        const [year, month] = picker.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        
        document.getElementById('table-headers').innerHTML = specialties.map(s => `<th>${s.name}</th>`).join('') + `<th class="date-col">Date</th><th class="day-col">Day</th>`;

        const body = document.getElementById('table-body');
        body.innerHTML = "";
        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(year, month-1, d);
            const dd = String(d).padStart(2, '0');
            const mm = String(month).padStart(2, '0');
            const dayShort = new Intl.DateTimeFormat('ar-IQ', { weekday: 'short' }).format(dateObj);
            
            const tr = document.createElement('tr');
            if (dateObj.getDay() === 5 || dateObj.getDay() === 6) tr.classList.add('weekend-row');
            
            let rHtml = specialties.map(s => `
                <td><div class="ac-container">
                    <div class="ghost-text" id="ghost-${d}-${s.id}"></div>
                    <input type="text" class="cell-input" id="input-${d}-${s.id}" autocomplete="off" 
                        oninput="handleAC(this, '${s.id}', '${d}-${s.id}')" 
                        onkeydown="handleKeys(event, this, '${d}-${s.id}')" 
                        onblur="handleBlur('${d}-${s.id}')" data-date="${dd}/${mm}/${year}" data-spec="${s.id}">
                    <span class="dropdown-arrow" onclick="toggleMenu('${d}-${s.id}', '${s.id}')">▼</span>
                    <div class="custom-menu" id="menu-${d}-${s.id}"></div>
                </div></td>`).join('');
            
            rHtml += `<td class="date-col"><div class="flex flex-row-reverse justify-center gap-1"><span>${mm}</span><span>/</span><span>${dd}</span></div></td>
                      <td class="day-col">${dayShort}</td>`;
            tr.innerHTML = rHtml;
            body.appendChild(tr);
        }
        fetchExistingSchedule();
    }

    // THE FOCUS LOCK 🇮🇶
    function handleKeys(e, el, uniqueId) {
        const ghost = document.getElementById(`ghost-${uniqueId}`);
        const fullMatch = ghost.getAttribute('data-full-match');
        
        if (e.key === "Enter") {
            e.preventDefault(); 
            e.stopPropagation(); // Stops bubbling to parent table elements

            if (fullMatch) {
                el.value = fullMatch;
                el.classList.add('new-entry');
            }

            const parts = uniqueId.split('-'); 
            const nextDay = parseInt(parts[0]) + 1;
            const specId = parts[1];
            const nextEl = document.getElementById(`input-${nextDay}-${specId}`);

            // Wait for one animation frame to ensure browser is idle before forcing focus
            requestAnimationFrame(() => {
                if (nextEl) {
                    nextEl.focus();
                } else {
                    el.blur();
                }
            });
        }
    }

    function handleAC(el, specId, uniqueId) {
        const ghost = document.getElementById(`ghost-${uniqueId}`);
        const val = el.value;
        const valLower = val.toLowerCase().trim();
        ghost.innerText = ""; ghost.removeAttribute('data-full-match');
        el.classList.remove('prefilled');
        if (val.trim() === "") { el.classList.remove('new-entry'); return; }
        el.classList.add('new-entry');

        if (nameData[specId]) {
            const cleanInput = valLower.replace(/^د\.\s*/, "");
            const match = nameData[specId].find(name => {
                const nameLower = name.toLowerCase();
                const cleanName = nameLower.replace(/^د\.\s*/, "");
                return nameLower.startsWith(valLower) || cleanName.startsWith(cleanInput);
            });

            if (match) {
                ghost.setAttribute('data-full-match', match);
                let display = val.startsWith("د.") ? match : match.replace(/^د\.\s*/, "");
                if (display.toLowerCase().startsWith(valLower)) {
                    ghost.innerHTML = `<span class="ghost-offset">${val}</span>${display.substring(val.length)}`;
                } else {
                    ghost.innerText = display;
                    ghost.style.color = "rgba(255, 255, 255, 0.1)";
                }
            }
        }
    }

    function toggleMenu(uniqueId, specId) {
        const menu = document.getElementById(`menu-${uniqueId}`);
        const isVisible = menu.style.display === "block";
        document.querySelectorAll('.custom-menu').forEach(m => m.style.display = "none");
        if (!isVisible) {
            menu.innerHTML = (nameData[specId] || []).map(n => `<div onmousedown="selectName('${uniqueId}', '${n}')">${n}</div>`).join('');
            menu.style.display = "block";
        }
    }

    function selectName(uniqueId, name) {
        const input = document.getElementById(`input-${uniqueId}`);
        input.value = name;
        input.classList.add('new-entry');
        const ghost = document.getElementById(`ghost-${uniqueId}`);
        ghost.innerText = ""; ghost.removeAttribute('data-full-match');
    }

    function handleBlur(uniqueId) {
        const ghost = document.getElementById(`ghost-${uniqueId}`);
        const input = document.getElementById(`input-${uniqueId}`);
        const fullMatch = ghost.getAttribute('data-full-match');
        if (fullMatch && input.value.trim() !== "") {
            input.value = fullMatch;
            input.classList.add('new-entry');
        }
        setTimeout(() => {
            ghost.innerText = "";
            const menu = document.getElementById(`menu-${uniqueId}`);
            if (menu) menu.style.display = "none";
        }, 220);
    }

    async function fetchExistingSchedule() {
        const monthVal = document.getElementById('month-picker').value;
        try {
            const resp = await fetch(`${scriptUrl}?action=getSchedule&month=${monthVal}`);
            const schedule = await resp.json();
            schedule.forEach(row => {
                const day = parseInt(row.date.split('/')[0]);
                const inputEl = document.getElementById(`input-${day}-${row.specCode}`);
                if (inputEl && row.name) {
                    inputEl.value = row.name;
                    inputEl.classList.add('prefilled');
                }
            });
        } finally { unlockTable(); }
    }

    function unlockTable() {
        document.getElementById('app-wrapper').style.opacity = "1";
        document.getElementById('app-wrapper').style.pointerEvents = "auto";
    }

    async function saveAll() {
        const btn = document.getElementById('save-btn');
        const activeInputs = Array.from(document.querySelectorAll('.cell-input')).filter(i => i.value.trim() !== "");
        if (!activeInputs.length) return;
        btn.disabled = true; btn.innerText = "UPLOADING...";
        const bulkData = activeInputs.map(el => ({ date: el.dataset.date, specialty: el.dataset.spec, name: el.value.trim() }));
        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ payload: bulkData }) });
            btn.innerText = "SYNCED ✅";
            activeInputs.forEach(i => { i.classList.remove('new-entry'); i.classList.add('prefilled'); });
        } catch (e) { btn.innerText = "FAILED ⚠️"; }
        setTimeout(() => { btn.disabled = false; btn.innerText = "UPDATE DATABASE"; }, 2000);
    }
</script>
</body>
</html>
