<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On-Call Pro | Neon Terminal</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-yellow: #fff200;
            --bg-dark: #0a0a0f;
            --panel-bg: rgba(16, 16, 28, 0.9);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Share Tech Mono', monospace; /* Very tech/retro vibe */
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: var(--neon-blue);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* CRT Scanline Effect */
        body::after {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 118, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .terminal-container {
            width: 90%; max-width: 380px;
            padding: 30px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue), inset 0 0 10px var(--neon-blue);
            position: relative;
            animation: flicker 0.15s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.95; } 100% { opacity: 1; }
        }

        h2 { 
            text-transform: uppercase; letter-spacing: 4px; font-size: 1.5rem; 
            text-shadow: 0 0 10px var(--neon-blue); margin-bottom: 5px;
        }

        .status-tag {
            font-size: 0.7rem; color: var(--neon-yellow);
            text-transform: uppercase; margin-bottom: 25px; display: block;
        }

        /* INPUTS */
        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue) !important;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input[type="password"] {
            text-align: center; font-size: 2rem; letter-spacing: 10px;
        }

        /* THE GLITCH BUTTON */
        .neon-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: var(--neon-pink);
            border: 2px solid var(--neon-pink);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
            overflow: hidden;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .neon-btn:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 30px var(--neon-pink);
            text-shadow: 2px 2px #ff0000, -2px -2px #0000ff;
        }

        .neon-btn:active {
            transform: translateY(4px);
            filter: hue-rotate(90deg);
        }

        .neon-btn:disabled {
            border-color: #333; color: #333; box-shadow: none;
        }

        /* LOOKUP SPECIFIC */
        .data-readout {
            border: 1px solid var(--neon-blue);
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 243, 255, 0.05);
            position: relative;
        }

        .data-readout::before {
            content: "SECURE_DATA_STREAM";
            position: absolute; top: -8px; left: 10px;
            background: var(--bg-dark);
            font-size: 0.6rem; padding: 0 5px; color: var(--neon-yellow);
        }

        .name-display { font-size: 2rem; color: #fff; text-shadow: 0 0 5px var(--neon-blue); }
        
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .action-link {
            text-decoration: none; padding: 12px; font-size: 0.8rem;
            text-align: center; font-weight: bold; border: 1px solid;
        }
        .call-link { color: var(--neon-blue); border-color: var(--neon-blue); }
        .wa-link { color: #00ff00; border-color: #00ff00; box-shadow: 0 0 5px #00ff00; }

        .hidden { display: none !important; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div id="entry-screen" class="terminal-container">
        <h2 id="entry-title">System_Access</h2>
        <span class="status-tag" id="status">Waiting for uplink...</span>
        <input type="password" id="pw" inputmode="numeric" placeholder="PIN" maxlength="4">
        <button id="entry-btn" class="neon-btn" onclick="handleEntry()" disabled>Init_Auth</button>
    </div>

    <div id="lookup-view" class="terminal-container hidden">
        <span id="service-display" class="status-tag">SERVICE_IDENTIFIED</span>
        <div class="data-readout">
            <div id="name-display" class="name-display">...</div>
            <div id="phone-display" style="margin-top:10px; font-size: 1.2rem;">-</div>
        </div>
        <div class="action-row">
            <a href="#" id="call-link" class="action-link call-link">VOICE_COM</a>
            <a href="#" id="wa-link" class="action-link wa-link" style="display:none;">WHATSAPP_TX</a>
        </div>
        <p id="time-stamp" style="font-size: 0.6rem; opacity: 0.6; margin-top: 20px;"></p>
    </div>

    <div id="register-view" class="terminal-container hidden">
        <h2 style="color: var(--neon-pink); box-shadow: none; text-shadow: 0 0 10px var(--neon-pink);">Registry_Log</h2>
        <span class="status-tag">Satellite Uplink: Iraq_Active 🇮🇶</span>
        
        <select id="spec-select" onchange="toggleNameSection()">
            <option value="">[SELECT_SECTOR]</option>
            <option value="NS">NEUROSURGERY</option>
            <option value="CT">THORACIC</option>
            <option value="GS">GEN_SURGERY</option>
            <option value="US">UROLOGY</option>
            <option value="ENT">E.N.T</option>
            <option value="H">CARDIOLOGY</option>
            <option value="D">DEATH_RECORDS</option>
            <option value="OP">ANESTH_OP</option>
            <option value="ICU">ANESTH_ICU</option>
            <option value="R">RADIOLOGY</option>
            <option value="ON">ONCOLOGY</option>
            <option value="PS">PLASTIC_SURG</option>
        </select>

        <div id="name-section" class="hidden">
            <select id="name-list"></select>
            <button id="submit-btn" class="neon-btn" onclick="submitRegistration()">Commit_Override</button>
        </div>
    </div>

<script>
    /* 100% ORIGINAL SCRIPT LOGIC REINSTATED */
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    window.onload = async function() {
        if (mode === 'register') {
            document.getElementById('entry-title').innerText = "MD_Registry";
            prepareRegister();
        } else if (service) {
            document.getElementById('entry-title').innerText = "Lookup_Term";
            prepareLookup();
        } else {
            document.getElementById('status').innerText = "⚠️ SYSTEM_LINK_BRICKED";
        }
    };

    async function prepareRegister() {
        document.getElementById('status').innerText = "SYNCHRONIZING_DATABASE...";
        try {
            const response = await fetch(`${scriptUrl}?action=getNames`);
            const data = await response.json(); 
            allResidents = data.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
            document.getElementById('status').innerText = "DATABASE_READY_✅";
            document.getElementById('entry-btn').disabled = false;
        } catch (e) { 
            document.getElementById('status').innerText = "DATA_SYNC_FAILED"; 
        }
    }

    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');
        if (!selectedSpec) { nameSection.classList.add('hidden'); return; }

        let filtered;
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            filtered = allResidents.filter(res => res[1] === "A");
        } else if (selectedSpec === "D") {
            filtered = allResidents;
        } else {
            filtered = allResidents.filter(res => res[1] === selectedSpec);
        }

        if (filtered.length > 0) {
            dropdown.innerHTML = filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('');
            nameSection.classList.remove('hidden');
        } else {
            dropdown.innerHTML = "<option value=''>ZERO_RECORDS</option>";
            nameSection.classList.remove('hidden');
        }
    }

    async function prepareLookup() {
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                document.getElementById('status').innerText = "ENCRYPTION_LINK_ONLINE_✅";
                document.getElementById('entry-btn').disabled = false;
            } else {
                document.getElementById('status').innerText = "TARGET_DATA_NULL";
            }
        } catch (e) { document.getElementById('status').innerText = "UPLINK_OFFLINE"; }
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            document.getElementById('entry-screen').style.display = 'none';
            if (mode === 'register') {
                document.getElementById('register-view').classList.remove('hidden');
            } else {
                showLookupUI();
            }
        } else { alert("ACCESS_REJECTED: WRONG_PIN"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = "LOG_TIME: " + serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'block';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
        document.getElementById('lookup-view').classList.remove('hidden');
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "UPLOADING...";
        btn.disabled = true;
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            alert("UPLOAD_SUCCESSFUL");
        } catch (e) {
            alert("PROTOCOL_ERROR");
        } finally {
            btn.innerText = "Commit_Override";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
