<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Duty Portal 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --crimson: #f43f5e;
            --input-bg: rgba(0, 0, 0, 0.4);
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: #f1f5f9; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Decorative Background Aurora Glows */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            pointer-events: none;
        }
        body::before { top: 15%; left: 10%; background: rgba(56, 189, 248, 0.15); }
        body::after { bottom: 15%; right: 10%; background: rgba(99, 102, 241, 0.15); }

        .glass-card {
            position: relative;
            background: var(--glass);
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .breathing { animation: frameBreath 4s infinite ease-in-out; }
        @keyframes frameBreath {
            0%, 100% { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1); }
            50% { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.2), 0 0 30px rgba(54, 163, 248, 0.2); }
        }

        .tube-container { position: absolute; inset: -1px; pointer-events: none; z-index: 20; width: calc(100% + 2px); height: calc(100% + 2px); }
        #tube-bg { fill: none; stroke: transparent; stroke-width: 2; }
        #tube-fluid {
            fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round;
            filter: drop-shadow(0 0 8px var(--accent));
            stroke-dasharray: 80 800; stroke-dashoffset: 880;
            opacity: 0; transition: opacity 0.4s;
        }

        .loading-active #tube-fluid { opacity: 1; animation: seamlessFlow 1.5s linear infinite; }
        @keyframes seamlessFlow { from { stroke-dashoffset: 880; } to { stroke-dashoffset: 0; } }

        .cyber-input {
            background: var(--input-bg);
            border-radius: 1.25rem;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }
        .cyber-input:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .cyber-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.07));
            border-radius: 1.25rem;
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            color: #94a3b8; font-weight: 800;
        }
        .cyber-btn:hover {
            border-color: rgba(255,255,255,0.2);
            color: #fff;
        }

        .fetched-active { 
            background: linear-gradient(135deg, #0284c7, #0369a1) !important; 
            color: #ffffff !important; 
            border-color: var(--accent) !important;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.4) !important; 
        }

        #shield { position: fixed; inset: 0; background: var(--bg); z-index: 100; transition: opacity 0.5s; }
        .phone-display { direction: ltr !important; unicode-bidi: isolate; display: inline-block; }
        .hidden { display: none !important; }

        .centered-select { direction: ltr; text-align: center; text-align-last: center; }
        .rtl-input { direction: rtl; text-align: right; }

        .suggestions-box {
            max-height: 200px;
            overflow-y: auto;
            border-radius: 1rem;
            margin-top: 0.5rem;
            background: #111827;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            direction: rtl;
        }
        .suggestion-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: right; color: #94a3b8; }
        .suggestion-item:hover, .suggestion-item.selected { background: rgba(56, 189, 248, 0.1); color: var(--accent); }
    </style>
</head>
<body class="p-4">

    <div id="shield"></div>

    <div id="main-card" class="w-full max-w-sm glass-card breathing p-10 transition-all duration-700 mx-auto">
        
        <svg class="tube-container" viewBox="0 0 384 512" preserveAspectRatio="none">
            <rect id="tube-bg" x="1" y="1" width="382" height="510" rx="32" />
            <rect id="tube-fluid" x="1" y="1" width="382" height="510" rx="32" />
        </svg>

        <div id="login-view">
            <div class="text-center mb-10">
                <h1 class="text-white text-2xl font-extrabold tracking-tight">On-Call Portal</h1>
                <p id="status-text" class="text-[0.6rem] mt-2 uppercase font-bold tracking-[0.3em] text-sky-400/60">Connecting Database...</p>
            </div>
            <div class="space-y-8">
                <div class="cyber-input p-2">
                    <input type="password" id="pw" inputmode="numeric" maxlength="4" placeholder="••••" 
                        onkeydown="if(event.key==='Enter') handleEntry()"
                        class="w-full bg-transparent py-5 text-center text-4xl tracking-[1rem] text-sky-400 outline-none">
                </div>
                <button id="entry-btn" onclick="handleEntry()" class="cyber-btn w-full py-6 tracking-widest uppercase text-sm">Authorize</button>
            </div>
        </div>

        <div id="register-view" class="hidden space-y-6">
            <h2 class="text-white text-xl font-extrabold text-center mb-2">Duty Update 🇮🇶</h2>
            <div class="cyber-input p-2">
                <select id="spec-select" onchange="prepNameInput()" class="w-full bg-transparent p-4 text-slate-300 font-bold outline-none appearance-none centered-select">
                    <option value="" class="bg-[#111827]">SPECIALTY</option>
                    <option value="NS" class="bg-[#111827]">جراحة الجملة العصبية</option>
                    <option value="CT" class="bg-[#111827]">جراحة القلب والصدر</option>
                    <option value="GS" class="bg-[#111827]">الجراحة العامة</option>
                    <option value="US" class="bg-[#111827]">جراحة المسالك البولية</option>
                    <option value="ENT" class="bg-[#111827]">الأنف والأذن والحنجرة</option>
                    <option value="H" class="bg-[#111827]">أمراض القلب</option>
                    <option value="ICU" class="bg-[#111827]">تخدير العناية المركزة</option>
                    <option value="OP" class="bg-[#111827]">تخدير العمليات</option>
                    <option value="R" class="bg-[#111827]">الأشعة و السونار</option>
                    <option value="ON" class="bg-[#111827]">الأورام</option>
                    <option value="D" class="bg-[#111827]">الوفيات</option>
                </select>
            </div>

            <div id="name-section" class="hidden space-y-4">
                <div class="relative">
                    <div class="cyber-input p-2">
                        <input type="text" id="name-input" autocomplete="off" placeholder="اسم المقيم..." 
                            oninput="filterNames()" 
                            onkeydown="handleNameKey(event)"
                            onblur="setTimeout(() => document.getElementById('suggestions').classList.add('hidden'), 200)"
                            class="w-full bg-transparent p-4 text-slate-300 font-bold outline-none rtl-input">
                    </div>
                    <div id="suggestions" class="suggestions-box hidden absolute w-full z-50"></div>
                </div>
                <button id="submit-btn" onclick="submitRegistration()" class="cyber-btn w-full py-6 uppercase tracking-widest text-sm">
                    UPDATE
                </button>
            </div>
        </div>

        <div id="lookup-view" class="hidden text-center">
            <div class="cyber-input inline-block px-6 py-4 mb-6">
                <span id="service-display" class="text-sky-400 text-xl sm:text-2xl font-black uppercase">SERVICE</span>
            </div>
            <h2 id="name-display" class="text-white text-3xl font-extrabold mb-1">...</h2>
            <p id="phone-display" class="text-slate-400 font-bold text-lg mb-8 phone-display">-</p>
            
            <div class="flex flex-row gap-2 w-full">
                <a href="#" id="call-link" class="cyber-btn flex-1 py-5 px-1 uppercase tracking-tighter whitespace-nowrap text-[0.75rem] sm:text-base text-center">📞 SIM Call</a>
                <a href="#" id="wa-link" onclick="openWhatsApp(event)" class="hidden flex-1 py-5 px-1 bg-emerald-500/10 border border-emerald-500/40 text-emerald-400 rounded-[1.25rem] font-extrabold shadow-lg tracking-tighter whitespace-nowrap text-[0.75rem] sm:text-base text-center hover:bg-emerald-500/20 transition-all duration-300">💬 WhatsApp</a>
            </div>
            <p id="time-stamp" class="text-[0.65rem] text-slate-500 mt-10 font-bold tracking-wider uppercase"></p>
        </div>
    </div>

<script>
    const CONFIG = { user: "mHub96", repo: "s", path: "data.json" };
    const _pt1 = "ghp_dAUtsFhTH";
    const _pt2 = "a2KeJQOsxsC";
    const _pt3 = "Ct1vz8z1Z63";
    const _pt4 = "Am sjS"; 
    const GH_TOKEN = (_pt1 + _pt2 + _pt3 + _pt4).replace(/\s/g, '');

    const arabicSpecs = {
        "NS": "جراحة الجملة العصبية", "CT": "جراحة القلب والصدر", "GS": "الجراحة العامة",
        "US": "جراحة المسالك البولية", "ENT": "الأنف والأذن والحنجرة", "H": "أمراض القلب",
        "ICU": "تخدير العناية المركزة", "OP": "تخدير العمليات", "R": "الأشعة و السونار",
        "ON": "الأورام", "D": "الوفيات"
    };

    let db = { names: [], schedule: [] };
    let fileSha = "";
    let todayResident = null;
    let currentPool = [];
    let selectedIndex = -1;

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service'); 

    window.onload = async function() {
        setTimeout(() => { 
            const s = document.getElementById('shield');
            if(s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 500); }
        }, 300);
        await fetchData();
    };

    async function fetchData() {
        const status = document.getElementById('status-text');
        const entryBtn = document.getElementById('entry-btn');
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${GH_TOKEN}` }
            });
            if (res.ok) {
                const data = await res.json();
                fileSha = data.sha;
                db = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g, '')))));
                if (service) {
                    const todayStr = getTodayStr();
                    todayResident = db.schedule.find(s => s.specCode === service && s.date === todayStr);
                }
                status.innerText = "READY 🇮🇶";
                entryBtn.classList.add('fetched-active');
            }
        } catch (e) { console.error(e); }
    }

    function getTodayStr() {
        const now = new Date();
        return `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;
    }

    function handleEntry() {
        const pin = document.getElementById('pw').value;
        const card = document.getElementById('main-card');
        if (pin === "1234") { 
            card.style.opacity = "0";
            setTimeout(() => {
                document.getElementById('login-view').classList.add('hidden');
                if (mode === 'register') document.getElementById('register-view').classList.remove('hidden');
                else { showLookupUI(); document.getElementById('lookup-view').classList.remove('hidden'); }
                card.style.opacity = "1";
            }, 600);
        }
    }

    function prepNameInput() {
        const spec = document.getElementById('spec-select').value;
        const section = document.getElementById('name-section');
        if (!spec) { section.classList.add('hidden'); return; }
        document.getElementById('name-input').value = "";
        section.classList.remove('hidden');
        
        if (spec === "ICU" || spec === "OP") currentPool = db.names.filter(n => n.spec === "A" && n.spec !== "RESERVE");
        else if (spec === "D") currentPool = db.names.filter(n => n.spec !== "RESERVE");
        else currentPool = db.names.filter(n => n.spec === spec && n.spec !== "RESERVE");
    }

    function filterNames() {
        const nameInput = document.getElementById('name-input');
        const val = nameInput.value.trim().toLowerCase().replace(/^د\.?\s*/, '');
        const box = document.getElementById('suggestions');
        
        if (!val) { box.classList.add('hidden'); return; }

        const matches = currentPool.filter(n => n.name.toLowerCase().replace(/^د\.?\s*/, '').includes(val))
            .sort((a, b) => {
                const aC = a.name.toLowerCase().replace(/^د\.?\s*/, '');
                const bC = b.name.toLowerCase().replace(/^د\.?\s*/, '');
                return aC.startsWith(val) && !bC.startsWith(val) ? -1 : 1;
            });

        if (matches.length > 0) {
            box.innerHTML = matches.map(m => `<div class="suggestion-item" onclick="selectSuggestion('${m.name}')">${m.name}</div>`).join('');
            box.classList.remove('hidden');
            selectedIndex = -1;
        } else box.classList.add('hidden');
    }

    function handleNameKey(e) {
        const box = document.getElementById('suggestions');
        const items = box.querySelectorAll('.suggestion-item');
        if (e.key === "ArrowDown") selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
        else if (e.key === "ArrowUp") selectedIndex = Math.max(selectedIndex - 1, 0);
        else if (e.key === "Enter") {
            if (selectedIndex > -1) selectSuggestion(items[selectedIndex].innerText);
            else if (items.length > 0) selectSuggestion(items[0].innerText);
            else submitRegistration();
        }
        items.forEach((item, i) => item.classList.toggle('selected', i === selectedIndex));
    }

    function selectSuggestion(name) {
        document.getElementById('name-input').value = name;
        document.getElementById('suggestions').classList.add('hidden');
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        const nameInput = document.getElementById('name-input');
        const specSelect = document.getElementById('spec-select');
        const card = document.getElementById('main-card');
        if (!nameInput.value || !specSelect.value) return;

        card.classList.add('loading-active');
        btn.innerText = "UPLOADING...";

        const entry = {
            date: getTodayStr(), specCode: specSelect.value, name: nameInput.value,
            timestamp: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
        };

        db.schedule = db.schedule.filter(s => !(s.date === entry.date && s.specCode === entry.specCode));
        db.schedule.push(entry);

        try {
            const body = { message: `Update: ${entry.name}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))), sha: fileSha };
            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                method: "PUT", headers: { "Authorization": `token ${GH_TOKEN}` }, body: JSON.stringify(body)
            });

            if (res.ok) {
                const result = await res.json();
                fileSha = result.content.sha;
                card.classList.remove('loading-active');
                btn.classList.add('fetched-active');
                btn.innerText = "SUCCESS ✅";

                setTimeout(() => {
                    specSelect.value = "";
                    nameInput.value = "";
                    document.getElementById('name-section').classList.add('hidden');
                    btn.classList.remove('fetched-active');
                    btn.innerText = "UPDATE";
                }, 2000);
            }
        } catch (e) { card.classList.remove('loading-active'); btn.innerText = "RETRY ❌"; }
    }

    function showLookupUI() {
        const now = new Date();
        const timestamp = `${String(now.getDate()).padStart(2, '0')}-${now.toLocaleString('en-GB', { month: 'short' })}-${now.getFullYear()} | ${now.toLocaleString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: true }).toUpperCase()}`;
        
        document.getElementById('service-display').innerText = arabicSpecs[service] || service;
        document.getElementById('time-stamp').innerText = timestamp;

        if (todayResident) {
            const info = db.names.find(n => n.name === todayResident.name);
            document.getElementById('name-display').innerText = todayResident.name;
            document.getElementById('phone-display').innerText = info ? info.phone : "No Number";
            if (info?.phone) {
                document.getElementById('call-link').href = "tel:" + info.phone;
                document.getElementById('wa-link').classList.remove('hidden');
            }
        } else document.getElementById('name-display').innerText = "No Duty Found";
    }

    function openWhatsApp(e) {
        e.preventDefault();
        const info = db.names.find(n => n.name === todayResident.name);
        if (info?.phone) window.location.href = "whatsapp://send?phone=" + info.phone;
    }
</script>
</body>
</html>
