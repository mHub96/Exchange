<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>On-Call Pro</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #000000;
            --panel-bg: rgba(25, 25( 27, 0.75);
            --accent-glow: rgba(0, 122, 255, 0.4);
            --text-main: #FFFFFF;
            --text-sec: #A1A1A6;
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background: var(--ios-bg);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Sophisticated Mesh Background */
        .mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, #1c1c1e 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, #001d3d 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000 100%);
        }

        .container {
            width: 90%; max-width: 380px;
            padding: 40px 28px;
            background: var(--panel-bg);
            backdrop-filter: blur(50px) saturate(210%);
            -webkit-backdrop-filter: blur(50px) saturate(210%);
            border-radius: 48px; /* iOS Continuous Curve Style */
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 80px rgba(0,0,0,0.7), inset 0 0 0 0.5px rgba(255,255,255,0.15);
            text-align: center;
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h2 { font-weight: 700; font-size: 28px; letter-spacing: -1px; margin: 12px 0 6px 0; }
        .subtitle, #status { font-size: 15px; color: var(--text-sec); margin-bottom: 30px; display: block; }

        /* Advanced Input Group */
        .ios-list {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 22px;
            margin-bottom: 25px;
            border: 0.5px solid var(--glass-border);
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        select, input {
            width: 100%;
            padding: 18px 20px;
            background: transparent;
            border: none;
            color: white !important;
            font-size: 17px;
            outline: none;
            appearance: none;
        }

        .separator {
            height: 0.5px;
            background: var(--glass-border);
            margin-left: 20px;
        }

        input[type="password"] {
            text-align: center;
            font-size: 32px;
            letter-spacing: 16px;
            color: var(--ios-blue);
            font-weight: 600;
        }

        /* Prime Button with Glossy Finish */
        .btn-prime {
            position: relative;
            width: 100%;
            padding: 18px;
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 600;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 12px 24px rgba(0, 122, 255, 0.35);
        }

        .btn-prime::before {
            content: '';
            position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-prime:hover::before { left: 100%; }
        .btn-prime:active { transform: scale(0.96); opacity: 0.9; }
        .btn-prime:disabled { background: #2c2c2e; color: #636366; box-shadow: none; }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(0, 122, 255, 0.15);
            color: #4db3ff;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 12px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 28px;
            padding: 32px 20px;
            margin: 24px 0;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .name-txt { font-size: 36px; font-weight: 800; letter-spacing: -1.2px; margin-bottom: 8px; line-height: 1.1; }
        
        #time-stamp { font-size: 12px; color: var(--text-sec); margin-top: 20px; display: block; }

        .action-row { display: flex; gap: 14px; margin-top: 30px; }
        .btn-sub {
            flex: 1; padding: 18px; border-radius: 18px; text-decoration: none;
            font-weight: 600; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: transform 0.2s;
        }
        .btn-sub:active { transform: scale(0.95); }
        .white { background: #FFFFFF; color: #000000; }
        .green { background: #34C759; color: #FFFFFF; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="mesh"></div>

    <div id="entry-screen" class="container">
        <div style="font-size: 64px; filter: drop-shadow(0 0 20px var(--accent-glow));">🛡️</div>
        <h2 id="entry-title">Resident Portal</h2>
        <span id="status">Verifying Secure Link...</span>
        <div class="ios-list">
            <input type="password" id="pw" inputmode="numeric" placeholder="••••" maxlength="4">
        </div>
        <button id="entry-btn" class="btn-prime" onclick="handleEntry()" disabled>Verify Identity</button>
    </div>

    <div id="lookup-view" class="container hidden">
        <span class="badge" id="service-display">Loading...</span>
        <div class="name-txt" id="name-display">-</div>
        <div class="info-box">
            <div style="color: var(--text-sec); font-size: 11px; font-weight: 700; margin-bottom: 12px; letter-spacing: 1px;">ENCRYPTED LINE</div>
            <div id="phone-display" style="font-size: 24px; font-weight: 600; font-variant-numeric: tabular-nums;">-</div>
        </div>
        <div class="action-row">
            <a href="#" id="call-link" class="btn-sub white">📞 Call</a>
            <a href="#" id="wa-link" class="btn-sub green" style="display:none;">💬 WhatsApp</a>
        </div>
        <span id="time-stamp"></span>
    </div>

    <div id="register-view" class="container hidden">
        <span class="badge">Registry Update</span>
        <h2>Daily Duty</h2>
        <p class="subtitle">Assign the current resident on-call 🇮🇶</p>
        
        <div class="ios-list">
            <select id="spec-select" onchange="toggleNameSection()">
                <option value="">Choose Specialty</option>
                <option value="NS">Neuro</option>
                <option value="CT">Thoracic</option>
                <option value="GS">Surgery</option>
                <option value="US">Uro</option>
                <option value="ENT">ENT</option>
                <option value="H">Cardio</option>
                <option value="D">DeathCertificates</option>
                <option value="OP">OP Anesthesia</option>
                <option value="ICU">ICU Anesthesia</option>
                <option value="R">Radio</option>
                <option value="ON">Onco</option>
                <option value="PS">Plastic</option>
            </select>
            <div id="name-section" class="hidden">
                <div class="separator"></div>
                <select id="name-list"></select>
            </div>
        </div>

        <button id="submit-btn" class="btn-prime" onclick="submitRegistration()">Confirm Duty</button>
    </div>

<script>
    /* I HAVE LEFT YOUR SCRIPT EXACTLY AS PROVIDED */
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    window.onload = async function() {
        if (mode === 'register') {
            document.getElementById('entry-title').innerText = "Doctor Login";
            prepareRegister();
        } else if (service) {
            document.getElementById('entry-title').innerText = "System Access";
            prepareLookup();
        } else {
            document.getElementById('status').innerText = "⚠️ Link Incomplete";
        }
    };

    async function prepareRegister() {
        document.getElementById('status').innerText = "Fetching Master List...";
        try {
            const response = await fetch(`${scriptUrl}?action=getNames`);
            const data = await response.json(); 
            allResidents = data.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
            document.getElementById('status').innerText = "Ready ✅";
            document.getElementById('entry-btn').disabled = false;
        } catch (e) { 
            document.getElementById('status').innerText = "Offline Mode - Check Internet"; 
        }
    }

    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');
        if (!selectedSpec) {
            nameSection.classList.add('hidden');
            return;
        }
        let filtered;
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            filtered = allResidents.filter(res => res[1] === "A");
        } else if (selectedSpec === "D") {
            filtered = allResidents;
        } else {
            filtered = allResidents.filter(res => res[1] === selectedSpec);
        }
        if (filtered.length > 0) {
            dropdown.innerHTML = filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('');
            nameSection.classList.remove('hidden');
        } else {
            dropdown.innerHTML = "<option value=''>No residents found</option>";
            nameSection.classList.remove('hidden');
        }
    }

    async function prepareLookup() {
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                document.getElementById('status').innerText = "Connection Secured ✅";
                document.getElementById('entry-btn').disabled = false;
            } else {
                document.getElementById('status').innerText = "No data found for today";
            }
        } catch (e) { document.getElementById('status').innerText = "Offline Mode"; }
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            document.getElementById('entry-screen').style.display = 'none';
            if (mode === 'register') {
                document.getElementById('register-view').classList.remove('hidden');
            } else {
                showLookupUI();
            }
        } else { alert("Incorrect Password"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'flex';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
        document.getElementById('lookup-view').classList.remove('hidden');
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Saving...";
        btn.disabled = true;
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            alert("Duty Updated Successfully ✅");
        } catch (e) {
            alert("Error connecting to server");
        } finally {
            btn.innerText = "Confirm Duty";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
