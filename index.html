<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHEDULER 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c20;
            --light: #2a2d34;
            --shadow: #0d0e11;
            --accent: #fbbf24;
            --emerald: #10b981;
            --crimson: #e11d48;
            --zebra: rgba(255, 255, 255, 0.02);
            --weekend-bg: rgba(16, 185, 129, 0.12); 
            /* Ultra-Slim Sticky Widths 🇮🇶 */
            --day-w: 45px;
            --date-w: 60px;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; overflow-x: hidden; }
        table { border-collapse: separate; border-spacing: 0; min-width: 1550px; }
        .ac-container { position: relative; width: 100%; min-width: 180px; direction: rtl; }
        
        /* Column Headers */
        th { position: sticky; top: 0; background: var(--bg); z-index: 20; padding: 0.75rem 0.25rem; font-weight: 800; font-size: 0.65rem; border-bottom: 1px solid var(--light); text-transform: uppercase; }
        tr:nth-child(even) { background-color: var(--zebra); }

        /* --- STICKY FIX (Zero Gap) 🇮🇶 --- */
        .day-col {
            position: sticky !important; right: 0 !important;
            width: var(--day-w) !important; min-width: var(--day-w) !important;
            background-color: var(--bg) !important; z-index: 30 !important;
            text-align: center; color: var(--accent); font-weight: 800; font-size: 0.7rem;
            border-left: 1px solid rgba(255,255,255,0.1); /* Divider between data and sticky */
        }
        .date-col {
            position: sticky !important; 
            right: var(--day-w) !important; /* Perfectly flush against day-col */
            width: var(--date-w) !important; min-width: var(--date-w) !important;
            background-color: var(--bg) !important; z-index: 30 !important;
            color: #64748b; font-family: 'JetBrains Mono', monospace; text-align: center;
            font-size: 0.75rem;
            border-left: none; /* Removed the gap border */
        }

        /* Mobile Date Format (MM/DD) */
        @media (max-width: 768px) {
            .date-display { display: flex; flex-direction: row-reverse; justify-content: center; gap: 0px; font-size: 0.65rem; }
            .year-text { display: none; }
            .day-col { font-size: 0.6rem !important; letter-spacing: -0.05em; }
        }

        thead th.day-col, thead th.date-col { z-index: 40 !important; top: 0; }
        tr.weekend-row { background-color: var(--weekend-bg) !important; }
        tr.weekend-row td.day-col, tr.weekend-row td.date-col { background-color: #1a2e28 !important; }

        /* Inputs */
        .cell-input { width: 100%; padding: 0.6rem; font-size: 0.8rem; font-family: 'IBM Plex Sans Arabic', sans-serif; text-align: right; background: transparent; color: #fff; border-radius: 0.6rem; outline: none; border: 1px solid transparent; }
        .cell-input:focus { background: rgba(255, 255, 255, 0.03); border-color: #fbbf24; }
        .ghost-text { position: absolute; top: 0; right: 0; left: 0; bottom: 0; color: rgba(255, 255, 255, 0.25); pointer-events: none; white-space: pre; overflow: hidden; direction: rtl; padding: 0.6rem; font-size: 0.8rem; }
        .ghost-offset { color: transparent; }
        .prefilled { color: #94a3b8 !important; opacity: 0.7; }
        .new-entry { color: #e11d48 !important; text-shadow: 0 0 8px rgba(225, 29, 72, 0.5); }
        
        .embossed-card { background: var(--bg); border-radius: 1.5rem; box-shadow: 15px 15px 40px var(--shadow); }
        .recessed-table-container { background: var(--bg); border-radius: 1rem; box-shadow: inset 5px 5px 15px var(--shadow); overflow-x: auto; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="app-wrapper" class="max-w-full mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-xl font-black text-white tracking-tighter">SCHEDULER 🇮🇶</h1>
            <div class="recessed-table-container px-2 flex items-center bg-black/20">
                <input type="month" id="month-picker" class="bg-transparent text-amber-500 font-bold outline-none p-2 cursor-pointer text-sm" onchange="generateTable()">
            </div>
        </div>

        <div id="main-table-area" class="embossed-card p-4">
            <div class="recessed-table-container max-h-[75vh]">
                <table id="schedule-table">
                    <thead><tr id="table-headers"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <div class="mt-6 flex justify-end">
                <button id="save-btn" onclick="saveAll()" class="bg-[#2a2d34] px-10 py-4 rounded-xl text-amber-500 font-black text-xs tracking-widest border border-white/5">
                    UPDATE DATABASE
                </button>
            </div>
        </div>
    </div>

<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";
    const specialties = [
        { id: "NS", name: "Neuro" }, { id: "CT", name: "Cardio" },
        { id: "GS", name: "General" }, { id: "US", name: "Uro" },
        { id: "ENT", name: "ENT" }, { id: "H", name: "Heart" },
        { id: "D", name: "Death" }, { id: "OP", name: "OT-A" },
        { id: "ICU", name: "ICU-A" }
    ];

    let nameData = {}; 

    window.onload = () => {
        const now = new Date();
        const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        document.getElementById('month-picker').value = `${nextMonth.getFullYear()}-${String(nextMonth.getMonth() + 1).padStart(2, '0')}`;
        initDataSync();
    };

    async function initDataSync() {
        try {
            const respNames = await fetch(`${scriptUrl}?action=getNames`);
            const allResidents = await respNames.json();
            specialties.forEach(spec => {
                nameData[spec.id] = allResidents.filter(r => r[1] === spec.id || spec.id === "D").map(r => r[0]);
            });
            generateTable(); 
        } catch (e) {}
    }

    function generateTable() {
        const picker = document.getElementById('month-picker').value;
        const [year, month] = picker.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        
        let hHtml = specialties.map(s => `<th>${s.name}</th>`).join('') + `<th class="date-col">Date</th><th class="day-col">Day</th>`;
        document.getElementById('table-headers').innerHTML = hHtml;

        const body = document.getElementById('table-body');
        body.innerHTML = "";
        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(year, month-1, d);
            const dd = String(d).padStart(2, '0');
            const mm = String(month).padStart(2, '0');
            const dayShort = new Intl.DateTimeFormat('ar-IQ', { weekday: 'short' }).format(dateObj);
            
            const tr = document.createElement('tr');
            if (dateObj.getDay() === 5 || dateObj.getDay() === 6) tr.classList.add('weekend-row');
            
            let rHtml = specialties.map(s => `
                <td><div class="ac-container">
                    <div class="ghost-text" id="ghost-${d}-${s.id}"></div>
                    <input type="text" class="cell-input" id="input-${d}-${s.id}" 
                        oninput="handleAC(this, '${s.id}', '${d}-${s.id}')" 
                        onkeydown="handleKeys(event, this, ${d}, '${s.id}')" 
                        onblur="handleBlur('${d}-${s.id}')" data-date="${dd}/${mm}/${year}" data-spec="${s.id}">
                </div></td>`).join('');
            
            rHtml += `<td class="date-col"><div class="date-display"><span>${dd}</span><span>/</span><span class="text-amber-500/50">${mm}</span><span class="year-text">/${year}</span></div></td><td class="day-col">${dayShort}</td>`;
            tr.innerHTML = rHtml;
            body.appendChild(tr);
        }
        fetchExistingSchedule();
    }

    // THE FIXED NAVIGATION LOGIC 🇮🇶
    function handleKeys(e, el, currentDay, specId) {
        const ghost = document.getElementById(`ghost-${currentDay}-${specId}`);
        const fullMatch = ghost.getAttribute('data-full-match');

        if (e.key === "Enter") {
            e.preventDefault();
            if (fullMatch) el.value = fullMatch;
            
            // STRICTLY MOVE DOWN TO NEXT DAY
            const nextDay = currentDay + 1;
            const nextEl = document.getElementById(`input-${nextDay}-${specId}`);
            
            if (nextEl) {
                nextEl.focus();
            } else {
                el.blur(); // End of month, hide keyboard
            }
        }
        
        if (e.key === "Tab" && fullMatch) {
            e.preventDefault();
            el.value = fullMatch;
        }
    }

    async function fetchExistingSchedule() {
        const monthVal = document.getElementById('month-picker').value;
        try {
            const resp = await fetch(`${scriptUrl}?action=getSchedule&month=${monthVal}`);
            const schedule = await resp.json();
            schedule.forEach(row => {
                const day = parseInt(row.date.split('/')[0]);
                const inputEl = document.getElementById(`input-${day}-${row.specCode}`);
                if (inputEl && row.name) { inputEl.value = row.name; inputEl.classList.add('prefilled'); }
            });
        } catch(e){}
    }

    function handleAC(el, specId, uniqueId) {
        const ghost = document.getElementById(`ghost-${uniqueId}`);
        const val = el.value.trim().toLowerCase();
        ghost.innerText = ""; ghost.removeAttribute('data-full-match');
        if (!val) return;
        if (nameData[specId]) {
            const match = nameData[specId].find(n => n.toLowerCase().includes(val));
            if (match) {
                ghost.setAttribute('data-full-match', match);
                ghost.innerHTML = `<span class="ghost-offset">${el.value}</span>${match.substring(el.value.length)}`;
            }
        }
    }

    function handleBlur(uniqueId) {
        setTimeout(() => { document.getElementById(`ghost-${uniqueId}`).innerText = ""; }, 200);
    }

    async function saveAll() {
        const btn = document.getElementById('save-btn');
        btn.innerText = "UPLOADING..."; btn.disabled = true;
        const activeInputs = Array.from(document.querySelectorAll('.cell-input')).filter(i => i.value.trim() !== "");
        const bulkData = activeInputs.map(el => ({ date: el.dataset.date, specialty: el.dataset.spec, name: el.value.trim() }));
        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ payload: bulkData }) });
            btn.innerText = "SYNCED ✅";
        } catch (e) { btn.innerText = "ERROR ⚠️"; }
        setTimeout(() => { btn.innerText = "UPDATE DATABASE"; btn.disabled = false; }, 2000);
    }
</script>
</body>
</html>
