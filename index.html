<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On-Call | Horizon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --vector: #0084ff; --active: #00ffaa; --bg: #050609; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: white; margin: 0; overflow: hidden; }

        /* ANIMATED VECTOR BACKGROUND */
        .vector-mesh {
            position: fixed; inset: 0;
            background-image: 
                linear-gradient(var(--vector) 1px, transparent 1px),
                linear-gradient(90deg, var(--vector) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05;
            animation: vectorShift 20s infinite linear;
            z-index: -1;
        }

        @keyframes vectorShift {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-50px) scale(1.1); }
        }

        /* ASYMMETRICAL GEOMETRY FRAME */
        .vector-card {
            width: 90%; max-width: 380px;
            background: rgba(10, 12, 18, 0.8);
            border: 1px solid rgba(0, 132, 255, 0.2);
            backdrop-filter: blur(20px);
            /* Creating an asymmetrical hexagonal shape */
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            padding: 50px 30px;
            transition: all 0.6s cubic-bezier(0.8, 0, 0.2, 1);
            position: relative;
        }

        /* Success Pulse Light */
        .horizon-pulse {
            position: absolute; top: -2px; left: 10%; width: 80%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--active), transparent);
            animation: lightPulse 2s infinite; display: none;
        }

        @keyframes lightPulse {
            0% { transform: translateX(-100%) scaleX(0); opacity: 0; }
            50% { transform: translateX(0%) scaleX(1); opacity: 1; }
            100% { transform: translateX(100%) scaleX(0); opacity: 0; }
        }

        /* VECTOR INPUT */
        input {
            width: 100%; padding: 18px; margin-bottom: 25px;
            background: #12151f; border: none;
            border-bottom: 2px solid #2a3142;
            color: var(--active) !important; text-align: center;
            font-size: 1.8rem; letter-spacing: 12px; font-weight: 900;
            outline: none; transition: 0.3s;
        }
        input:focus { border-bottom-color: var(--vector); background: #1a1e29; }
        input[type="password"] { color: white !important; font-weight: 400; font-size: 2.2rem; }

        /* THE SPLIT-LOAD BUTTON */
        .split-btn {
            width: 100%; padding: 22px;
            background: transparent;
            border: 2px solid var(--vector);
            color: var(--vector);
            font-weight: bold; letter-spacing: 3px; font-size: 0.9rem;
            cursor: pointer; position: relative;
            overflow: hidden; transition: 0.3s;
        }

        /* Splitting Animation Elements */
        .split-btn::before, .split-btn::after {
            content: ''; position: absolute; inset: 0;
            background: var(--active);
            transition: transform 0.4s ease;
            z-index: 1;
        }

        .split-btn::before { transform: translateX(-101%); }
        .split-btn::after { transform: translateX(101%); }

        .loading .split-btn::before, .loading .split-btn::after {
            transform: translateX(0%);
        }

        .split-btn span { position: relative; z-index: 2; transition: 0.3s; }
        
        .loading .split-btn span { color: black; }
        .success .split-btn span { color: black; font-weight: 900; }

        .success .split-btn {
            border-color: var(--active);
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.3);
        }

        /* LOOKUP VIEW (Vector Style) */
        .data-block {
            background: #11141c;
            border-top: 1px solid var(--vector);
            padding: 25px 20px; margin: 25px 0;
            clip-path: polygon(0% 0%, 100% 0%, 95% 100%, 5% 100%);
        }

        .h-btn {
            flex: 1; padding: 18px; text-decoration: none; text-align: center;
            font-weight: 700; font-size: 0.75rem; color: white;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .h-btn:hover { background: rgba(0, 132, 255, 0.1); border-color: var(--vector); color: var(--vector); }
        .wa-btn { border-color: #25D366; color: #25D366; }
        .wa-btn:hover { background: rgba(37, 211, 102, 0.1); color: #25D366; }

        .hidden { display: none !important; }
        .shatter { transform: scale(1.1) skewX(5deg); opacity: 0; filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <div class="vector-mesh"></div>

    <div id="main-card" class="vector-card">
        <div id="status-pulse" class="horizon-pulse"></div>

        <div id="login-view">
            <div class="text-center mb-10">
                <h1 id="title-text" class="text-white text-xl font-medium tracking-[0.2em] uppercase">ACCESS_HUB</h1>
                <p id="status-text" class="text-cyan-500/60 text-[0.6rem] font-medium mt-2 uppercase tracking-[0.3em]">SYNCHRONIZING...</p>
            </div>
            
            <div class="space-y-8">
                <input type="password" id="pw" inputmode="numeric" placeholder="PIN" maxlength="4">
                
                <div id="entry-wrap" class="relative">
                    <button id="entry-btn" class="split-btn" onclick="handleEntry()">
                        <span>AUTHORIZE</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="register-view" class="hidden space-y-4">
            <h2 class="text-white text-lg font-medium text-center mb-6 tracking-widest">DUTY LOG 🇮🇶</h2>
            <select id="spec-select" onchange="toggleNameSection()" class="w-full bg-[#12151f] border-b-2 border-[#2a3142] p-4 text-white outline-none focus:border-vector transition-all">
                <option value="">-- SECTOR --</option>
                <option value="NS">Neuro</option><option value="CT">Thoracic</option>
                <option value="GS">Surgery</option><option value="US">Uro</option>
                <option value="ENT">ENT</option><option value="H">Cardio</option>
                <option value="D">DeathCert</option><option value="OP">Anes (OP)</option>
                <option value="ICU">Anes (ICU)</option><option value="R">Radio</option>
                <option value="ON">Onco</option><option value="PS">Plastic</option>
            </select>
            <div id="name-section" class="hidden space-y-4">
                <select id="name-list" class="w-full bg-[#12151f] border-b-2 border-[#2a3142] p-4 text-white outline-none"></select>
                <div id="reg-wrap" class="relative">
                    <button id="submit-btn" class="split-btn" onclick="submitRegistration()">
                        <span>COMMIT LOG</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="lookup-view" class="hidden text-center view-reveal">
            <span id="service-display" class="text-vector text-[0.6rem] font-bold tracking-[0.4em] uppercase">---</span>
            <div class="data-block">
                <h2 id="name-display" class="text-white text-3xl font-bold mt-2">...</h2>
                <p id="phone-display" class="text-white/50 text-xl font-medium mt-1 font-mono">--</p>
            </div>
            
            <div class="flex gap-2 mt-8">
                <a href="#" id="call-link" class="h-btn">VOICE CALL</a>
                <a href="#" id="wa-link" class="hidden h-btn wa-btn">WHATSAPP</a>
            </div>
            <p id="time-stamp" class="text-[0.55rem] text-vector/30 mt-10 font-mono tracking-widest"></p>
        </div>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    window.onload = async function() {
        const statusText = document.getElementById('status-text');
        const statusPulse = document.getElementById('status-pulse');
        try {
            if (mode === 'register') {
                document.getElementById('title-text').innerText = "MD LOGIN";
                const res = await fetch(`${scriptUrl}?action=getNames`);
                allResidents = (await res.json()).sort((a,b) => a[0].localeCompare(b[0], 'ar'));
            } else if (service) {
                const res = await fetch(`${scriptUrl}?service=${service}&ward=${service}&json=true&t=${Date.now()}`);
                serverData = await res.json();
            }
            // LOADING COMPLETE
            statusText.innerText = "终端 Ready 🇮🇶";
            statusText.style.color = "var(--active)";
            statusPulse.style.display = "block"; // Show Success Pulse
        } catch (e) {
            statusText.innerText = "Sync Failed";
        }
    };

    function toggleNameSection() {
        const val = document.getElementById('spec-select').value;
        const list = document.getElementById('name-list');
        if (!val) { document.getElementById('name-section').classList.add('hidden'); return; }
        
        let filtered = (val === "OP" || val === "ICU") ? allResidents.filter(r => r[1] === "A") : (val === "D" ? allResidents : allResidents.filter(r => r[1] === val));
        
        list.innerHTML = filtered.map(r => `<option class="bg-[#11141c]" value="${r[0]}">${r[0]}</option>`).join('');
        document.getElementById('name-section').classList.remove('hidden');
    }

    function handleEntry() {
        const pin = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        const wrap = document.getElementById('entry-wrap');
        const btnText = document.querySelector('#entry-btn span');
        const card = document.getElementById('main-card');

        if (pin === correct) {
            // STEP 1: LOADING (Activate Split Slabs)
            wrap.classList.add('loading');
            btnText.innerText = "AUTHENTICATING...";
            
            setTimeout(() => {
                // STEP 2: COMPLETE ANIMATION (Color Shift)
                wrap.classList.remove('loading');
                wrap.classList.add('success');
                btnText.innerText = "GRANTED";

                setTimeout(() => {
                    // STEP 3: Shatter Transition
                    card.classList.add('shatter');
                    setTimeout(() => {
                        document.getElementById('login-view').classList.add('hidden');
                        card.classList.remove('shatter');
                        const next = mode === 'register' ? document.getElementById('register-view') : document.getElementById('lookup-view');
                        if (mode !== 'register') showLookupUI();
                        next.classList.remove('hidden');
                    }, 600);
                }, 800);
            }, 1200);
        } else { alert("ACCESS DENIED"); }
    }

    function showLookupUI() {
        if (!serverData) return;
        document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
        document.getElementById('name-display').innerText = serverData.resident.name;
        document.getElementById('phone-display').innerText = serverData.resident.phone;
        document.getElementById('time-stamp').innerText = "REF_STAMP: " + serverData.timestamp;
        document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
        if (serverData.whatsappDigits) {
            const wa = document.getElementById('wa-link');
            wa.classList.remove('hidden');
            wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
        }
    }

    async function submitRegistration() {
        const wrap = document.getElementById('reg-wrap');
        const btnText = document.querySelector('#reg-wrap span');
        wrap.classList.add('loading');
        btnText.innerText = "WRITING...";
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            wrap.classList.remove('loading');
            wrap.classList.add('success');
            btnText.innerText = "SUCCESS ✅";
        } catch (e) { alert("ERROR"); btnText.innerText = "RETRY"; wrap.classList.remove('loading'); }
    }
</script>
</body>
</html>
