<script>
    const GITHUB_REPO = "mHub96/s";
    const FILE_PATH = "data.json";
    const JSON_URL = `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${FILE_PATH}`;
    
    let db = null;
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode');
    const serviceParam = params.get('service');

    window.onload = async () => {
        try {
            const res = await fetch(`${JSON_URL}?t=${Date.now()}`);
            db = await res.json();
            
            // Populate Dropdown: All unique specs except "Reserve"
            const specs = [...new Set(db.names.map(n => n.spec))].filter(s => s !== "Reserve");
            const select = document.getElementById('spec-select');
            select.innerHTML = '<option value="">اختر القسم</option>' + 
                specs.map(s => `<option value="${s}">${s} 🇮🇶</option>`).join('');

            document.getElementById('status-text').innerText = "DATABASE SECURE 🇮🇶";
            document.getElementById('entry-btn').classList.add('fetched-active');
            document.getElementById('shield').style.opacity = '0';
        } catch (e) {
            document.getElementById('status-text').innerText = "FETCH FAILED";
        }
    };

    async function pushToGitHub() {
        // Check if token is already "injected" in this browser's memory
        let token = localStorage.getItem('gh_duty_token');
        
        if (!token) {
            token = prompt("Enter GitHub Token (Stored locally on this device only):");
            if (!token) return;
            localStorage.setItem('gh_duty_token', token);
        }

        const btn = document.getElementById('push-btn');
        btn.innerText = "UPLOADING...";
        btn.disabled = true;

        try {
            const fileRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            
            if (fileRes.status === 401) {
                localStorage.removeItem('gh_duty_token');
                throw new Error("Token expired or invalid. Please refresh and try again.");
            }

            const fileData = await fileRes.json();
            const currentDb = JSON.parse(atob(fileData.content));

            // Date Logic (It's 8:13 AM in Basra, so this will use 01/04/2026)
            const now = new Date();
            if (now.getHours() < 8) now.setDate(now.getDate() - 1);
            const todayStr = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
            
            const newEntry = {
                date: todayStr,
                specCode: document.getElementById('spec-select').value,
                name: document.getElementById('name-list').value
            };

            const idx = currentDb.schedule.findIndex(s => s.date === todayStr && s.specCode === newEntry.specCode);
            if (idx !== -1) currentDb.schedule[idx] = newEntry;
            else currentDb.schedule.push(newEntry);

            const pushRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Duty Update 🇮🇶: ${newEntry.specCode}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(currentDb, null, 2)))),
                    sha: fileData.sha
                })
            });

            if (pushRes.ok) {
                alert("Successfully Updated GitHub! 🇮🇶");
                location.reload();
            } else {
                throw new Error("Push failed. Check repo permissions.");
            }
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.innerText = "PUSH TO GITHUB";
            btn.disabled = false;
        }
    }

    function openWhatsApp(phone) {
        if (!phone) return;
        let clean = phone.replace(/\D/g, ''); 
        if (clean.startsWith('07')) clean = '964' + clean.substring(1);
        window.open(`https://api.whatsapp.com/send?phone=${clean}`, '_blank');
    }
</script>
