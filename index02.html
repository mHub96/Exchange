<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On-Call Pro</title>
    <style>
        :root {
            --aurora-1: #4facfe;
            --aurora-2: #00f2fe;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent: #ffd700;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Outfit', 'Segoe UI', sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background: #0f172a;
            color: var(--text-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated Aurora Background */
        body::before {
            content: '';
            position: absolute; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, #4338ca 0%, #0f172a 50%);
            z-index: -2;
        }

        .aurora-blob {
            position: fixed; width: 500px; height: 500px;
            background: linear-gradient(var(--aurora-1), var(--aurora-2));
            filter: blur(80px); opacity: 0.3; border-radius: 50%; z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        .container {
            width: 90%; max-width: 400px;
            padding: 40px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 { font-weight: 700; font-size: 1.8rem; margin-bottom: 5px; }
        #status { font-size: 0.8rem; opacity: 0.7; margin-bottom: 30px; letter-spacing: 1px; }

        /* VIBRANT INPUTS */
        select, input {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: white !important;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        select option { background: #1e293b; color: white; }

        input[type="password"] {
            text-align: center; font-size: 2.2rem; letter-spacing: 12px; font-weight: bold;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: #0f172a;
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 800;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
        }

        button:active { transform: scale(0.96); opacity: 0.9; }
        button:disabled { background: #334155; color: #64748b; box-shadow: none; cursor: not-allowed; }

        /* LOOKUP SPECIFIC UI */
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 25px;
            margin: 25px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .name-label { font-size: 2rem; font-weight: 800; color: white; margin: 10px 0; }
        .service-badge {
            background: var(--accent);
            color: #0f172a;
            padding: 4px 15px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 900;
            display: inline-block;
            text-transform: uppercase;
        }

        .btn-row { display: flex; gap: 12px; margin-top: 25px; }
        .action-btn {
            flex: 1; padding: 16px; border-radius: 18px;
            text-decoration: none; font-weight: 700; font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.3s;
        }
        .call { background: white; color: #0f172a; }
        .wa { background: #25D366; color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="aurora-blob"></div>

    <div id="entry-screen" class="container">
        <div style="font-size: 3rem; margin-bottom: 10px;">✨</div>
        <h2 id="entry-title">Resident Portal</h2>
        <p id="status">Secure Link Verified</p>
        <input type="password" id="pw" inputmode="numeric" placeholder="••••" maxlength="4">
        <button id="entry-btn" onclick="handleEntry()" disabled>Continue</button>
    </div>

    <div id="lookup-view" class="container hidden">
        <div id="service-display" class="service-badge">SERVICE</div>
        <div id="name-display" class="name-label">Loading...</div>
        <div class="info-card">
            <div style="opacity: 0.6; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 5px;">DIRECT CONTACT</div>
            <div id="phone-display" style="font-size: 1.5rem; font-weight: 700;">-</div>
        </div>
        <div class="btn-row">
            <a href="#" id="call-link" class="action-btn call"><span>📞</span> Call</a>
            <a href="#" id="wa-link" class="action-btn wa" style="display:none;"><span>💬</span> WhatsApp</a>
        </div>
        <p id="time-stamp" style="font-size: 0.65rem; opacity: 0.5; margin-top: 25px;"></p>
    </div>

    <div id="register-view" class="container hidden">
        <div class="service-badge">REGISTRY 🇮🇶</div>
        <h2>Daily Duty</h2>
        <p style="opacity: 0.7; margin-bottom: 20px;">Update today's on-call resident</p>
        
        <select id="spec-select" onchange="toggleNameSection()">
            <option value="">Choose Specialty</option>
            <option value="NS">Neuro</option>
            <option value="CT">Thoracic</option>
            <option value="GS">Surgery</option>
            <option value="US">Uro</option>
            <option value="ENT">ENT</option>
            <option value="H">Cardio</option>
            <option value="D">DeathCertificates</option>
            <option value="OP">OP Anesthesia</option>
            <option value="ICU">ICU Anesthesia</option>
            <option value="R">Radio</option>
            <option value="ON">Onco</option>
            <option value="PS">Plastic</option>
        </select>

        <div id="name-section" class="hidden">
            <select id="name-list"></select>
            <button id="submit-btn" onclick="submitRegistration()">Confirm Duty</button>
        </div>
    </div>

<script>
    /* SCRIPTS REVERTED TO ORIGINAL STATE
    NO CHANGES MADE TO LOGIC, FETCHING, OR FILTERING
    */
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    window.onload = async function() {
        if (mode === 'register') {
            document.getElementById('entry-title').innerText = "Doctor Login";
            prepareRegister();
        } else if (service) {
            document.getElementById('entry-title').innerText = "System Access";
            prepareLookup();
        } else {
            document.getElementById('status').innerText = "⚠️ Link Incomplete";
        }
    };

    async function prepareRegister() {
        document.getElementById('status').innerText = "Fetching Master List...";
        try {
            const response = await fetch(`${scriptUrl}?action=getNames`);
            const data = await response.json(); 
            allResidents = data.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
            document.getElementById('status').innerText = "Ready ✅";
            document.getElementById('entry-btn').disabled = false;
        } catch (e) { 
            document.getElementById('status').innerText = "Offline Mode - Check Internet"; 
        }
    }

    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');

        if (!selectedSpec) {
            nameSection.classList.add('hidden');
            return;
        }

        let filtered;
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            filtered = allResidents.filter(res => res[1] === "A");
        } else if (selectedSpec === "D") {
            filtered = allResidents;
        } else {
            filtered = allResidents.filter(res => res[1] === selectedSpec);
        }

        if (filtered.length > 0) {
            dropdown.innerHTML = filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('');
            nameSection.classList.remove('hidden');
        } else {
            dropdown.innerHTML = "<option value=''>No residents found</option>";
            nameSection.classList.remove('hidden');
        }
    }

    async function prepareLookup() {
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                document.getElementById('status').innerText = "Connection Secured ✅";
                document.getElementById('entry-btn').disabled = false;
            } else {
                document.getElementById('status').innerText = "No data found for today";
            }
        } catch (e) { document.getElementById('status').innerText = "Offline Mode"; }
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            document.getElementById('entry-screen').style.display = 'none';
            if (mode === 'register') {
                document.getElementById('register-view').classList.remove('hidden');
            } else {
                showLookupUI();
            }
        } else { alert("Incorrect Password"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'flex';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
        document.getElementById('lookup-view').classList.remove('hidden');
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Saving...";
        btn.disabled = true;
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            alert("Duty Updated Successfully ✅");
        } catch (e) {
            alert("Error connecting to server");
        } finally {
            btn.innerText = "Confirm Duty";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
