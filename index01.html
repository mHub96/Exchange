<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On-Call Pro | Terminal</title>
    <style>
        :root {
            --primary: #00f2ff; /* Cyber Cyan */
            --primary-glow: rgba(0, 242, 255, 0.3);
            --bg-deep: #05070a;
            --surface: #0f172a;
            --surface-accent: #1e293b;
            --text-bright: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-deep);
            color: var(--text-bright);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, var(--primary-glow) 0%, transparent 70%);
            z-index: -1;
            opacity: 0.4;
        }

        .container {
            width: 90%; max-width: 420px;
            padding: 40px 30px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.05);
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 92%, 92% 100%, 0 100%);
            animation: containerEntry 0.5s ease-out;
        }

        @keyframes containerEntry {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 60px; height: 4px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        h2 { 
            font-weight: 800; font-size: 1.4rem; 
            letter-spacing: 2px; margin: 0 0 5px 0; 
            text-transform: uppercase;
            color: var(--primary);
        }

        .status-line { 
            font-size: 0.7rem; color: var(--text-dim); 
            margin-bottom: 35px; letter-spacing: 2px;
            text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .pulse-dot {
            width: 6px; height: 6px; background: var(--success);
            border-radius: 50%; box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; }
        }

        /* TACTILE FORM ELEMENTS */
        .form-group { margin-bottom: 20px; text-align: left; }
        
        label { 
            font-size: 0.65rem; font-weight: 700; color: var(--primary); 
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block;
        }

        select, input {
            width: 100%;
            padding: 16px;
            background: var(--surface-accent);
            border: 1px solid var(--border);
            border-left: 3px solid var(--primary);
            color: white !important;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        select:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
            background: #232f42;
        }

        input[type="password"] {
            text-align: center; font-size: 1.8rem; letter-spacing: 18px; font-weight: 900;
        }

        /* REGISTRY SPECIFIC STYLING */
        .registry-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 4px;
        }

        /* BUTTONS */
        .btn-main {
            width: 100%;
            padding: 18px;
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-main:hover:not(:disabled) {
            background: var(--primary);
            color: var(--bg-deep);
            box-shadow: 0 0 25px var(--primary-glow);
        }

        .btn-main:disabled { border-color: #334155; color: #334155; cursor: not-allowed; }

        /* LOOKUP RESULT UI */
        .data-panel {
            border: 1px dashed var(--border);
            padding: 30px 20px;
            margin: 20px 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
        }

        .name-display { 
            font-size: 2rem; font-weight: 200; color: white; margin: 10px 0;
            letter-spacing: -1px;
        }

        .service-tag {
            background: var(--primary-glow);
            color: var(--primary);
            padding: 4px 12px;
            border: 1px solid var(--primary);
            font-size: 0.7rem;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 15px;
        }

        .contact-row { display: flex; gap: 10px; margin-top: 25px; }
        .action-link {
            flex: 1; padding: 15px; text-decoration: none;
            font-weight: 800; font-size: 0.75rem; border: 1px solid white; color: white;
            text-align: center; letter-spacing: 1px;
        }
        .wa-link { border-color: var(--success); color: var(--success); }
        .wa-link:hover { background: var(--success); color: white; }

        .hidden { display: none !important; }
        select option { background: #0f172a; color: white; }
    </style>
</head>
<body>

    <div id="entry-screen" class="container">
        <div style="font-size: 2rem; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--primary));">🔑</div>
        <h2 id="entry-title">SYSTEM ACCESS</h2>
        <div class="status-line">
            <div class="pulse-dot"></div>
            <span id="status">ENCRYPTED LINK VERIFIED</span>
        </div>
        <div class="form-group">
            <input type="password" id="pw" inputmode="numeric" placeholder="••••" maxlength="4">
        </div>
        <button id="entry-btn" class="btn-main" onclick="handleEntry()" disabled>AUTHORIZE</button>
    </div>

    <div id="lookup-view" class="container hidden">
        <div id="service-display" class="service-tag">SERVICE</div>
        <div id="name-display" class="name-display">LOADING...</div>
        <div class="data-panel">
            <div style="color: var(--text-dim); font-size: 0.6rem; letter-spacing: 2px; margin-bottom: 5px;">DIRECT_COMMS_LINE</div>
            <div id="phone-display" style="font-size: 1.6rem; font-weight: 600; color: var(--primary);">-</div>
        </div>
        <div class="contact-row">
            <a href="#" id="call-link" class="action-link">VOICE CALL</a>
            <a href="#" id="wa-link" class="action-link wa-link" style="display:none;">WHATSAPP</a>
        </div>
        <p id="time-stamp" style="font-size: 0.6rem; color: var(--text-dim); margin-top: 30px; letter-spacing: 1px;"></p>
    </div>

    <div id="register-view" class="container hidden">
        <div class="service-tag">DATA OVERRIDE 🇮🇶</div>
        <h2>REGISTRY LOG</h2>
        <p style="color: var(--text-dim); font-size: 0.75rem; margin-bottom: 25px; letter-spacing: 1px;">Input Daily Resident Assignment</p>
        
        <div class="registry-card">
            <div class="form-group">
                <label>Department Specialty</label>
                <select id="spec-select" onchange="toggleNameSection()">
                    <option value="">-- SELECT SECTOR --</option>
                    <option value="NS">NEUROSURGERY</option>
                    <option value="CT">CARDIOTHORACIC</option>
                    <option value="GS">GEN SURGERY</option>
                    <option value="US">UROLOGY</option>
                    <option value="ENT">E.N.T</option>
                    <option value="H">CARDIOLOGY</option>
                    <option value="D">DEATH CERTIFICATES</option>
                    <option value="OP">OP ANESTHESIA</option>
                    <option value="ICU">ICU ANESTHESIA</option>
                    <option value="R">RADIOLOGY</option>
                    <option value="ON">ONCOLOGY</option>
                    <option value="PS">PLASTIC SURGERY</option>
                </select>
            </div>

            <div id="name-section" class="hidden">
                <div class="form-group">
                    <label>Assigned Resident</label>
                    <select id="name-list"></select>
                </div>
                <button id="submit-btn" class="btn-main" onclick="submitRegistration()">COMMIT TO DATABASE</button>
            </div>
        </div>
    </div>

<script>
    /* CORE LOGIC REMAINS 100% THE SAME AS YOUR WORKING VERSION
       (Including sorting, filtering for Anesthesia 'A', and Death Certs)
    */
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    // Visual helper for passcode button
    document.getElementById('pw').addEventListener('input', function() {
        document.getElementById('entry-btn').disabled = this.value.length !== 4;
    });

    window.onload = async function() {
        if (mode === 'register') {
            document.getElementById('entry-title').innerText = "PHYSICIAN LOGIN";
            prepareRegister();
        } else if (service) {
            document.getElementById('entry-title').innerText = "TERMINAL ACCESS";
            prepareLookup();
        } else {
            document.getElementById('status').innerText = "⚠️ LINK_CORRUPTED";
        }
    };

    async function prepareRegister() {
        document.getElementById('status').innerText = "SYNCING_RESIDENT_BASE...";
        try {
            const response = await fetch(`${scriptUrl}?action=getNames`);
            const data = await response.json(); 
            allResidents = data.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
            document.getElementById('status').innerText = "DATABASE_SYNCED_🇮🇶";
            document.getElementById('entry-btn').disabled = false;
        } catch (e) { 
            document.getElementById('status').innerText = "CONNECTION_FAILURE"; 
        }
    }

    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');
        if (!selectedSpec) {
            nameSection.classList.add('hidden');
            return;
        }
        let filtered;
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            filtered = allResidents.filter(res => res[1] === "A");
        } else if (selectedSpec === "D") {
            filtered = allResidents;
        } else {
            filtered = allResidents.filter(res => res[1] === selectedSpec);
        }
        if (filtered.length > 0) {
            dropdown.innerHTML = filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('');
            nameSection.classList.remove('hidden');
        } else {
            dropdown.innerHTML = "<option value=''>NO_MATCH_FOUND</option>";
            nameSection.classList.remove('hidden');
        }
    }

    async function prepareLookup() {
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                document.getElementById('status').innerText = "LINK_ACTIVE_✅";
                document.getElementById('entry-btn').disabled = false;
            } else {
                document.getElementById('status').innerText = "DATA_ENTRY_MISSING";
            }
        } catch (e) { document.getElementById('status').innerText = "NETWORK_OFFLINE"; }
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            document.getElementById('entry-screen').style.display = 'none';
            if (mode === 'register') {
                document.getElementById('register-view').classList.remove('hidden');
            } else {
                showLookupUI();
            }
        } else { alert("ACCESS DENIED: PIN REJECTED"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = "TIMESTAMP: " + serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'flex';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
        document.getElementById('lookup-view').classList.remove('hidden');
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "UPLOADING...";
        btn.disabled = true;
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            alert("DATABASE UPDATED SUCCESSFULLY");
        } catch (e) {
            alert("ERROR: UPLOAD INTERRUPTED");
        } finally {
            btn.innerText = "COMMIT TO DATABASE";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
