<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On-Call Pro | Vector Warp</title>
    <style>
        :root {
            --primary: #FF3D00; /* High-octane Red/Orange */
            --bg: #050505;
            --panel: #111111;
            --accent: #00E5FF;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Floating Background Elements */
        .bg-bit {
            position: absolute; width: 2px; height: 100px;
            background: linear-gradient(transparent, var(--primary), transparent);
            opacity: 0.2; animation: float 8s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(45deg); }
            100% { transform: translateY(-110vh) rotate(45deg); }
        }

        .container {
            width: 92%; max-width: 400px;
            position: relative;
            z-index: 5;
            transition: transform 0.6s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.5s;
        }

        /* Slanted Header */
        .header-slant {
            background: var(--primary);
            padding: 20px;
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0% 100%);
            margin-bottom: -10px;
            position: relative;
            z-index: 2;
        }

        h2 { margin: 0; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -1px; color: #000; }

        .main-panel {
            background: var(--panel);
            padding: 40px 25px;
            border-left: 4px solid var(--primary);
            box-shadow: 20px 20px 0px rgba(255, 61, 0, 0.1);
        }

        #status { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--accent); margin-bottom: 25px; display: block; }

        /* INPUTS */
        select, input {
            width: 100%;
            padding: 18px;
            margin-bottom: 20px;
            background: #1a1a1a;
            border: none;
            border-bottom: 2px solid #333;
            color: #fff !important;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-bottom-color: var(--primary); background: #222; }

        input[type="password"] {
            text-align: center; font-size: 2.5rem; letter-spacing: 15px; font-weight: 900;
        }

        /* VECTOR BUTTON */
        .v-btn {
            width: 100%;
            padding: 20px;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .v-btn:hover { background: var(--primary); color: #000; }
        .v-btn:active { transform: skewX(-10deg); }
        .v-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* LOOKUP SPECIFIC */
        .result-box {
            background: #1a1a1a;
            padding: 30px 20px;
            margin: 20px 0;
            position: relative;
            border-right: 4px solid var(--accent);
        }

        .name-txt { font-size: 2.2rem; font-weight: 900; line-height: 0.9; margin-bottom: 15px; }
        
        .action-row { display: flex; gap: 10px; }
        .action-btn {
            flex: 1; padding: 15px; border: 1px solid #444;
            text-decoration: none; color: #fff; font-weight: 800; font-size: 0.75rem;
            text-align: center; text-transform: uppercase;
        }
        .action-btn.wa { color: #25D366; border-color: #25D366; }

        .hidden { display: none !important; }

        /* EXIT ANIMATION */
        .warp-out { transform: translateX(-150%) skewX(20deg); opacity: 0; }
        .warp-in { animation: warpIn 0.6s forwards; }

        @keyframes warpIn {
            0% { transform: translateX(150%) skewX(-20deg); opacity: 0; }
            100% { transform: translateX(0) skewX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-bit" style="left: 20%;"></div>
    <div class="bg-bit" style="left: 50%; animation-delay: 2s;"></div>
    <div class="bg-bit" style="left: 80%; animation-delay: 4s;"></div>

    <div id="entry-screen" class="container">
        <div class="header-slant"><h2>ACCESS_CORE</h2></div>
        <div class="main-panel">
            <span id="status">INIT_STATION_READY</span>
            <input type="password" id="pw" inputmode="numeric" placeholder="PIN" maxlength="4">
            <button id="entry-btn" class="v-btn" onclick="handleEntry()" disabled>AUTHORIZE</button>
        </div>
    </div>

    <div id="lookup-view" class="container hidden">
        <div class="header-slant" style="background: var(--accent);"><h2 id="service-display">SERVICE</h2></div>
        <div class="main-panel" style="border-left-color: var(--accent);">
            <div class="result-box">
                <div id="name-display" class="name-txt">...</div>
                <div id="phone-display" style="font-size: 1.2rem; font-weight: 700;">-</div>
            </div>
            <div class="action-row">
                <a href="#" id="call-link" class="action-btn">📞 VOICE</a>
                <a href="#" id="wa-link" class="action-btn wa" style="display:none;">💬 WA</a>
            </div>
            <p id="time-stamp" style="font-size: 0.6rem; opacity: 0.4; margin-top: 25px;"></p>
        </div>
    </div>

    <div id="register-view" class="container hidden">
        <div class="header-slant"><h2>REGISTRY_🇮🇶</h2></div>
        <div class="main-panel">
            <span id="status">UPDATE_REQUIRED</span>
            <select id="spec-select" onchange="toggleNameSection()">
                <option value="">SELECT SECTOR</option>
                <option value="NS">NEURO</option>
                <option value="CT">THORACIC</option>
                <option value="GS">SURGERY</option>
                <option value="US">URO</option>
                <option value="ENT">ENT</option>
                <option value="H">CARDIO</option>
                <option value="D">DEATH_CERT</option>
                <option value="OP">OP_ANES</option>
                <option value="ICU">ICU_ANES</option>
                <option value="R">RADIO</option>
                <option value="ON">ONCO</option>
                <option value="PS">PLASTIC</option>
            </select>

            <div id="name-section" class="hidden">
                <select id="name-list"></select>
                <button id="submit-btn" class="v-btn" onclick="submitRegistration()">COMMIT_UPDATE</button>
            </div>
        </div>
    </div>

<script>
    /* YOUR ORIGINAL LOGIC - COMPLETELY UNTOUCHED */
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const service = urlParams.get('service');
    const ward = urlParams.get('ward');
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";

    let serverData = null;
    let allResidents = [];

    window.onload = async function() {
        if (mode === 'register') {
            prepareRegister();
        } else if (service) {
            prepareLookup();
        } else {
            document.getElementById('status').innerText = "⚠️ LINK_ERROR";
        }
    };

    async function prepareRegister() {
        document.getElementById('status').innerText = "SYNCING_DB...";
        try {
            const response = await fetch(`${scriptUrl}?action=getNames`);
            const data = await response.json(); 
            allResidents = data.sort((a, b) => a[0].localeCompare(b[0], 'ar'));
            document.getElementById('status').innerText = "SYNC_COMPLETE ✅";
            document.getElementById('entry-btn').disabled = false;
        } catch (e) { document.getElementById('status').innerText = "OFFLINE"; }
    }

    function toggleNameSection() {
        const selectedSpec = document.getElementById('spec-select').value;
        const nameSection = document.getElementById('name-section');
        const dropdown = document.getElementById('name-list');
        if (!selectedSpec) { nameSection.classList.add('hidden'); return; }

        let filtered;
        if (selectedSpec === "OP" || selectedSpec === "ICU") {
            filtered = allResidents.filter(res => res[1] === "A");
        } else if (selectedSpec === "D") {
            filtered = allResidents;
        } else {
            filtered = allResidents.filter(res => res[1] === selectedSpec);
        }

        if (filtered.length > 0) {
            dropdown.innerHTML = filtered.map(res => `<option value="${res[0]}">${res[0]}</option>`).join('');
            nameSection.classList.remove('hidden');
        } else {
            dropdown.innerHTML = "<option value=''>NULL</option>";
            nameSection.classList.remove('hidden');
        }
    }

    async function prepareLookup() {
        try {
            const response = await fetch(`${scriptUrl}?service=${service}&ward=${ward || service}&json=true&t=${Date.now()}`);
            serverData = await response.json();
            if (serverData && !serverData.error) {
                document.getElementById('status').innerText = "LINK_SECURED ✅";
                document.getElementById('entry-btn').disabled = false;
            } else {
                document.getElementById('status').innerText = "NO_DATA";
            }
        } catch (e) { document.getElementById('status').innerText = "OFFLINE"; }
    }

    function handleEntry() {
        const pass = document.getElementById('pw').value;
        const correct = (serverData && serverData.password) ? serverData.password.toString() : "1234";
        if (pass === correct) {
            const entry = document.getElementById('entry-screen');
            entry.classList.add('warp-out'); // Warp out animation
            
            setTimeout(() => {
                entry.style.display = 'none';
                let nextView;
                if (mode === 'register') {
                    nextView = document.getElementById('register-view');
                } else {
                    showLookupUI();
                    nextView = document.getElementById('lookup-view');
                }
                nextView.classList.remove('hidden');
                nextView.classList.add('warp-in'); // Warp in animation
            }, 500);
        } else { alert("INVALID_PIN"); }
    }

    function showLookupUI() {
        if (serverData) {
            document.getElementById('service-display').innerText = serverData.resident.serviceArabic;
            document.getElementById('name-display').innerText = serverData.resident.name;
            document.getElementById('phone-display').innerText = serverData.resident.phone;
            document.getElementById('time-stamp').innerText = "TIMESTAMP: " + serverData.timestamp;
            document.getElementById('call-link').href = "tel:" + serverData.resident.phone;
            if (serverData.whatsappDigits) {
                const wa = document.getElementById('wa-link');
                wa.style.display = 'block';
                wa.href = "whatsapp://send?phone=" + serverData.whatsappDigits;
            }
        }
    }

    async function submitRegistration() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "WRITING...";
        btn.disabled = true;
        const payload = {
            action: "submitDuty",
            specialty: document.getElementById('spec-select').value,
            name: document.getElementById('name-list').value
        };
        try {
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            alert("UPLOADED ✅");
        } catch (e) { alert("FAILED"); }
        finally { btn.innerText = "COMMIT_UPDATE"; btn.disabled = false; }
    }
</script>
</body>
</html>
